    html += `<button onclick="window.__app.startAddSkill()" style="width: 100%; padding: 11px; background: ${s.color}15; border: 1px dashed ${s.color}; border-radius: 10px; color: ${s.color}; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; font-weight: 700;">+ Добавить навык</button>`;
  }

  html += `</div>`;
  return html;
}

// Модал отдельного навыка
function renderSkillModal() {
  const sk = (state.skills || []).find(x => x.id === view.skillId);
  if (!sk) return '';
  const skType = SKILL_TYPES[sk.type] || SKILL_TYPES.custom;
  const period = view.skillPeriod || 'all';
  const stats = skillStats(sk.id, null, period);
  const allTimeStats = skillStats(sk.id, null, 'all');

  // Период с реальными датами
  const periodLabel = (() => {
    if (period === 'all') return 'За всё время';
    if (period === 'today') return formatDateLong(today());
    if (period === 'week') {
      const w = new Date(); w.setDate(w.getDate() - 6);
      return `${formatDateShort(dateToISO(w))} — ${formatDateShort(today())}`;
    }
    if (period === 'month') {
      const d = new Date();
      return `${MONTHS_RU[d.getMonth()].charAt(0).toUpperCase() + MONTHS_RU[d.getMonth()].slice(1)} ${d.getFullYear()}`;
    }
    return '';
  })();

  let body = '';

  // Большие цифры суммарно
  body += `<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px;">
    <div style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 10px 8px; text-align: center;">
      <div style="font-size: 9px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; margin-bottom: 4px;">Часов</div>
      <div style="font-size: 18px; color: ${sk.color}; font-weight: 800;">${stats.hours.toFixed(1)}</div>
    </div>
    <div style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 10px 8px; text-align: center;">
      <div style="font-size: 9px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; margin-bottom: 4px;">Занятий</div>
      <div style="font-size: 18px; color: #fff; font-weight: 800;">${stats.count}</div>
    </div>
    <div style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 10px 8px; text-align: center;">
      <div style="font-size: 9px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; margin-bottom: 4px;">XP</div>
      <div style="font-size: 18px; color: #A78BFA; font-weight: 800;">${stats.xp}</div>
    </div>
  </div>`;

  // Период
  body += `<div style="display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap;">${[['today', 'Сегодня'], ['week', 'Неделя'], ['month', 'Месяц'], ['all', 'Всё']].map(([v, l]) => `<button onclick="window.__app.setSkillPeriod('${v}')" style="flex: 1; min-width: 60px; padding: 7px 6px; background: ${period === v ? sk.color : 'transparent'}; color: ${period === v ? '#000' : '#b0a0d0'}; border: 1px solid ${period === v ? sk.color : 'rgba(255,255,255,0.1)'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 600;">${l}</button>`).join('')}</div>`;
  body += `<div style="text-align: center; font-size: 11px; color: ${sk.color}; margin-bottom: 16px; letter-spacing: 0.05em;">${periodLabel}</div>`;

  // Кнопка добавить занятие
  if (view.skillSessionAdding) {
    const subId = view.skillSessionSubId || (sk.subs[0]?.id);
    body += `<div style="background: rgba(0,0,0,0.3); border: 1px solid ${sk.color}40; border-radius: 12px; padding: 14px; margin-bottom: 14px;">
      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; font-weight: 600;">Записать занятие</div>
      <div style="font-size: 9px; color: #8870a8; margin-bottom: 6px; letter-spacing: 0.1em; text-transform: uppercase;">Категория</div>`;

    if ((sk.subs || []).length === 0) {
      body += `<div style="text-align: center; padding: 12px; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.08); border-radius: 8px; font-size: 11px; color: #6a5a8a; margin-bottom: 10px;">Сначала добавь категорию ниже</div>`;
    } else {
      body += `<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px;" id="skill-sub-row">
        ${sk.subs.map((sub, idx) => {
          const isActive = subId ? sub.id === subId : idx === 0;
          return `<button data-subid="${sub.id}" onclick="window.__app.selectSkillSub('${sub.id}')" style="padding: 8px 6px; background: ${isActive ? sub.color + '30' : 'transparent'}; border: 1px solid ${isActive ? sub.color : 'rgba(255,255,255,0.08)'}; color: ${isActive ? '#fff' : '#b0a0d0'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 600; line-height: 1.3;">${sub.name}<br><span style="font-size: 9px; opacity: 0.7;">${sub.desc || ''}</span></button>`;
        }).join('')}
      </div>`;
    }

    body += `<div style="display: flex; gap: 8px; margin-bottom: 10px;">
        <div style="flex: 2;">
          <div style="font-size: 9px; color: #8870a8; margin-bottom: 4px; letter-spacing: 0.1em; text-transform: uppercase;">${(() => { const activeSub = (sk.subs || []).find(x => x.id === subId); return activeSub && activeSub.invertGood ? 'Случаев (антиметрика)' : 'Часов'; })()}</div>
          <input id="skill-hours-input" type="number" min="${(() => { const activeSub = (sk.subs || []).find(x => x.id === subId); return activeSub && activeSub.invertGood ? '1' : '0.25'; })()}" step="${(() => { const activeSub = (sk.subs || []).find(x => x.id === subId); return activeSub && activeSub.invertGood ? '1' : '0.25'; })()}" value="1" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 16px; outline: none; text-align: center; font-weight: 700;" />
        </div>
        <div style="flex: 1;">
          <div style="font-size: 9px; color: #8870a8; margin-bottom: 4px; letter-spacing: 0.1em; text-transform: uppercase;">Дата</div>
          <input id="skill-date-input" type="date" value="${today()}" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 12px; outline: none;" />
        </div>
      </div>
      <input id="skill-note-input" placeholder="Заметка (необязательно)" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 12px; outline: none; margin-bottom: 12px;" />
      <div style="display: flex; gap: 8px;">
        <button onclick="window.__app.confirmSkillSession()" style="flex: 1; padding: 11px; background: linear-gradient(135deg,${sk.color},${sk.color}cc); color: #000; border: none; border-radius: 8px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 700; box-shadow: 0 0 16px ${sk.color}60;">Записать</button>
        <button onclick="window.__app.cancelSkillSession()" style="padding: 11px 16px; background: transparent; color: #8870a8; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-size: 11px; cursor: pointer;">Отмена</button>
      </div>
    </div>`;
    setTimeout(() => document.getElementById('skill-hours-input')?.focus(), 50);
  } else if ((sk.subs || []).length > 0) {
    body += `<button onclick="window.__app.startSkillSession()" style="width: 100%; padding: 12px; background: linear-gradient(135deg, ${sk.color}30, ${sk.color}10); border: 1px solid ${sk.color}; border-radius: 10px; color: #fff; font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; margin-bottom: 16px; font-weight: 700; box-shadow: 0 0 16px ${sk.color}40;">+ Записать занятие</button>`;
  }

  // Субкатегории с часами и графиками
  body += `<div style="font-size: 10px; color: ${sk.color}; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 700; margin-bottom: 10px;">Категории навыка</div>`;

  if ((sk.subs || []).length === 0) {
    body += `<div style="text-align: center; padding: 16px; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.08); border-radius: 10px; font-size: 12px; color: #6a5a8a; margin-bottom: 10px;">Категорий пока нет. Добавь первую.</div>`;
  } else {
    // Считаем общее за период чтобы показать процент
    const totalHForBars = sk.subs.reduce((s, sub) => s + skillStats(sk.id, sub.id, period).hours, 0) || 1;
    sk.subs.forEach(sub => {
      const subStats = skillStats(sk.id, sub.id, period);
      const subAllTime = skillStats(sk.id, sub.id, 'all');
      const pct = (subStats.hours / totalHForBars) * 100;
      const isInvert = sub.invertGood;
      // Для антиметрики (invertGood: true) показываем количество, а не часы, и красное предупреждение если > 0
      const isAlertHigh = isInvert && subStats.count > 0;
      const bgCard = isInvert ? (isAlertHigh ? 'rgba(255,61,113,0.08)' : 'rgba(16,232,145,0.05)') : 'rgba(255,255,255,0.025)';
      const borderCard = isInvert ? (isAlertHigh ? 'rgba(255,61,113,0.3)' : 'rgba(16,232,145,0.2)') : 'rgba(255,255,255,0.05)';
      const bigValColor = isInvert ? (isAlertHigh ? '#FF3D71' : '#10E891') : sub.color;

      body += `<div style="background: ${bgCard}; border: 1px solid ${borderCard}; border-left: 3px solid ${sub.color}; border-radius: 10px; padding: 11px; margin-bottom: 6px;">
        <div style="display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 6px;">
          <div style="flex: 1; min-width: 0;">
            <div style="font-size: 13px; color: #fff; font-weight: 700;">${isInvert ? '⚠ ' : ''}${escapeHtml(sub.name)}${isInvert ? ' <span style="font-size:9px; color:#FF3D71; letter-spacing:0.1em;">АНТИМЕТРИКА</span>' : ''}</div>
            ${sub.desc ? `<div style="font-size: 10px; color: #8870a8;">${escapeHtml(sub.desc)}</div>` : ''}
          </div>
          <div style="text-align: right; flex-shrink: 0;">
            ${isInvert
              ? `<div style="font-size: 18px; color: ${bigValColor}; font-weight: 800; line-height: 1;">${subStats.count}</div><div style="font-size: 9px; color: #8870a8; margin-top: 2px;">${isAlertHigh ? 'случаев' : 'отлично — 0'}</div>`
              : `<div style="font-size: 14px; color: ${sub.color}; font-weight: 700;">${subStats.hours.toFixed(1)} ч</div><div style="font-size: 9px; color: #8870a8;">${subStats.count} ${plural(subStats.count, 'занятие', 'занятия', 'занятий')}</div>`}
          </div>
          <button onclick="window.__app.removeSkillSub('${sk.id}', '${sub.id}')" title="Удалить категорию" style="background: transparent; border: none; color: #5a4a78; cursor: pointer; padding: 4px; font-size: 12px; flex-shrink: 0;">🗑</button>
        </div>
        ${!isInvert && subStats.hours > 0 ? `<div style="height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden;"><div style="height: 100%; width: ${pct}%; background: ${sub.color}; box-shadow: 0 0 6px ${sub.color}60;"></div></div><div style="font-size: 9px; color: #6a5a8a; margin-top: 3px; text-align: right;">${pct.toFixed(0)}% от выбранного периода${period !== 'all' && subAllTime.hours !== subStats.hours ? ` · всего ${subAllTime.hours.toFixed(1)} ч` : ''}</div>` : ''}
        ${subAllTime.lastDate ? `<div style="font-size: 9px; color: #6a5a8a; margin-top: 4px;">${isInvert ? 'последний случай: ' : 'посл. '}${formatDateRelative(subAllTime.lastDate)}</div>` : ''}
      </div>`;
    });
  }

  // Добавить субкатегорию
  if (view.skillSubAdding) {
    body += `<div style="background: rgba(0,0,0,0.3); border: 1px solid ${sk.color}40; border-radius: 10px; padding: 12px; margin: 10px 0;">
      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; font-weight: 600;">Новая категория</div>
      <input id="sub-name-input" placeholder="Название" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 12px; outline: none; margin-bottom: 6px;" />
      <input id="sub-desc-input" placeholder="Описание (необязательно)" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 12px; outline: none; margin-bottom: 10px;" />
      <div style="display: flex; gap: 8px;">
        <button onclick="window.__app.confirmAddSub('${sk.id}')" style="flex: 1; padding: 10px; background: ${sk.color}; color: #000; border: none; border-radius: 8px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-weight: 700;">Добавить</button>
        <button onclick="window.__app.cancelAddSub()" style="padding: 10px 14px; background: transparent; color: #8870a8; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-size: 11px; cursor: pointer;">Отмена</button>
      </div>
    </div>`;
    setTimeout(() => document.getElementById('sub-name-input')?.focus(), 50);
  } else {
    body += `<button onclick="window.__app.startAddSub()" style="width: 100%; padding: 10px; background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.15); border-radius: 10px; color: #8870a8; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; margin-top: 8px; font-weight: 600;">+ Категория</button>`;
  }

  // Последние занятия — с возможностью отменить
  const sessions = state.history
    .filter(h => h.skillId === sk.id)
    .sort((a, b) => b.timestamp - a.timestamp);

  if (sessions.length > 0) {
    body += `<div style="margin-top: 22px; margin-bottom: 8px;"><div style="font-size: 10px; color: ${sk.color}; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 700; margin-bottom: 10px;">Последние занятия (${sessions.length})</div>`;
    // Показываем последние 12, чтобы не было слишком длинно
    const visible = sessions.slice(0, 12);
    visible.forEach(h => {
      const sub = findSkillSub(sk, h.subId);
      const subColor = sub ? sub.color : sk.color;
      const subName = sub ? sub.name : 'без категории';
      const isC = view.confirmUndoId === h.id;
      body += `<div style="padding: 10px 12px; background: ${isC ? 'rgba(255,61,113,0.1)' : 'rgba(255,255,255,0.03)'}; border: 1px solid rgba(255,255,255,0.05); border-left: 3px solid ${isC ? '#FF3D71' : subColor}; border-radius: 8px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; gap: 10px;">
        <div style="flex: 1; min-width: 0;">
          <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
            <span style="font-size: 11px; color: ${subColor}; font-weight: 700; letter-spacing: 0.05em;">${escapeHtml(subName)}</span>
            <span style="font-size: 11px; color: #fff; font-weight: 600;">${h.hours}ч</span>
          </div>
          <div style="font-size: 10px; color: #8870a8; margin-top: 3px;">${formatDateRelative(h.date)}${h.note ? ` · ${escapeHtml(h.note)}` : ''}</div>
        </div>
        <div style="display: flex; align-items: center; gap: 6px; flex-shrink: 0;">
          <div style="font-size: 11px; color: ${isC ? '#FF3D71' : '#A78BFA'}; font-weight: 700; ${isC ? 'text-decoration: line-through;' : ''}">${isC ? '−' : '+'}${h.xp}</div>
          <button onclick="window.__app.undo('${h.id}')" style="width: 22px; height: 22px; background: ${isC ? '#FF3D71' : 'transparent'}; border: 1px solid ${isC ? '#FF3D71' : 'rgba(255,255,255,0.15)'}; border-radius: 50%; color: ${isC ? '#fff' : '#8870a8'}; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; font-size: 10px; flex-shrink: 0;">${isC ? '✓' : '✕'}</button>
        </div>
      </div>`;
    });
    if (sessions.length > 12) {
      body += `<div style="text-align: center; font-size: 10px; color: #6a5a8a; margin-top: 6px;">показаны последние 12 из ${sessions.length}. Все остальные — во вкладке «Хроника».</div>`;
    }
    body += `</div>`;
  }

  // Удаление навыка
  body += `<div style="margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.06);">
    <button onclick="window.__app.removeSkill('${sk.id}')" style="width: 100%; padding: 9px; background: transparent; color: #FF3D71; border: 1px solid rgba(255,61,113,0.3); border-radius: 8px; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; font-weight: 600;">Удалить навык</button>
  </div>`;

  return `<div onclick="window.__app.closeSkill()" style="position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 250; display: flex; align-items: flex-end; justify-content: center;"><div onclick="event.stopPropagation()" style="background: linear-gradient(180deg, #150a25, #0a0612); border-radius: 20px 20px 0 0; width: 100%; max-width: 520px; max-height: 92vh; overflow-y: auto; padding: 20px; position: relative; border-top: 3px solid ${sk.color}; box-shadow: 0 -10px 40px ${sk.color}40;">
    <button onclick="window.__app.closeSkill()" style="position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #b0a0d0; cursor: pointer; padding: 0; width: 28px; height: 28px; border-radius: 50%; font-size: 16px;">✕</button>
    <div style="display: flex; align-items: center; gap: 14px; margin: 8px 0 18px;">
      <div style="width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, ${sk.color}40, ${sk.color}10); border: 1px solid ${sk.color}; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 0 20px ${sk.color}60;">${sk.icon || skType.icon}</div>
      <div style="flex: 1; min-width: 0;">
        <div style="font-size: 22px; color: #fff; font-weight: 700;">${escapeHtml(sk.name)}</div>
        <div style="font-size: 11px; color: ${sk.color}; letter-spacing: 0.1em;">${skType.name}${sk.target ? ` · цель ${escapeHtml(sk.target)}` : ''}</div>
        ${allTimeStats.lastDate ? `<div style="font-size: 10px; color: #8870a8; margin-top: 3px;">последнее занятие: ${formatDateRelative(allTimeStats.lastDate)}</div>` : ''}
      </div>
    </div>
    ${body}
  </div></div>`;
}

// === ПАНЕЛЬ ФИНАНСОВ (только для сферы money) ===
// === ПАНЕЛЬ ТЕЛА (только для сферы body) — замеры веса и обхватов ===
function renderBodyPanel(sphere) {
  const s = sphere;
  const nutritionOpen = !!view.expandedGroups?.['body_nutrition'];
  const measuresOpen  = !!view.expandedGroups?.['body_measures'];

  let html = '';

  // Питание — выпадающий блок
  html += `<button onclick="window.__app.toggleGroup('body_nutrition')" style="width:100%;display:flex;align-items:center;gap:10px;padding:12px 14px;background:${nutritionOpen?'rgba(255,61,113,0.1)':'rgba(255,255,255,0.03)'};border:1px solid ${nutritionOpen?'rgba(255,61,113,0.35)':'rgba(255,255,255,0.07)'};border-radius:${nutritionOpen?'12px 12px 0 0':'12px'};cursor:pointer;text-align:left;margin-bottom:${nutritionOpen?'0':'8px'}">
    <span style="font-size:18px;">🥗</span>
    <div style="flex:1;font-size:13px;color:#fff;font-weight:700;">Питание</div>
    <span style="font-size:13px;color:#8870a8;">${nutritionOpen?'▾':'▸'}</span>
  </button>`;
  if (nutritionOpen) {
    html += `<div style="padding:14px;background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.07);border-top:none;border-radius:0 0 12px 12px;margin-bottom:8px;">`;
    html += renderNutritionTab(s);
    html += `</div>`;
  }

  // Замеры — выпадающий блок
  html += `<button onclick="window.__app.toggleGroup('body_measures')" style="width:100%;display:flex;align-items:center;gap:10px;padding:12px 14px;background:${measuresOpen?'rgba(255,61,113,0.1)':'rgba(255,255,255,0.03)'};border:1px solid ${measuresOpen?'rgba(255,61,113,0.35)':'rgba(255,255,255,0.07)'};border-radius:${measuresOpen?'12px 12px 0 0':'12px'};cursor:pointer;text-align:left;margin-bottom:${measuresOpen?'0':'8px'}">
    <span style="font-size:18px;">📏</span>
    <div style="flex:1;font-size:13px;color:#fff;font-weight:700;">Замеры</div>
    <span style="font-size:13px;color:#8870a8;">${measuresOpen?'▾':'▸'}</span>
  </button>`;
  if (measuresOpen) {
    html += `<div style="padding:14px;background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.07);border-top:none;border-radius:0 0 12px 12px;margin-bottom:8px;">`;
    html += renderMeasuresTab(s);
    html += `</div>`;
  }

  return html;
}

function renderNutritionTab(s) {
  const NP = NUTRITION_PLAN;
  let html = '';

  // Заголовок и пометка
  html += `<div style="padding:10px 12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:8px;margin-bottom:12px;">
    <div style="font-size:12px;color:#b0a0d0;line-height:1.5;">${escapeHtml(NP.note)}</div>
  </div>`;

  // Приёмы пищи
  NP.meals.forEach((meal, i) => {
    const isOpen = view.expandedGroups && view.expandedGroups['meal_' + i];
    html += `<div style="margin-bottom:6px;">
      <button onclick="window.__app.toggleGroup('meal_${i}')" style="width:100%;display:flex;align-items:center;gap:10px;padding:11px 13px;background:${isOpen?'rgba(255,61,113,0.1)':'rgba(255,255,255,0.03)'};border:1px solid ${isOpen?'rgba(255,61,113,0.35)':'rgba(255,255,255,0.07)'};border-radius:10px;cursor:pointer;text-align:left;">
        <div style="font-size:22px;flex-shrink:0;">${meal.emoji}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;color:#fff;font-weight:700;">${escapeHtml(meal.name)}</div>
          <div style="font-size:10px;color:#8870a8;margin-top:1px;">${escapeHtml(meal.time)} · ${escapeHtml(meal.kcal)}</div>
        </div>
        <div style="font-size:14px;color:${isOpen?'#FF3D71':'#8870a8'};">${isOpen?'▾':'▸'}</div>
      </button>`;

    if (isOpen) {
      html += `<div style="padding:12px 14px;background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.06);border-top:none;border-radius:0 0 10px 10px;margin-top:-2px;">`;
      // Продукты
      meal.items.forEach(item => {
        html += `<div style="display:flex;align-items:baseline;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);">
          <span style="color:${s.color};font-size:12px;flex-shrink:0;">·</span>
          <span style="font-size:13px;color:#e0d0ff;">${escapeHtml(item)}</span>
        </div>`;
      });
      // Что содержит
      html += `<div style="margin-top:10px;padding:8px 10px;background:rgba(167,139,250,0.07);border-radius:7px;">
        <div style="font-size:9px;color:#A78BFA;letter-spacing:0.15em;text-transform:uppercase;font-weight:700;margin-bottom:4px;">Что даёт</div>
        <div style="font-size:11px;color:#b0a0d0;line-height:1.5;">${escapeHtml(meal.contains)}</div>
      </div>`;
      html += `</div>`;
    }

    html += `</div>`;
  });

  // Правила внизу
  html += `<div style="margin-top:10px;">
    <div style="font-size:10px;color:#8870a8;letter-spacing:0.2em;text-transform:uppercase;font-weight:700;margin-bottom:8px;">Главные правила</div>`;
  NP.rules.forEach(r => {
    html += `<div style="font-size:12px;color:#b0a0d0;padding:7px 10px;background:rgba(255,255,255,0.025);border-radius:7px;margin-bottom:4px;line-height:1.4;">${escapeHtml(r)}</div>`;
  });
  html += `</div>`;

  return html;
}

function renderMeasuresTab(s) {
  const body = state.body || { height: null, measurements: [] };
  const measurements = [...(body.measurements || [])].sort((a, b) => b.date.localeCompare(a.date) || b.timestamp - a.timestamp);
  let html = '';

  html += `<div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;">
    <div style="font-size: 11px; letter-spacing: 0.25em; color: ${s.color}; text-transform: uppercase; font-weight: 700;">Замеры тела</div>
    <div style="font-size: 10px; color: #8870a8;">${measurements.length} ${plural(measurements.length, 'замер', 'замера', 'замеров')}</div>
  </div>`;

  if (!body.height || view.bodyEditingHeight) {
    html += `<div style="background: rgba(0,0,0,0.25); border: 1px solid ${s.color}40; border-radius: 10px; padding: 11px; margin-bottom: 10px;">
      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; font-weight: 600;">${body.height ? 'Изменить рост' : 'Сначала укажи рост'}</div>
      <div style="display: flex; gap: 8px;">
        <input id="body-height-input" type="number" min="100" max="250" value="${body.height || ''}" placeholder="см" style="flex: 1; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 14px; outline: none; text-align: center; font-weight: 700;" />
        <button onclick="window.__app.bodySaveHeight()" style="padding: 9px 14px; background: ${s.color}; color: #000; border: none; border-radius: 6px; font-size: 11px; cursor: pointer; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;">ОК</button>
        ${body.height ? `<button onclick="window.__app.bodyCancelHeight()" style="padding: 9px 12px; background: transparent; color: #8870a8; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; font-size: 11px; cursor: pointer;">Отмена</button>` : ''}
      </div>
    </div>`;
  } else {
    html += `<div style="display: flex; align-items: center; justify-content: space-between; padding: 8px 11px; background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 10px;">
      <span style="font-size: 11px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase;">Рост</span>
      <span style="font-size: 13px; color: #fff; font-weight: 700;">${body.height} см</span>
      <button onclick="window.__app.bodyEditHeight()" style="background: transparent; border: none; color: #5a4a78; cursor: pointer; padding: 2px 6px; font-size: 11px;">✎</button>
    </div>`;
  }

  if (measurements.length > 0) {
    const last = measurements[0];
    const prev = measurements[1];
    const wDiff = last.weight && prev?.weight ? (last.weight - prev.weight).toFixed(1) : null;
    const wColor = wDiff === null ? '#8870a8' : (parseFloat(wDiff) > 0 ? '#FFAA00' : parseFloat(wDiff) < 0 ? '#10E891' : '#8870a8');
    const wSign = wDiff && parseFloat(wDiff) > 0 ? '+' : '';
    html += `<div style="background: rgba(0,0,0,0.25); border: 1px solid ${s.color}40; border-radius: 10px; padding: 12px; margin-bottom: 10px;">
      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; font-weight: 600;">Последний замер · ${formatDateRelative(last.date)}</div>
      <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px;">
        ${last.weight ? `<div style="background: rgba(255,255,255,0.04); border-radius: 6px; padding: 8px; text-align: center;"><div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase;">Вес</div><div style="font-size: 16px; color: #fff; font-weight: 800;">${last.weight} кг</div>${wDiff !== null ? `<div style="font-size: 10px; color: ${wColor}; font-weight: 600;">${wSign}${wDiff} от пред.</div>` : ''}</div>` : ''}
        ${last.chest ? `<div style="background: rgba(255,255,255,0.04); border-radius: 6px; padding: 8px; text-align: center;"><div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase;">Грудь</div><div style="font-size: 14px; color: #fff; font-weight: 700;">${last.chest} см</div></div>` : ''}
        ${last.waist ? `<div style="background: rgba(255,255,255,0.04); border-radius: 6px; padding: 8px; text-align: center;"><div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase;">Талия</div><div style="font-size: 14px; color: #fff; font-weight: 700;">${last.waist} см</div></div>` : ''}
        ${last.hips ? `<div style="background: rgba(255,255,255,0.04); border-radius: 6px; padding: 8px; text-align: center;"><div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase;">Бёдра</div><div style="font-size: 14px; color: #fff; font-weight: 700;">${last.hips} см</div></div>` : ''}
        ${last.biceps ? `<div style="background: rgba(255,255,255,0.04); border-radius: 6px; padding: 8px; text-align: center;"><div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase;">Бицепс</div><div style="font-size: 14px; color: #fff; font-weight: 700;">${last.biceps} см</div></div>` : ''}
      </div>
    </div>`;
  }

  if (view.bodyAdding) {
    html += `<div style="background: rgba(0,0,0,0.3); border: 1px solid ${s.color}40; border-radius: 10px; padding: 12px; margin-bottom: 10px;">
      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; font-weight: 600;">Новый замер</div>
      <div style="display: flex; gap: 6px; margin-bottom: 8px;"><input id="body-date-input" type="date" value="${today()}" style="flex: 1; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 12px; outline: none;" /></div>
      <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; margin-bottom: 8px;">
        <div><div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px;">Вес (кг)</div><input id="body-weight-input" type="number" step="0.1" placeholder="—" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 14px; outline: none; text-align: center; font-weight: 700;" /></div>
        <div><div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px;">Грудь (см)</div><input id="body-chest-input" type="number" step="0.5" placeholder="—" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 14px; outline: none; text-align: center;" /></div>
        <div><div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px;">Талия (см)</div><input id="body-waist-input" type="number" step="0.5" placeholder="—" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 14px; outline: none; text-align: center;" /></div>
        <div><div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px;">Бёдра (см)</div><input id="body-hips-input" type="number" step="0.5" placeholder="—" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 14px; outline: none; text-align: center;" /></div>
        <div style="grid-column: span 2;"><div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px;">Бицепс (см)</div><input id="body-biceps-input" type="number" step="0.5" placeholder="—" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 14px; outline: none; text-align: center;" /></div>
      </div>
      <input id="body-note-input" placeholder="Заметка" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 12px; outline: none; margin-bottom: 8px;" />
      <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
        <label style="flex:1; padding: 8px 12px; background: rgba(255,255,255,0.04); border: 1px dashed rgba(255,255,255,0.2); border-radius: 6px; color: #8870a8; font-size: 11px; cursor: pointer; text-align: center; display: flex; align-items: center; justify-content: center; gap: 6px;">
          📷 Добавить фото
          <input type="file" accept="image/*" onchange="window.__app.bodyPickPhoto(this)" style="display:none;" />
        </label>
        <div id="body-photo-thumb" style="width: 52px; height: 52px; border-radius: 6px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; overflow: hidden;">📷</div>
      </div>
      <div style="display: flex; gap: 6px;">
        <button onclick="window.__app.bodyConfirm()" style="flex: 1; padding: 10px; background: linear-gradient(135deg,${s.color},${s.color}cc); color: #000; border: none; border-radius: 6px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-weight: 700;">Записать</button>
        <button onclick="window.__app.bodyCancelAdd()" style="padding: 10px 14px; background: transparent; color: #8870a8; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; font-size: 11px; cursor: pointer;">Отмена</button>
      </div>
    </div>`;
  } else if (body.height) {
    html += `<button onclick="window.__app.bodyStartAdd()" style="width: 100%; padding: 10px; background: ${s.color}15; border: 1px dashed ${s.color}; border-radius: 8px; color: ${s.color}; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; margin-bottom: 10px; font-weight: 700;">+ Замер</button>`;
  }

  const withWeight = measurements.filter(m => m.weight).reverse();
  if (withWeight.length >= 2) {
    const weights = withWeight.map(m => m.weight);
    const minW = Math.min(...weights), maxW = Math.max(...weights);
    const range = maxW - minW || 1;
    const w = 320, h = 80, pad = 4;
    const stepX = (w - pad * 2) / (withWeight.length - 1);
    let path = '', dots = '';
    withWeight.forEach((m, i) => {
      const x = pad + i * stepX;
      const y = pad + (h - pad * 2) * (1 - (m.weight - minW) / range);
      path += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1) + ' ';
      dots += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.5" fill="${s.color}" />`;
    });
    html += `<div style="background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; padding: 11px; margin-bottom: 8px;">
      <div style="display: flex; justify-content: space-between; font-size: 10px; color: #8870a8; margin-bottom: 6px;"><span>Вес · график</span><span>${minW}–${maxW} кг</span></div>
      <svg viewBox="0 0 ${w} ${h}" style="width: 100%; height: ${h}px; display: block;">
        <path d="${path}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" />
        ${dots}
      </svg>
    </div>`;
  }

  if (measurements.length > 0) {
    html += `<div style="font-size: 10px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; margin: 10px 0 6px; font-weight: 600;">История</div>`;
    measurements.slice(0, 12).forEach(m => {
      const parts = [];
      if (m.weight) parts.push('<span style="color:#fff;font-weight:700;">' + m.weight + ' кг</span>');
      if (m.chest)  parts.push('гр ' + m.chest);
      if (m.waist)  parts.push('т ' + m.waist);
      if (m.hips)   parts.push('бд ' + m.hips);
      if (m.biceps) parts.push('бц ' + m.biceps);

      const isExpanded = view.expandedGroups && view.expandedGroups['bm_' + m.id];
      const toggleKey = 'bm_' + m.id;

      // Строка — кликабельная для всех замеров, раскрывает детали
      html += '<div style="background:rgba(255,255,255,0.025);border-radius:8px;margin-bottom:6px;overflow:hidden;">'

        // Верхняя строка — всегда видна
        + '<button data-gk="' + toggleKey + '" onclick="window.__app.toggleGroup(this.dataset.gk)" style="width:100%;display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 12px;background:transparent;border:none;cursor:pointer;text-align:left;">'
        + '<div style="font-size:10px;color:#8870a8;flex-shrink:0;min-width:70px;pointer-events:none;">' + formatDateShort(m.date) + '</div>'
        + '<div style="font-size:11px;color:#b0a0d0;flex:1;pointer-events:none;">' + parts.join(' · ') + (m.note ? ' · <span style="color:#6a5a8a;">' + escapeHtml(m.note) + '</span>' : '') + '</div>'
        + (m.photo ? '<span style="font-size:13px;pointer-events:none;">📷</span>' : '')
        + '<span style="font-size:11px;color:#5a4a78;pointer-events:none;">' + (isExpanded ? '▾' : '▸') + '</span>'
        + '</button>';

      // Раскрытый блок
      if (isExpanded) {
        html += '<div style="padding:8px 12px 10px;border-top:1px solid rgba(255,255,255,0.06);">';

        // Фото — маленькое превью, кликабельное
        if (m.photo) {
          html += '<button data-mid="' + m.id + '" onclick="window.__app.bodyOpenPhoto(this.dataset.mid)" style="display:block;padding:0;border:none;cursor:pointer;margin-bottom:8px;background:transparent;width:100%;">'
            + '<img src="' + m.photo + '" style="width:100%;max-height:180px;object-fit:cover;border-radius:8px;display:block;" />'
            + '<div style="font-size:9px;color:#6a5a8a;margin-top:4px;text-align:center;">Нажми для полного размера</div>'
            + '</button>';
        }

        // Детали замера
        html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;">';
        if (m.weight) html += '<div style="padding:4px 8px;background:rgba(255,255,255,0.04);border-radius:6px;font-size:11px;"><span style="color:#6a5a8a;">Вес</span> <span style="color:#fff;font-weight:700;">' + m.weight + ' кг</span></div>';
        if (m.chest)  html += '<div style="padding:4px 8px;background:rgba(255,255,255,0.04);border-radius:6px;font-size:11px;"><span style="color:#6a5a8a;">Грудь</span> ' + m.chest + '</div>';
        if (m.waist)  html += '<div style="padding:4px 8px;background:rgba(255,255,255,0.04);border-radius:6px;font-size:11px;"><span style="color:#6a5a8a;">Талия</span> ' + m.waist + '</div>';
        if (m.hips)   html += '<div style="padding:4px 8px;background:rgba(255,255,255,0.04);border-radius:6px;font-size:11px;"><span style="color:#6a5a8a;">Бёдра</span> ' + m.hips + '</div>';
        if (m.biceps) html += '<div style="padding:4px 8px;background:rgba(255,255,255,0.04);border-radius:6px;font-size:11px;"><span style="color:#6a5a8a;">Бицепс</span> ' + m.biceps + '</div>';
        html += '</div>';

        // Кнопка удалить
        html += '<button data-mid="' + m.id + '" onclick="window.__app.bodyRemoveMeasurement(this.dataset.mid)" style="padding:6px 12px;background:rgba(255,61,113,0.1);border:1px solid rgba(255,61,113,0.3);border-radius:6px;color:#FF3D71;font-size:10px;cursor:pointer;">Удалить замер</button>';

        html += '</div>';
      }

      html += '</div>';
    });
  }

  return html;
}


function renderFinancePanel(sphere) {
  const s = sphere;
  const monthStr = view.finMonth || currentMonth();
  const [yr, mo] = monthStr.split('-').map(Number);
  const monthName = `${MONTHS_RU[mo - 1].charAt(0).toUpperCase() + MONTHS_RU[mo - 1].slice(1)} ${yr}`;
  const isCurrentMonth = monthStr === currentMonth();
  const isFutureMonth = monthStr > currentMonth();

  const incomeSum = finMonthSum(monthStr, 'income');
  const expenseSum = finMonthSum(monthStr, 'expense');
  const net = incomeSum - expenseSum;
  const savings = finTotalSavings();
  const entries = finEntriesForMonth(monthStr).sort((a, b) => b.date.localeCompare(a.date) || b.timestamp - a.timestamp);

  let html = `<div style="background: linear-gradient(135deg, ${s.color}10, ${s.color}03); border: 1px solid ${s.color}30; border-radius: 14px; padding: 16px; margin-bottom: 18px;">`;

  // Заголовок
  html += `<div style="font-size: 11px; letter-spacing: 0.25em; color: ${s.color}; text-transform: uppercase; font-weight: 700; margin-bottom: 14px;">PnL · Учёт денег</div>`;

  // Селектор месяца
  html += `<div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding: 8px 10px; background: rgba(0,0,0,0.25); border-radius: 10px;">
    <button onclick="window.__app.shiftFinMonth(-1)" style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #b0a0d0; cursor: pointer; width: 28px; height: 28px; border-radius: 8px; font-size: 14px;">‹</button>
    <div style="text-align: center;">
      <div style="font-size: 13px; color: #fff; font-weight: 700;">${monthName}</div>
      <div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase;">${isCurrentMonth ? 'текущий месяц' : isFutureMonth ? 'будущий' : 'прошлый месяц'}</div>
    </div>
    <button onclick="window.__app.shiftFinMonth(1)" style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #b0a0d0; cursor: pointer; width: 28px; height: 28px; border-radius: 8px; font-size: 14px;">›</button>
  </div>`;

  // Три карточки: Доходы / Расходы / Чистое
  html += `<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px;">
    <div style="background: rgba(16,232,145,0.1); border: 1px solid rgba(16,232,145,0.3); border-radius: 10px; padding: 10px 8px; text-align: center;">
      <div style="font-size: 9px; color: #10E891; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; margin-bottom: 4px;">Доходы</div>
      <div style="font-size: 14px; color: #10E891; font-weight: 700; word-break: break-word;">${fmtMoney(incomeSum)}</div>
    </div>
    <div style="background: rgba(255,61,113,0.1); border: 1px solid rgba(255,61,113,0.3); border-radius: 10px; padding: 10px 8px; text-align: center;">
      <div style="font-size: 9px; color: #FF3D71; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; margin-bottom: 4px;">Расходы</div>
      <div style="font-size: 14px; color: #FF3D71; font-weight: 700; word-break: break-word;">${fmtMoney(expenseSum)}</div>
    </div>
    <div style="background: ${net >= 0 ? 'rgba(167,139,250,0.15)' : 'rgba(255,170,0,0.15)'}; border: 1px solid ${net >= 0 ? 'rgba(167,139,250,0.4)' : 'rgba(255,170,0,0.4)'}; border-radius: 10px; padding: 10px 8px; text-align: center;">
      <div style="font-size: 9px; color: ${net >= 0 ? '#A78BFA' : '#FFAA00'}; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; margin-bottom: 4px;">Итого</div>
      <div style="font-size: 14px; color: ${net >= 0 ? '#A78BFA' : '#FFAA00'}; font-weight: 700; word-break: break-word;">${fmtMoney(net)}</div>
    </div>
  </div>`;

  // Большая цифра накоплений — в выбранных валютах
  const selectedCurs = (state.finance.selectedCurrencies || ['USD']);
  const rates = window.__fxRates?.rates || { USD:1, RUB:92, CLP:940, EUR:0.92 };
  const savingsUSD = savings; // savings уже в USD (через amountUSD)

  html += `<div style="background: linear-gradient(135deg, rgba(16,232,145,0.15), rgba(167,139,250,0.08)); border: 1px solid rgba(16,232,145,0.3); border-radius: 12px; padding: 14px; margin-bottom: 10px; text-align: center;">
    <div style="font-size: 9px; color: #10E891; letter-spacing: 0.25em; text-transform: uppercase; font-weight: 700; margin-bottom: 8px;">◈ Всего накоплено</div>
    ${selectedCurs.map((cur, i) => {
      const val = savingsUSD * (rates[cur] || 1);
      const fmt = cur === 'CLP' ? Math.round(val).toLocaleString('ru') : val.toFixed(2);
      return `<div style="font-size:${i===0?'28px':'16px'};color:${i===0?'#fff':'#8870a8'};font-weight:${i===0?'800':'600'};line-height:1.3;">${fmt} <span style="font-size:${i===0?'14px':'11px'};color:#6a5a8a;">${cur}</span></div>`;
    }).join('')}
    <div style="font-size: 10px; color: #6a5a8a; margin-top: 6px;">подушка ${fmtMoney(state.finance.cushion || 0)} + история</div>
    <button onclick="window.__app.toggleCushion()" style="margin-top: 6px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: #b0a0d0; cursor: pointer; padding: 5px 12px; border-radius: 8px; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600;">${view.finEditCushion ? 'Скрыть' : 'Изменить подушку'}</button>
  </div>`;

  // Выбор валют (до 3)
  const ALL_CURS = ['USD','RUB','CLP','EUR','GBP','CNY','AED','KZT','BRL'];
  const curPickOpen = !!view.expandedGroups?.['fin_cur_pick'];
  html += `<button onclick="window.__app.toggleGroup('fin_cur_pick')" style="width:100%;display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:8px;cursor:pointer;text-align:left;margin-bottom:${curPickOpen?'0':'10px'}">
    <span style="font-size:11px;color:#8870a8;flex:1;">Валюты для накоплений: ${selectedCurs.join(' · ')}</span>
    <span style="font-size:12px;color:#6a5a8a;">${curPickOpen?'▾':'▸'}</span>
  </button>`;
  if (curPickOpen) {
    html += `<div style="padding:10px;background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.07);border-top:none;border-radius:0 0 8px 8px;margin-bottom:10px;">
      <div style="font-size:10px;color:#6a5a8a;margin-bottom:8px;">Выбери до 3 валют. Первая — основная (самая большая цифра).</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;">
        ${ALL_CURS.map(cur => {
          const isActive = selectedCurs.includes(cur);
          return `<button onclick="window.__app.toggleFinCurrency('${cur}')" style="padding:6px 12px;background:${isActive?'rgba(16,232,145,0.2)':'transparent'};border:1px solid ${isActive?'#10E891':'rgba(255,255,255,0.12)'};border-radius:7px;color:${isActive?'#10E891':'#8870a8'};font-size:12px;font-weight:700;cursor:pointer;">${cur}${isActive?' ✓':''}</button>`;
        }).join('')}
      </div>
    </div>`;
  }

  // Поле редактирования подушки
  if (view.finEditCushion) {
    html += `<div style="background: rgba(0,0,0,0.3); border: 1px solid ${s.color}40; border-radius: 10px; padding: 12px; margin-bottom: 14px;">
      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; font-weight: 600;">Стартовая подушка</div>
      <div style="font-size: 10px; color: #6a5a8a; margin-bottom: 8px; line-height: 1.4;">Твои накопления на момент начала ведения учёта. К ним приплюсуется чистое за каждый месяц.</div>
      <div style="display: flex; gap: 8px;">
        <input id="fin-cushion-input" type="number" step="0.01" value="${state.finance.cushion || 0}" style="flex: 1; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 14px; outline: none;" />
        <button onclick="window.__app.saveCushion()" style="padding: 10px 14px; background: linear-gradient(135deg,${s.color},${s.color}cc); color: #000; border: none; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase;">Ок</button>
      </div>
    </div>`;
    setTimeout(() => document.getElementById('fin-cushion-input')?.focus(), 50);
  }

  // Форма добавления записи
  if (view.finView === 'add') {
    const t = view.finAddType;
    const cats = FIN_CATEGORIES[t];
    html += `<div style="background: rgba(0,0,0,0.3); border: 1px solid ${s.color}40; border-radius: 12px; padding: 14px; margin-bottom: 14px;">
      <div style="display: flex; gap: 6px; margin-bottom: 12px;">
        <button onclick="window.__app.setFinAddType('income')" style="flex: 1; padding: 10px; background: ${t === 'income' ? '#10E891' : 'transparent'}; color: ${t === 'income' ? '#000' : '#10E891'}; border: 1px solid ${t === 'income' ? '#10E891' : 'rgba(16,232,145,0.3)'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;">↑ Доход</button>
        <button onclick="window.__app.setFinAddType('expense')" style="flex: 1; padding: 10px; background: ${t === 'expense' ? '#FF3D71' : 'transparent'}; color: ${t === 'expense' ? '#000' : '#FF3D71'}; border: 1px solid ${t === 'expense' ? '#FF3D71' : 'rgba(255,61,113,0.3)'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;">↓ Расход</button>
      </div>
      <div style="display: flex; gap: 8px; margin-bottom: 10px;">
        <div style="flex: 2;">
          <div style="font-size: 9px; color: #8870a8; margin-bottom: 4px; letter-spacing: 0.1em; text-transform: uppercase;">Сумма и валюта</div>
          <div style="display:flex;gap:6px;margin-bottom:8px;">
            <input id="fin-amount" type="number" step="0.01" min="0" placeholder="0" oninput="updateFXDisplay()" style="flex:1;padding:10px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;font-size:18px;outline:none;text-align:center;font-weight:700;" />
            <select id="fin-input-cur" onchange="window.__finInputCur=this.value;updateFXDisplay();" style="padding:10px 8px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;font-size:13px;font-weight:700;outline:none;cursor:pointer;">
              ${['USD','RUB','CLP','EUR','GBP','CNY','AED','KZT','BRL'].map(c => `<option value="${c}" ${(window.__finInputCur||'USD')===c?'selected':''}>${c}</option>`).join('')}
            </select>
          </div>
          <div style="font-size: 9px; color: #8870a8; margin-bottom: 4px; letter-spacing: 0.1em; text-transform: uppercase;">= в USD</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;">
            ${(state.finance.selectedCurrencies||['USD']).map(cur => `<div style="flex:1;min-width:60px;padding:6px 8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:6px;text-align:center;"><div style="font-size:9px;color:#8870a8;text-transform:uppercase;">${cur}</div><div id="fx-${cur}" style="font-size:12px;color:#fff;font-weight:700;margin-top:1px;">—</div></div>`).join('')}
          </div>
        </div>
        <div style="flex: 1;">
          <div style="font-size: 9px; color: #8870a8; margin-bottom: 4px; letter-spacing: 0.1em; text-transform: uppercase;">Дата</div>
          <input id="fin-date" type="date" value="${today()}" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 12px; outline: none;" />
        </div>
      </div>
      <div style="font-size: 9px; color: #8870a8; margin-bottom: 6px; letter-spacing: 0.1em; text-transform: uppercase;">Категория</div>
      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px;" id="fin-cats">
        ${cats.map((c, idx) => `<button data-fcat="${c.id}" onclick="window.__app.selectFinCat('${c.id}')" style="padding: 8px 6px; background: ${idx === 0 ? c.color + '30' : 'transparent'}; border: 1px solid ${idx === 0 ? c.color : 'rgba(255,255,255,0.08)'}; color: ${idx === 0 ? '#fff' : '#b0a0d0'}; border-radius: 8px; font-size: 10px; cursor: pointer; font-weight: 600; line-height: 1.3;">${c.icon} ${c.name}</button>`).join('')}
      </div>
      <div style="font-size: 9px; color: #8870a8; margin-bottom: 4px; letter-spacing: 0.1em; text-transform: uppercase;">Заметка (необязательно)</div>
      <input id="fin-note" type="text" placeholder="" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 12px; outline: none; margin-bottom: 12px;" />
      <div style="display: flex; gap: 8px;">
        <button onclick="window.__app.confirmFinEntry()" style="flex: 1; padding: 11px; background: linear-gradient(135deg,${s.color},${s.color}cc); color: #000; border: none; border-radius: 8px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 700; box-shadow: 0 0 16px ${s.glow};">Записать</button>
        <button onclick="window.__app.cancelFinAdd()" style="padding: 11px 16px; background: transparent; color: #8870a8; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-size: 11px; cursor: pointer;">Отмена</button>
      </div>
    </div>`;
    setTimeout(() => {
      document.getElementById('fin-amount')?.focus();
      window.__finInputCur = state.finance?.currency || 'USD';
      // Загружаем актуальные курсы (всегда от USD)
      fetchFXRates();
    }, 50);
  } else {
    html += `<div style="display: flex; gap: 8px; margin-bottom: 14px;">
      <button onclick="window.__app.startFinAdd('income')" style="flex: 1; padding: 11px; background: rgba(16,232,145,0.1); border: 1px dashed #10E891; color: #10E891; border-radius: 10px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 700;">+ Доход</button>
      <button onclick="window.__app.startFinAdd('expense')" style="flex: 1; padding: 11px; background: rgba(255,61,113,0.1); border: 1px dashed #FF3D71; color: #FF3D71; border-radius: 10px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 700;">+ Расход</button>
    </div>`;
  }

  // Список записей — группировка по дням
  if (entries.length === 0) {
    html += `<div style="text-align:center;padding:20px;background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,0.08);border-radius:10px;font-size:12px;color:#6a5a8a;">В этом месяце пока ничего</div>`;
  } else {
    // Группируем по дате
    const byDay = {};
    entries.forEach(e => {
      if (!byDay[e.date]) byDay[e.date] = [];
      byDay[e.date].push(e);
    });
    const sortedDays = Object.keys(byDay).sort((a, b) => b.localeCompare(a));

    sortedDays.forEach(date => {
      const dayEntries = byDay[date];
      const dayIncome  = dayEntries.filter(e=>e.type==='income') .reduce((s,e)=>s+(e.amountUSD||e.amount||0),0);
      const dayExpense = dayEntries.filter(e=>e.type==='expense').reduce((s,e)=>s+(e.amountUSD||e.amount||0),0);
      const dayNet = dayIncome - dayExpense;
      const isOpen = !!view.expandedGroups?.['fin_day_' + date];

      html += `<div style="margin-bottom:5px;">
        <button onclick="window.__app.toggleGroup('fin_day_${date}')" style="width:100%;display:flex;align-items:center;gap:10px;padding:10px 13px;background:${isOpen?'rgba(255,255,255,0.05)':'rgba(255,255,255,0.025)'};border:1px solid rgba(255,255,255,0.07);border-radius:${isOpen?'10px 10px 0 0':'10px'};cursor:pointer;text-align:left;">
          <div style="flex:1;">
            <div style="font-size:13px;color:#fff;font-weight:600;">${formatDateShort(date)}</div>
            <div style="font-size:10px;color:#6a5a8a;margin-top:1px;">${dayEntries.length} ${plural(dayEntries.length,'запись','записи','записей')}</div>
          </div>
          <div style="text-align:right;flex-shrink:0;">
            ${dayIncome  > 0 ? `<div style="font-size:11px;color:#10E891;font-weight:700;">+$${dayIncome.toFixed(0)}</div>`  : ''}
            ${dayExpense > 0 ? `<div style="font-size:11px;color:#FF3D71;font-weight:700;">−$${dayExpense.toFixed(0)}</div>` : ''}
          </div>
          <div style="font-size:12px;color:#6a5a8a;flex-shrink:0;">${isOpen?'▾':'▸'}</div>
        </button>`;

      if (isOpen) {
        html += `<div style="background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.07);border-top:none;border-radius:0 0 10px 10px;padding:6px 8px;">`;
        dayEntries.forEach(e => {
          const cat = findFinCategory(e.type, e.category);
          const isIncome = e.type === 'income';
          const col = isIncome ? '#10E891' : '#FF3D71';
          const sign = isIncome ? '+' : '−';
          const amtUSD = e.amountUSD || e.amount || 0;
          // Показываем оригинальную сумму если была в другой валюте
          const origStr = (e.currency && e.currency !== 'USD')
            ? ` (${e.amount} ${e.currency})`
            : '';
          html += `<div style="display:flex;align-items:center;gap:8px;padding:8px 6px;border-bottom:1px solid rgba(255,255,255,0.04);">
            <span style="font-size:16px;flex-shrink:0;">${cat.icon}</span>
            <div style="flex:1;min-width:0;">
              <div style="font-size:12px;color:#fff;font-weight:600;">${escapeHtml(cat.name)}</div>
              ${e.note ? `<div style="font-size:10px;color:#8870a8;">${escapeHtml(e.note)}</div>` : ''}
            </div>
            <div style="text-align:right;flex-shrink:0;">
              <div style="font-size:13px;color:${col};font-weight:700;">${sign}$${amtUSD.toFixed(0)}</div>
              ${origStr ? `<div style="font-size:9px;color:#6a5a8a;">${origStr}</div>` : ''}
            </div>
            <button onclick="window.__app.removeFinEntry('${e.id}')" style="background:rgba(255,61,113,0.1);border:1px solid rgba(255,61,113,0.3);color:#FF3D71;cursor:pointer;padding:4px 8px;border-radius:6px;font-size:12px;flex-shrink:0;">✕</button>
          </div>`;
        });
        html += `</div>`;
      }

      html += `</div>`;
    });
  }

  // Круговая диаграмма расходов по категориям
  const chartPeriod = view.finChartPeriod || 'month';
  const chartMonth = view.finChartMonth || currentMonth();
  const now2 = new Date();

  let chartEntries = [];
  if (chartPeriod === 'month') {
    chartEntries = finEntriesForMonth(chartMonth).filter(e => e.type === 'expense');
  } else if (chartPeriod === 'half') {
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now2.getFullYear(), now2.getMonth() - i, 1);
      const ms = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
      chartEntries.push(...finEntriesForMonth(ms).filter(e => e.type === 'expense'));
    }
  } else {
    for (let i = 11; i >= 0; i--) {
      const d = new Date(now2.getFullYear(), now2.getMonth() - i, 1);
      const ms = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
      chartEntries.push(...finEntriesForMonth(ms).filter(e => e.type === 'expense'));
    }
  }

  const catTotals = {};
  chartEntries.forEach(e => {
    const amt = e.amountUSD || e.amount || 0;
    catTotals[e.category] = (catTotals[e.category] || 0) + amt;
  });
  const totalExp = Object.values(catTotals).reduce((s,v) => s+v, 0);

  const [cyr, cmo] = chartMonth.split('-').map(Number);
  const chartMonthLabel = MONTHS_RU[cmo-1] + ' ' + cyr;

  // Кнопки периода
  const periodBtns = [['month','Месяц'],['half','6 мес'],['year','Год']].map(([id,label]) =>
    '<button onclick="window.__app.setFinChartPeriod(\'' + id + '\')" style="padding:4px 9px;background:' + (chartPeriod===id?'#A78BFA':'transparent') + ';border:1px solid ' + (chartPeriod===id?'#A78BFA':'rgba(255,255,255,0.12)') + ';border-radius:6px;color:' + (chartPeriod===id?'#000':'#8870a8') + ';font-size:10px;font-weight:700;cursor:pointer;">' + label + '</button>'
  ).join('');

  // Селектор месяца (только в режиме month)
  const monthPicker = chartPeriod === 'month'
    ? '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:6px 10px;background:rgba(255,255,255,0.03);border-radius:8px;">'
      + '<button onclick="window.__app.shiftChartMonth(-1)" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#b0a0d0;cursor:pointer;width:28px;height:28px;border-radius:7px;font-size:14px;">&#8249;</button>'
      + '<div style="font-size:13px;color:#fff;font-weight:700;">' + chartMonthLabel + '</div>'
      + '<button onclick="window.__app.shiftChartMonth(1)" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#b0a0d0;cursor:pointer;width:28px;height:28px;border-radius:7px;font-size:14px;">&#8250;</button>'
      + '</div>'
    : '';

  html += '<div style="margin-top:16px;padding:14px;background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.05);border-radius:12px;">'
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">'
    + '<div style="font-size:10px;color:#A78BFA;letter-spacing:0.2em;text-transform:uppercase;font-weight:700;">Расходы</div>'
    + '<div style="display:flex;gap:4px;">' + periodBtns + '</div>'
    + '</div>'
    + monthPicker;

  if (totalExp === 0) {
    html += '<div style="text-align:center;padding:20px;font-size:12px;color:#6a5a8a;">Расходов за этот период нет</div>';
  } else {
    const sorted = Object.entries(catTotals).sort((a,b) => b[1]-a[1]);
    const PIE_COLORS = ['#FF3D71','#FFAA00','#00E5FF','#A78BFA','#10E891','#FF4DD8','#FF6B35','#4ECDC4','#FFD700','#B8F2E6'];
    const cx = 80, cy = 80, r = 65, rInner = 35;
    const toRad = a => a * Math.PI / 180;
    let startAngle = -90;
    let paths = '';

    sorted.forEach(([catId, amt], i) => {
      const angle = (amt / totalExp) * 360;
      const color = PIE_COLORS[i % PIE_COLORS.length];
      const endAngle = startAngle + angle;
      const x1  = cx + r      * Math.cos(toRad(startAngle));
      const y1  = cy + r      * Math.sin(toRad(startAngle));
      const x2  = cx + r      * Math.cos(toRad(endAngle));
      const y2  = cy + r      * Math.sin(toRad(endAngle));
      const xi1 = cx + rInner * Math.cos(toRad(startAngle));
      const yi1 = cy + rInner * Math.sin(toRad(startAngle));
      const xi2 = cx + rInner * Math.cos(toRad(endAngle));
      const yi2 = cy + rInner * Math.sin(toRad(endAngle));
      const large = angle > 180 ? 1 : 0;
      paths += '<path d="M ' + xi1 + ' ' + yi1 + ' L ' + x1 + ' ' + y1
        + ' A ' + r + ' ' + r + ' 0 ' + large + ' 1 ' + x2 + ' ' + y2
        + ' L ' + xi2 + ' ' + yi2
        + ' A ' + rInner + ' ' + rInner + ' 0 ' + large + ' 0 ' + xi1 + ' ' + yi1
        + ' Z" fill="' + color + '" opacity="0.9" stroke="#0a0612" stroke-width="1.5"/>';
      startAngle = endAngle;
    });

    const totalStr = totalExp < 1000 ? '$' + totalExp.toFixed(0) : '$' + (Math.round(totalExp/100)/10) + 'k';

    let legend = '';
    sorted.forEach(([catId, amt], i) => {
      const cat = findFinCategory('expense', catId);
      const pct = (amt / totalExp * 100).toFixed(0);
      const color = PIE_COLORS[i % PIE_COLORS.length];
      legend += '<div style="display:flex;align-items:center;gap:7px;margin-bottom:7px;">'
        + '<div style="width:10px;height:10px;border-radius:3px;background:' + color + ';flex-shrink:0;"></div>'
        + '<div style="flex:1;min-width:0;font-size:11px;color:#fff;font-weight:600;">' + escapeHtml(cat.name) + '</div>'
        + '<div style="text-align:right;flex-shrink:0;">'
        + '<div style="font-size:11px;color:' + color + ';font-weight:700;">$' + amt.toFixed(0) + '</div>'
        + '<div style="font-size:9px;color:#6a5a8a;">' + pct + '%</div>'
        + '</div></div>';
    });

    html += '<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">'
      + '<svg width="160" height="160" viewBox="0 0 160 160" style="flex-shrink:0;">'
      + paths
      + '<circle cx="' + cx + '" cy="' + cy + '" r="' + (rInner-2) + '" fill="#0a0612"/>'
      + '<text x="' + cx + '" y="' + (cy-6) + '" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold" font-family="-apple-system,sans-serif">' + totalStr + '</text>'
      + '<text x="' + cx + '" y="' + (cy+10) + '" text-anchor="middle" fill="#6a5a8a" font-size="9" font-family="-apple-system,sans-serif">расходов</text>'
      + '</svg>'
      + '<div style="flex:1;min-width:0;">' + legend + '</div>'
      + '</div>';
  }

  html += '</div>';
  return html;
}

    const renderTaskRow = (t, opts = {}) => {

      const stats = t.repeating ? taskStats(t.taskKey, 'all') : null;

      const statsLine = stats && stats.count > 0

      const mandatoryBadge = (t.mandatory && !opts.compact) ? `<span style="font-size: 8px; padding: 2px 6px; background: ${s.color}25; color: ${s.color}; border: 1px solid ${s.color}50; border-radius: 6px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; margin-left: 6px; vertical-align: middle;">★ обязат.</span>` : '';

        <button onclick="window.__app.completeQuick('${s.id}', '${t.id}')" style="width: ${opts.compact ? '26px' : '28px'}; height: ${opts.compact ? '26px' : '28px'}; border-radius: 50%; background: transparent; border: 2px solid ${s.color}; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; padding: 0; box-shadow: 0 0 8px ${s.glow};"><span style="color: ${s.color}; font-size: 13px; font-weight: 700;">✓</span></button>
        <div style="flex: 1; min-width: 0;">

oin('')}</div>` : `<div style="background: rgba(0,0,0,0.3); border: 1px solid ${s.color}40; border-radius: 10px; padding: 12px; margin-bottom: 12px;"><div style="font-size: 10px; color: #8870a8; letter-spacing: 0.2em; margin-bottom: 8px; text-transform: uppercase; font-weight: 600;">Часов на одно выполнение (по умолчанию)</div><div style="display: flex; align-items: center; gap: 12px;"><input id="hours-input" type="number" min="0.5" max="12" step="0.5" value="1" oninput="window.__app.updateHourPreview()" style="flex: 1; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 16px; outline: none; text-align: center;" /><div style="font-size: 11px; color: #8870a8;">→</div><div id="hour-preview" style="font-size: 16px; color: ${s.color}; font-weight: 700; min-width: 70px; text-align: right;">+25 XP</div></div><div style="font-size: 10px; color: #6a5a8a; margin-top: 8px; line-height: 1.5;">При выполнении сможешь ввести любое число часов. 1ч = 25 XP.</div></div>`}<label style="display: flex; align-items: center; gap: 8px; font-size: 11px; color: #b0a0d0; margin-bottom: 12px; cursor: pointer;"><input id="repeat-check" type="checkbox" checked style="accent-color: ${s.color};" />Повторяющаяся (попадёт в «Учёт»)</label><div style="display: flex; gap: 8px;"><button onclick="window.__app.confirmAddTask('${s.id}')" style="flex: 1; padding: 11px; background: linear-gradient(135deg,${s.color},${s.color}cc); color: #000; border: none; border-radius: 8px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 700; box-shadow: 0 0 16px ${s.glow};">Добавить</button><button onclick="window.__app.cancelAddTask()" style="padding: 11px 16px; background: transparent; color: #8870a8; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-size: 11px; cursor: pointer;">Отмена</button></div></div>`;

  // Мини-блок прогресса к следующему этапу
  let stageProgressHtml = '';

function addSkillSession(skillId, subId, hours, date, note) {
  const sk = (state.skills || []).find(x => x.id === skillId);
  if (!sk) return;
  const sub = findSkillSub(sk, subId);
  const isInvert = sub && sub.invertGood;
  // Антиметрика: записываем как «случай», 0 XP, 0 часов в общий счётчик сферы
  const xp = isInvert ? 0 : xpForHours(hours);
  const hoursForHistory = isInvert ? 0 : hours;
  const title = `${sk.name}${sub ? ` — ${sub.name}` : ''}${isInvert ? ' [случай]' : ''}${note ? ` · ${note}` : ''}`;
  const sphereId = sk.sphereId || 'skills';
  state.history.push({
    id: Date.now().toString(),
    sphere: sphereId,
    title,
    taskKey: `skill_${skillId}_${subId || 'none'}`,
    skillId, subId,
    xp,
    hours: hoursForHistory,
    rawCount: isInvert ? hours : null,
    date: date || today(),
    timestamp: Date.now(),
    note: note || ''
  });

  // Тост о записи
  const sphere = SPHERES.find(s => s.id === sphereId);
  const prog = sphereProgressForStage(sphereId, currentStageId());
  let toastText;
  if (isInvert) {
    toastText = `⚠ ${sub.name} +${hours}`;
    showToast(toastText, '#FF3D71');
  } else {
    const targetType = SPHERE_TARGET_TYPE[sphereId];
    if (targetType === 'hours') {
      toastText = `${sphere.emoji} ${sphere.name} +${hours}ч → ${prog.current.toFixed(1)}/${prog.target}ч`;
    } else {
      toastText = `${sphere.emoji} ${sphere.name} +${hours}ч`;
    }
    showToast(toastText, sphere.color);
  }
  const stageUnlocked = checkUnlocks();
  const newAch = checkAchievements();
  save();
  if (stageUnlocked) {
    showCelebration('Этап открыт', 'Карта пути');
    setTimeout(() => { newAch.forEach((a, i) => setTimeout(() => showCelebration(a.name, 'Достижение'), i * 1800)); }, 3200);
  } else if (newAch.length) {
    newAch.forEach((a, i) => setTimeout(() => showCelebration(a.name, 'Достижение'), i * 1800));
  }
  render();
}

window.__app = {
  editWhy() { view.editingWhy = true; render(); setTimeout(() => { const el = document.getElementById('why-input'); if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); } }, 50); },
  cancelWhy() { view.editingWhy = false; render(); },
  saveWhy() { const el = document.getElementById('why-input'); if (el) { state.why = el.value.trim(); view.editingWhy = false; save(); render(); } },
  saveContract(stageId) {
    const el = document.getElementById('contract-input-' + stageId);
    if (!el) return;
    state.stageContracts[stageId] = el.value.trim();
    save();
    showToast('🔒 Контракт запечатан — откроется вместе с этапом', '#FFAA00');
    render();
  },
  next: () => { view.onboardStep++; render(); },
  prev: () => { view.onboardStep--; render(); },
  setAnswer: (sid, qid, val) => { state.context[sid][qid] = val; save(); },
  finishOnboarding: () => { state.onboardingDone = true; state.startedAt = today(); state.stagesUnlocked = { s0: today() }; checkAchievements(); save(); render(); },
  tab: t => { view.tab = t; render(); },
  openSphere: id => { view.sphereId = id; view.contextVisible = false; render(); },
  openStage: id => { view.stageId = id; render(); },
  editGoal: (sphereId) => {
    if (view.editingGoalSphere === sphereId) {
      const el = document.getElementById('goal-edit-' + sphereId);
      const dl = document.getElementById('goal-deadline-' + sphereId);
      if (el) {
        const val = el.value.trim();
        const months = dl ? parseInt(dl.value) : 12;
        if (!state.context) state.context = {};
        if (!state.context[sphereId]) state.context[sphereId] = {};
        state.context[sphereId].goal = val;
        state.context[sphereId].deadline = months;
        if (sphereId === 'skills') state.context[sphereId].wanted = val;
        if (sphereId === 'career') state.context[sphereId].criteria = val;
        save();
      }
      view.editingGoalSphere = null;
    } else {
      view.editingGoalSphere = sphereId;
    }
    render();
  },
  openAch: id => { view.achId = id; render(); },
  closeModal: () => { view.sphereId = null; view.stageId = null; view.achId = null; view.addingTask = false; view.addMode = 'simple'; render(); },
  toggleContext: () => { view.contextVisible = !view.contextVisible; render(); },
  startAddTask: () => { view.addingTask = true; currentDifficulty = 'medium'; view.addMode = 'simple'; render(); },
  cancelAddTask: () => { view.addingTask = false; view.addMode = 'simple'; render(); },
  setAddMode: m => { view.addMode = m; render(); },
  setDiff: d => {
    currentDifficulty = d;
    document.querySelectorAll('#diff-row button').forEach(b => {
      const sphere = SPHERES.find(x => x.id === view.sphereId);
      const isActive = b.dataset.diff === d;
      b.style.background = isActive ? sphere.color : 'transparent';
      b.style.color = isActive ? '#000' : '#b0a0d0';
      b.style.borderColor = isActive ? sphere.color : 'rgba(255,255,255,0.1)';
    });
  },

  bodyPickPhoto: (input) => {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const ratio = Math.min(600 / img.width, 600 / img.height, 1);
        canvas.width = Math.round(img.width * ratio);
        canvas.height = Math.round(img.height * ratio);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        window.__bodyPhoto = canvas.toDataURL('image/jpeg', 0.75);
        const thumb = document.getElementById('body-photo-thumb');
        if (thumb) thumb.innerHTML = '<img src="' + window.__bodyPhoto + '" style="width:100%;height:100%;object-fit:cover;" />';
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  },
