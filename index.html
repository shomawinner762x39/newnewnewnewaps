  --bg: #f0e6d2; --bg-grad: radial-gradient(ellipse at 0% 0%, rgba(200,160,100,0.20), transparent 50%), radial-gradient(ellipse at 100% 100%, rgba(160,120,80,0.14), transparent 50%), #f0e6d2;
  --surface: #faf2e0; --surface-2: #ede0c4; --surface-3: #e0d0a8;
  --border: #5a3a1c; --border-2: #4a2e14;
  --text-1: #2a1a08; --text-2: #4a3018; --text-3: #6e4a28; --text-4: #927040; --text-5: #b89a68;
  --accent: #8b5a2b; --accent-2: #663c14;
  --accent-grad: linear-gradient(135deg, #8b5a2b 0%, #c8884a 100%);
  --accent-fg: #faf2e0; --accent-soft: rgba(139,90,43,0.16);
  --tabbar: #faf2e0; --tabbar-border: #5a3a1c;
  --modal: linear-gradient(180deg, #faf2e0, #f0e6d2);
  --input: #ffffff; --input-border: #5a3a1c; --ink: #2a1a08;
}

/* 8. Cyber — кибер-неон, индиго + ярко-маджента */
html[data-theme="creative"][data-palette="cyber"] {
  --bg: #0a0524; --bg-grad: radial-gradient(ellipse at 20% 0%, rgba(255,46,184,0.20), transparent 55%), radial-gradient(ellipse at 80% 100%, rgba(60,200,255,0.18), transparent 55%), #0a0524;
  --surface: #140a36; --surface-2: #1a0e44; --surface-3: #221456;
  --border: #5a3aa8; --border-2: #482e88;
  --text-1: #f0e0ff; --text-2: #d4b8f0; --text-3: #a884c8; --text-4: #7a5a98; --text-5: #4e3868;
  --accent: #ff2eb8; --accent-2: #d10090;
  --accent-grad: linear-gradient(135deg, #ff2eb8 0%, #4dd6ff 100%);
  --accent-fg: #0a0212; --accent-soft: rgba(255,46,184,0.20);
  --tabbar: #06031c; --tabbar-border: #5a3aa8;
  --modal: linear-gradient(180deg, #140a36, #0a0524);
  --input: #06031c; --input-border: #5a3aa8; --ink: #f0e0ff;
}

/* 9. Sage — пыльный шалфей, приглушённый */
html[data-theme="creative"][data-palette="sage"] {
  --bg: #1e2820; --bg-grad: radial-gradient(ellipse at 0% 0%, rgba(150,180,140,0.14), transparent 55%), radial-gradient(ellipse at 100% 100%, rgba(180,160,120,0.10), transparent 55%), #1e2820;
  --surface: #283328; --surface-2: #2e3a2e; --surface-3: #364438;
  --border: #5a6e54; --border-2: #4a5c46;
  --text-1: #e4ecdc; --text-2: #c8d4ba; --text-3: #98a888; --text-4: #6e7c5e; --text-5: #4c5840;
  --accent: #a8c098; --accent-2: #7e9c6a;
  --accent-grad: linear-gradient(135deg, #a8c098 0%, #d8d4a0 100%);
  --accent-fg: #0e1408; --accent-soft: rgba(168,192,152,0.20);
  --tabbar: #14180f; --tabbar-border: #5a6e54;
  --modal: linear-gradient(180deg, #283328, #1e2820);
  --input: #14180f; --input-border: #5a6e54; --ink: #e4ecdc;
}

/* 10. Brass — чёрный антикварный + латунь/золото */
html[data-theme="creative"][data-palette="brass"] {
  --bg: #0a0a08; --bg-grad: radial-gradient(ellipse at 30% 0%, rgba(220,170,40,0.12), transparent 55%), #0a0a08;
  --surface: #14140e; --surface-2: #1c1a12; --surface-3: #26221a;
  --border: #6a5818; --border-2: #524410;
  --text-1: #f5e8b8; --text-2: #d8c486; --text-3: #a89c5e; --text-4: #786c40; --text-5: #4e4628;
  --accent: #d4a020; --accent-2: #a87810;
  --accent-grad: linear-gradient(135deg, #d4a020 0%, #f0c84a 100%);
  --accent-fg: #0a0a08; --accent-soft: rgba(212,160,32,0.20);
  --tabbar: #050504; --tabbar-border: #6a5818;
  --modal: linear-gradient(180deg, #14140e, #0a0a08);
  --input: #050504; --input-border: #6a5818; --ink: #f5e8b8;
}

/* 11. Tricolor — чёрный фон, серые поверхности, белый акцент */
html[data-theme="creative"][data-palette="tricolor"] {
  --bg: #0a0a0a; --bg-grad: #0a0a0a;
  --surface: #1c1c1c; --surface-2: #262626; --surface-3: #333333;
  --border: #6a6a6a; --border-2: #525252;
  --text-1: #ffffff; --text-2: #d8d8d8; --text-3: #a0a0a0; --text-4: #707070; --text-5: #4a4a4a;
  --accent: #ffffff; --accent-2: #d0d0d0;
  --accent-grad: linear-gradient(135deg, #ffffff 0%, #888888 100%);
  --accent-fg: #0a0a0a; --accent-soft: rgba(255,255,255,0.10);
  --tabbar: #050505; --tabbar-border: #6a6a6a;
  --modal: linear-gradient(180deg, #1c1c1c, #0a0a0a);
  --input: #050505; --input-border: #6a6a6a; --ink: #ffffff;
}

html[data-theme="notion"] {
  --bg: #ffffff;
  --bg-grad: #ffffff;
  --surface: #ffffff;
  --surface-2: #f7f6f3;
  --surface-3: #efeee9;
  --border: rgba(55,53,47,0.09);
  --border-2: rgba(55,53,47,0.16);
  --text-1: #37352f;
  --text-2: #6f6e69;
  --text-3: #8b8a85;
  --text-4: #a8a7a2;
  --text-5: #c8c7c2;
  --accent: #2383e2;
  --accent-2: #0b6bcb;
  --accent-grad: linear-gradient(135deg, #2383e2, #0b6bcb);
  --accent-fg: #ffffff;
  --accent-soft: rgba(35,131,226,0.10);
  --tabbar: rgba(255,255,255,0.96);
  --tabbar-border: rgba(55,53,47,0.09);
  --modal: #ffffff;
  --input: #f7f6f3;
  --input-border: rgba(55,53,47,0.16);
  --font: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
  --r-card: 4px;
  --r-card-2: 4px;
  --r-btn: 4px;
}

html[data-theme="editorial"] {
  --bg: #f1ead8;
  --bg-grad: #f1ead8;
  --surface: #faf4e2;
  --surface-2: #e9dfc4;
  --surface-3: #ddd0ad;
  --border: #1a1a1a;
  --border-2: #1a1a1a;
  --text-1: #141414;
  --text-2: #2a2a2a;
  --text-3: #5a5a5a;
  --text-4: #888888;
  --text-5: #b0b0b0;
  --accent: #8b1a1a;
  --accent-2: #5d0d0d;
  --accent-grad: linear-gradient(90deg, #8b1a1a, #6a1010);
  --accent-fg: #faf4e2;
  --accent-soft: rgba(139,26,26,0.08);
  --tabbar: #faf4e2;
  --tabbar-border: #1a1a1a;
  --modal: #faf4e2;
  --input: #ffffff;
  --input-border: #1a1a1a;
  --font: 'Spectral', Georgia, 'Times New Roman', serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  --r-card: 0px;
  --r-card-2: 0px;
  --r-btn: 0px;
}

/* ============== ОБЩИЕ ОВЕРРАЙДЫ ДЛЯ НЕ-ОРИГИНАЛЬНЫХ ТЕМ ============== */

html:not([data-theme="dark"]) html,
html:not([data-theme="dark"]) body {
  background: var(--bg) !important;
  color: var(--text-1) !important;
  font-family: var(--font) !important;
}
html:not([data-theme="dark"]) body { background: var(--bg-grad) !important; background-attachment: fixed !important; }

/* date-input в светлой схеме */
html:not([data-theme="dark"]) input[type="date"] { color-scheme: light !important; }

/* ===== Поверхности (карточки) — фон ===== */
html:not([data-theme="dark"]) [style*="background: rgba(255,255,255,0.02)"],
html:not([data-theme="dark"]) [style*="background: rgba(255,255,255,0.025)"],
html:not([data-theme="dark"]) [style*="background: rgba(255,255,255,0.03)"],
html:not([data-theme="dark"]) [style*="background:rgba(255,255,255,0.03)"],
html:not([data-theme="dark"]) [style*="background: rgba(255,255,255,0.04)"],
html:not([data-theme="dark"]) [style*="background: rgba(255,255,255,0.05)"],
html:not([data-theme="dark"]) [style*="background:rgba(255,255,255,0.05)"] {
  background: var(--surface) !important;
}
html:not([data-theme="dark"]) [style*="background: rgba(255,255,255,0.06)"],
html:not([data-theme="dark"]) [style*="background:rgba(255,255,255,0.06)"],
html:not([data-theme="dark"]) [style*="background: rgba(255,255,255,0.08)"],
html:not([data-theme="dark"]) [style*="background: rgba(255,255,255,0.10)"] {
  background: var(--surface-2) !important;
}

/* ===== Инпуты (тёмные в оригинале → светлые) ===== */
html:not([data-theme="dark"]) [style*="background: rgba(0,0,0,0.2)"],
html:not([data-theme="dark"]) [style*="background:rgba(0,0,0,0.2)"],
html:not([data-theme="dark"]) [style*="background: rgba(0,0,0,0.25)"],
html:not([data-theme="dark"]) [style*="background:rgba(0,0,0,0.25)"],
html:not([data-theme="dark"]) [style*="background: rgba(0,0,0,0.3)"],
html:not([data-theme="dark"]) [style*="background:rgba(0,0,0,0.3)"],
html:not([data-theme="dark"]) [style*="background: rgba(0,0,0,0.4)"],
html:not([data-theme="dark"]) [style*="background:rgba(0,0,0,0.4)"],
html:not([data-theme="dark"]) [style*="background: rgba(0,0,0,0.5)"],
html:not([data-theme="dark"]) [style*="background:rgba(0,0,0,0.5)"] {
  background: var(--input) !important;
}

/* ===== Таб-бар внизу ===== */
html:not([data-theme="dark"]) [style*="background: rgba(10,6,18,0.95)"] {
  background: var(--tabbar) !important;
  border-top-color: var(--tabbar-border) !important;
}

/* ===== Модал ===== */
html:not([data-theme="dark"]) [style*="linear-gradient(180deg, #150a25, #0a0612)"],
html:not([data-theme="dark"]) [style*="linear-gradient(180deg,#150a25,#0a0612)"] {
  background: var(--modal) !important;
}

/* Модал-оверлей затемнение */
html:not([data-theme="dark"]) [style*="background: rgba(0,0,0,0.7)"] {
  background: rgba(20,20,20,0.42) !important;
}

/* ===== Главный CTA-градиент A78BFA → FF4DD8 ===== */
html:not([data-theme="dark"]) [style*="linear-gradient(135deg,#A78BFA,#FF4DD8)"],
html:not([data-theme="dark"]) [style*="linear-gradient(135deg, #A78BFA,#FF4DD8)"],
html:not([data-theme="dark"]) [style*="linear-gradient(135deg, #A78BFA, #FF4DD8)"],
html:not([data-theme="dark"]) [style*="linear-gradient(90deg, #A78BFA, #FF4DD8)"],
html:not([data-theme="dark"]) [style*="linear-gradient(90deg,#A78BFA,#FF4DD8)"] {
  background: var(--accent-grad) !important;
  color: var(--accent-fg) !important;
}

/* Текст с -webkit-background-clip:text и фиолетовым градиентом — становится цветом акцента */
html:not([data-theme="dark"]) [style*="-webkit-background-clip: text"][style*="A78BFA"],
html:not([data-theme="dark"]) [style*="-webkit-background-clip:text"][style*="A78BFA"] {
  background: none !important;
  -webkit-background-clip: border-box !important;
  -webkit-text-fill-color: var(--accent) !important;
  color: var(--accent) !important;
}

/* Карточка текущего этапа (Path) — purple-pink gradient → акцент-фон */
html:not([data-theme="dark"]) [style*="rgba(167,139,250,0.18)"][style*="rgba(255,77,216,0.08)"] {
  background: var(--accent-soft) !important;
  border-color: var(--accent) !important;
}
html:not([data-theme="dark"]) [style*="linear-gradient(90deg,#A78BFA,#FF4DD8)"] {
  background: var(--accent-grad) !important;
}
html:not([data-theme="dark"]) [style*="linear-gradient(90deg,#10E891,#A78BFA)"] {
  background: linear-gradient(90deg, #16a34a, var(--accent)) !important;
}

/* Бэкап-баннер (cyan/purple) — нейтральная инфо-карточка */
html:not([data-theme="dark"]) [style*="rgba(0,229,255,0.15)"][style*="rgba(167,139,250,0.1)"] {
  background: var(--accent-soft) !important;
  border-bottom-color: var(--accent) !important;
}
html:not([data-theme="dark"]) [style*="rgba(0,229,255,0.3)"] {
  border-color: var(--accent) !important;
}

/* ===== Границы (нейтральные белые с альфой) ===== */
html:not([data-theme="dark"]) [style*="border: 1px solid rgba(255,255,255"],
html:not([data-theme="dark"]) [style*="border:1px solid rgba(255,255,255"] {
  border-color: var(--border) !important;
}
html:not([data-theme="dark"]) [style*="border: 1px dashed rgba(255,255,255"] {
  border-color: var(--border-2) !important;
}
html:not([data-theme="dark"]) [style*="border-top: 1px solid rgba(255,255,255"] {
  border-top-color: var(--border) !important;
}
html:not([data-theme="dark"]) [style*="border-bottom: 1px solid rgba(255,255,255"] {
  border-bottom-color: var(--border) !important;
}
html:not([data-theme="dark"]) [style*="border-left: 1px solid rgba(255,255,255"] {
  border-left-color: var(--border) !important;
}

/* Линии-разделители (height:1px;background:rgba(255,255,255,0.08)) */
html:not([data-theme="dark"]) [style*="height:1px;background:rgba(255,255,255,0.08)"],
html:not([data-theme="dark"]) [style*="height: 1px; background: rgba(255,255,255,0.08)"] {
  background: var(--border) !important;
}

/* ===== Текст: основные цвета ===== */
html:not([data-theme="dark"]) [style*="color: #fff;"],
html:not([data-theme="dark"]) [style*="color:#fff;"],
html:not([data-theme="dark"]) [style*="color: #fff\""],
html:not([data-theme="dark"]) [style*="color: #fff "],
html:not([data-theme="dark"]) [style*="color:#fff "],
html:not([data-theme="dark"]) [style*="color: #fff}"],
html:not([data-theme="dark"]) [style*="color: #ffffff"],
html:not([data-theme="dark"]) [style*="color: #e8e0ff"] {
  color: var(--text-1) !important;
}
html:not([data-theme="dark"]) [style*="color: #b0a0d0"],
html:not([data-theme="dark"]) [style*="color:#b0a0d0"] {
  color: var(--text-2) !important;
}
html:not([data-theme="dark"]) [style*="color: #8870a8"],
html:not([data-theme="dark"]) [style*="color:#8870a8"] {
  color: var(--text-3) !important;
}
html:not([data-theme="dark"]) [style*="color: #6a5a8a"],
html:not([data-theme="dark"]) [style*="color:#6a5a8a"] {
  color: var(--text-4) !important;
}
html:not([data-theme="dark"]) [style*="color: #5a4a78"],
html:not([data-theme="dark"]) [style*="color:#5a4a78"] {
  color: var(--text-4) !important;
}
html:not([data-theme="dark"]) [style*="color: #3a2a58"],
html:not([data-theme="dark"]) [style*="color:#3a2a58"] {
  color: var(--text-5) !important;
}

/* ===== Акцентные цвета (purple/pink) → акцент темы ===== */
html:not([data-theme="dark"]) [style*="color: #A78BFA"],
html:not([data-theme="dark"]) [style*="color:#A78BFA"],
html:not([data-theme="dark"]) [style*="color: #FF4DD8"],
html:not([data-theme="dark"]) [style*="color:#FF4DD8"] {
  color: var(--accent) !important;
}

/* ===== Свечения и неон-тени убираем ===== */
html:not([data-theme="dark"]) [style*="text-shadow: 0 0"],
html:not([data-theme="dark"]) [style*="text-shadow:0 0"] {
  text-shadow: none !important;
}
html:not([data-theme="dark"]) [style*="box-shadow: 0 0 16px"],
html:not([data-theme="dark"]) [style*="box-shadow: 0 0 12px"],
html:not([data-theme="dark"]) [style*="box-shadow: 0 0 10px"],
html:not([data-theme="dark"]) [style*="box-shadow: 0 0 14px"],
html:not([data-theme="dark"]) [style*="box-shadow: 0 -10px 40px"],
html:not([data-theme="dark"]) [style*="box-shadow:0 0 10px"],
html:not([data-theme="dark"]) [style*="box-shadow: 0 4px 20px"] {
  box-shadow: none !important;
}

/* ===== Активный таб ===== */
html:not([data-theme="dark"]) [style*="color: #A78BFA"][style*="border: none"] {
  color: var(--accent) !important;
}

/* ===== Скроллбар ===== */
html:not([data-theme="dark"]) ::-webkit-scrollbar-track { background: transparent !important; }
html:not([data-theme="dark"]) ::-webkit-scrollbar-thumb { background: var(--text-4) !important; opacity: 0.5; }

/* ===== Фокус-ринг для инпутов ===== */
html:not([data-theme="dark"]) textarea:focus,
html:not([data-theme="dark"]) input:focus,
html:not([data-theme="dark"]) select:focus {
  border-color: var(--accent) !important;
  box-shadow: 0 0 0 3px var(--accent-soft) !important;
}

/* Плейсхолдер */
html:not([data-theme="dark"]) ::placeholder { color: var(--text-4) !important; opacity: 1; }

/* ===== СФЕРНЫЕ КАРТОЧКИ (Древо) — мягкая тонировка вместо неоновой ===== */
/* Для Pro / Notion слабо тонируем сферой; Creative и Editorial оставляем сильнее */
html[data-theme="pro"]    [style*="linear-gradient(160deg,"],
html[data-theme="notion"] [style*="linear-gradient(160deg,"] {
  background: var(--surface) !important;
}
html[data-theme="pro"]    [style*="linear-gradient(160deg,"] { box-shadow: 0 1px 2px rgba(15,23,42,0.04), 0 0 0 1px var(--border) !important; border-color: transparent !important; }

/* ============== PRO ============== */
html[data-theme="pro"] [style*="border-radius: 16px"] { border-radius: var(--r-card) !important; }
html[data-theme="pro"] [style*="border-radius:16px"]   { border-radius: var(--r-card) !important; }
html[data-theme="pro"] [style*="border-radius: 14px"] { border-radius: var(--r-card-2) !important; }
html[data-theme="pro"] [style*="border-radius:14px"]  { border-radius: var(--r-card-2) !important; }
html[data-theme="pro"] [style*="border-radius: 12px"] { border-radius: var(--r-card-2) !important; }
html[data-theme="pro"] [style*="border-radius:12px"]  { border-radius: var(--r-card-2) !important; }
html[data-theme="pro"] [style*="border-radius: 10px"] { border-radius: var(--r-btn) !important; }
html[data-theme="pro"] [style*="border-radius:10px"]  { border-radius: var(--r-btn) !important; }
html[data-theme="pro"] [style*="border-radius: 20px 20px 0 0"] { border-radius: 16px 16px 0 0 !important; }

/* Pro: убираем декоративные блобы в углах сферных карточек */
html[data-theme="pro"] [style*="radial-gradient(circle,"][style*="35, transparent 70%"] {
  display: none !important;
}

/* Pro: тёплая иконка — спокойнее */
html[data-theme="pro"] [style*="border-top: 3px solid"] { border-top-width: 1px !important; }

/* ============== CREATIVE ============== */
html[data-theme="creative"] body { letter-spacing: -0.005em; }

html[data-theme="creative"] [style*="border-radius: 16px"],
html[data-theme="creative"] [style*="border-radius:16px"]  { border-radius: 24px !important; }
html[data-theme="creative"] [style*="border-radius: 14px"],
html[data-theme="creative"] [style*="border-radius:14px"]  { border-radius: 20px !important; }
html[data-theme="creative"] [style*="border-radius: 12px"],
html[data-theme="creative"] [style*="border-radius:12px"]  { border-radius: 18px !important; }
html[data-theme="creative"] [style*="border-radius: 10px"],
html[data-theme="creative"] [style*="border-radius:10px"]  { border-radius: 14px !important; }
html[data-theme="creative"] [style*="border-radius: 8px"]  { border-radius: 12px !important; }

/* Creative: толстая контурная рамка + сдвинутая тень у карточек */
html[data-theme="creative"] [style*="linear-gradient(160deg,"] {
  border: 2px solid var(--ink) !important;
  box-shadow: 4px 4px 0 var(--ink) !important;
}
html[data-theme="creative"] [style*="border: 1px solid rgba(255,255,255"] {
  border-width: 2px !important;
  border-color: var(--ink) !important;
}
html[data-theme="creative"] [style*="border: 1px solid rgba(167,139,250"] {
  border-color: var(--ink) !important;
  border-width: 2px !important;
}

/* Creative: кнопки CTA — обводка-стикер */
html[data-theme="creative"] button[style*="linear-gradient(135deg,#A78BFA,#FF4DD8)"],
html[data-theme="creative"] button[style*="linear-gradient(135deg, #A78BFA, #FF4DD8)"] {
  border: 2px solid var(--ink) !important;
  box-shadow: 3px 3px 0 var(--ink) !important;
  color: var(--accent-fg) !important;
}

/* Creative: легкое наклонение для сферных карточек на Древе */
html[data-theme="creative"] #app-root > div > div[style*="grid-template-columns: repeat(2, 1fr)"] > button:nth-child(odd)  { transform: rotate(-0.5deg); }
html[data-theme="creative"] #app-root > div > div[style*="grid-template-columns: repeat(2, 1fr)"] > button:nth-child(even) { transform: rotate(0.5deg); }

html[data-theme="notion"] [style*="border-radius: 16px"],

html[data-theme="notion"] [style*="border-radius:10px"]  { border-radius: 4px !important; }

html[data-theme="notion"] [style*="border-radius: 6px"]  { border-radius: 3px !important; }
html[data-theme="notion"] [style*="border-radius: 20px 20px 0 0"] { border-radius: 8px 8px 0 0 !important; }

/* Notion: сферные карточки — без рамки и тени, плоский серый callout */
html[data-theme="notion"] [style*="linear-gradient(160deg,"] {
  background: var(--surface-2) !important;

  box-shadow: none !important;
}

/* Notion: спрятать декоративные блобы */

/* Notion: иконки сферы остаются цветными, но без свечения */

/* ============== EDITORIAL ============== */
html[data-theme="editorial"] body { letter-spacing: 0.005em; }

/* Все радиусы → 0 */
html[data-theme="editorial"] [style*="border-radius:"] { border-radius: 0 !important; }

/* Все границы — чёрный 1px */
html[data-theme="editorial"] [style*="border: 1px solid"] { border-color: #1a1a1a !important; }
html[data-theme="editorial"] [style*="border-top: 1px solid"] { border-top-color: #1a1a1a !important; }

/* Editorial: цифры моноширинные */

}

/* Editorial: верхние всекапсные мелкие лейблы — моно */

html[data-theme="editorial"] [style*="letter-spacing: 0.3em"],
html[data-theme="editorial"] [style*="letter-spacing:0.3em"],

  font-family: var(--font-mono) !important;

}

/* Editorial: убираем мягкие тени и блобы */
html[data-theme="editorial"] [style*="radial-gradient(circle,"][style*="35, transparent 70%"] {
  display: none !important;
}

/* Editorial: оверлей модала — кремовый */

}

/* ============== ПЕРЕКЛЮЧАТЕЛЬ ТЕМ ============== */
#kp-theme-toggle {
  position: fixed;
  top: calc(env(safe-area-inset-top, 0px) + 12px);
  right: 12px;
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-items: flex-end;
}
#kp-theme-toggle .kp-th-btn {
  background: rgba(20,20,30,0.7);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.18);
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  padding: 7px 11px;
  border-radius: 999px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  transition: transform 0.15s ease, opacity 0.15s ease;
}
#kp-theme-toggle .kp-th-btn:hover { transform: translateY(-1px); }
#kp-theme-toggle .kp-th-btn .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: linear-gradient(135deg, #A78BFA, #FF4DD8);
}
#kp-theme-menu {
  display: none;
  flex-direction: column;
  gap: 4px;
  background: rgba(20,20,30,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 12px;
  padding: 6px;
  min-width: 180px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}
#kp-theme-menu.open { display: flex; animation: kp-th-pop 0.15s ease; }
@keyframes kp-th-pop {
  from { opacity: 0; transform: translateY(-6px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0)    scale(1); }
}
#kp-theme-menu button {
  background: none;
  border: none;
  color: #e8e0ff;
  font-family: inherit;
  font-size: 12px;
  text-align: left;
  padding: 9px 10px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  font-weight: 500;
}
#kp-theme-menu button:hover { background: rgba(255,255,255,0.07); }
#kp-theme-menu button.active { background: rgba(167,139,250,0.18); color: #fff; }
#kp-theme-menu button .sw {
  width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0;
  border: 1px solid rgba(255,255,255,0.2);
}
#kp-theme-menu button .meta {
  display: flex; flex-direction: column; gap: 1px;
}
#kp-theme-menu button .meta b { font-weight: 600; font-size: 12px; }
#kp-theme-menu button .meta span { font-size: 10px; color: #b0a0d0; letter-spacing: 0.04em; }

/* Кнопка тёмного оверлея для светлых тем */
html:not([data-theme="dark"]) #kp-theme-toggle .kp-th-btn {
  background: var(--surface) !important;
  color: var(--text-1) !important;
  border: 1px solid var(--border) !important;
  box-shadow: 0 4px 14px rgba(15,23,42,0.08) !important;
}
html:not([data-theme="dark"]) #kp-theme-menu {
  background: var(--surface) !important;
  border: 1px solid var(--border) !important;
  box-shadow: 0 10px 40px rgba(15,23,42,0.12) !important;
}
html:not([data-theme="dark"]) #kp-theme-menu button { color: var(--text-1) !important; }
html:not([data-theme="dark"]) #kp-theme-menu button:hover { background: var(--surface-2) !important; }
html:not([data-theme="dark"]) #kp-theme-menu button.active { background: var(--accent-soft) !important; color: var(--accent) !important; }
html[data-theme="creative"] #kp-theme-toggle .kp-th-btn { border-width: 2px !important; border-color: var(--ink) !important; box-shadow: 3px 3px 0 var(--ink) !important; border-radius: 999px !important; }
html[data-theme="creative"] #kp-theme-menu { border-width: 2px !important; border-color: var(--ink) !important; box-shadow: 4px 4px 0 var(--ink) !important; border-radius: 18px !important; }

/* Палитра-полоска внутри меню — видна только в творческой теме */
#kp-palette-row { display: none; padding: 10px 6px 4px; gap: 10px; flex-wrap: wrap; border-top: 1px solid var(--border, rgba(255,255,255,0.12)); margin-top: 4px; align-items: center; justify-content: center; }
html[data-theme="creative"] #kp-palette-row { display: flex; }
#kp-palette-row .kp-pal {
  width: 36px; height: 36px;
  padding: 0;
  border: 2px solid var(--ink, #1a0f00);
  border-radius: 50%;

  background: #fff;
  box-shadow: 2px 2px 0 var(--ink, #1a0f00);

}
#kp-palette-row .kp-pal:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--ink, #1a0f00); }
#kp-palette-row .kp-pal.active { transform: translate(0,0); box-shadow: 0 0 0 3px #fff, 0 0 0 5px var(--ink, #1a0f00); }
#kp-palette-row .kp-pal[data-pal="vermillion"] { background: linear-gradient(135deg,#2a1810 0%,#2a1810 50%,#d97742 50%,#d97742 100%); }
#kp-palette-row .kp-pal[data-pal="sunset"]     { background: linear-gradient(135deg,#3a1230 0%,#3a1230 50%,#ff8a5b 50%,#ff8a5b 100%); }

#kp-palette-row .kp-pal[data-pal="lava"]       { background: linear-gradient(135deg,#0e0a08 0%,#0e0a08 50%,#ff5530 50%,#ff5530 100%); }
#kp-palette-row .kp-pal[data-pal="forest"]     { background: linear-gradient(135deg,#0e1c12 0%,#0e1c12 50%,#a8c83a 50%,#a8c83a 100%); }
#kp-palette-row .kp-pal[data-pal="plum"]       { background: linear-gradient(135deg,#1f0d1f 0%,#1f0d1f 50%,#e070a8 50%,#e070a8 100%); }
#kp-palette-row .kp-pal[data-pal="latte"]      { background: linear-gradient(135deg,#e8dcc4 0%,#e8dcc4 50%,#8b5a2b 50%,#8b5a2b 100%); }
#kp-palette-row .kp-pal[data-pal="cyber"]      { background: linear-gradient(135deg,#0a0524 0%,#0a0524 50%,#ff2eb8 50%,#ff2eb8 100%); }
#kp-palette-row .kp-pal[data-pal="sage"]       { background: linear-gradient(135deg,#1e2820 0%,#1e2820 50%,#a8c098 50%,#a8c098 100%); }
#kp-palette-row .kp-pal[data-pal="brass"]      { background: linear-gradient(135deg,#0a0a08 0%,#0a0a08 50%,#d4a020 50%,#d4a020 100%); }
#kp-palette-row .kp-pal[data-pal="tricolor"]   { background: linear-gradient(135deg, #0a0a0a 0%, #0a0a0a 33%, #888888 33%, #888888 66%, #ffffff 66%, #ffffff 100%); }
html[data-theme="editorial"] #kp-theme-toggle .kp-th-btn { border-radius: 0 !important; font-family: 'JetBrains Mono', monospace !important; }
html[data-theme="editorial"] #kp-theme-menu { border-radius: 0 !important; box-shadow: 4px 4px 0 rgba(0,0,0,0.15) !important; }

/* ============================================================ */
/* ТЕМА БЕРСЕРК 1997                                            */
/* ============================================================ */

html[data-theme="berserk"] {
  --bg: #0c0906;
  --bg-grad: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(139,26,26,0.12) 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 90% 100%, rgba(180,80,20,0.08) 0%, transparent 60%), #0c0906;
  --surface: #171008;
  --surface-2: #1f1508;
  --surface-3: #2a1c0a;
  --border: #3d2810;
  --border-2: #5a3c18;
  --text-1: #e8d5a8;
  --text-2: #c4a070;
  --text-3: #8a6840;
  --text-4: #5a4228;
  --text-5: #3a2818;
  --accent: #9b2020;
  --accent-2: #6e1010;
  --accent-grad: linear-gradient(135deg, #9b2020 0%, #c4621d 100%);
  --accent-fg: #e8d5a8;
  --accent-soft: rgba(155,32,32,0.18);
  --tabbar: rgba(12,9,6,0.97);
  --tabbar-border: #3d2810;
  --modal: linear-gradient(180deg, #1f1508, #0c0906);
  --input: #0c0906;
  --input-border: #3d2810;
  --font: Georgia, 'Times New Roman', serif;
  --r-card: 2px;
  --r-card-2: 2px;
  --r-btn: 2px;
}

html[data-theme="berserk"] body {
  background: var(--bg-grad) !important;
  background-attachment: fixed !important;
  color: var(--text-1) !important;
  font-family: var(--font) !important;
}

/* Виньетка */
html[data-theme="berserk"] body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse 100% 100% at 50% 50%, transparent 35%, rgba(0,0,0,0.75) 100%);
}

/* Зерно плёнки */
html[data-theme="berserk"] body::after {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.05;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 150px 150px;
}

html[data-theme="berserk"] #app-root { position: relative; z-index: 1; }
html[data-theme="berserk"] #kp-theme-toggle { display: none !important; }
html[data-theme="berserk"] input[type="date"] { color-scheme: dark !important; }

/* Поверхности */
html[data-theme="berserk"] [style*="background: rgba(255,255,255,0.02)"],
html[data-theme="berserk"] [style*="background: rgba(255,255,255,0.03)"],
html[data-theme="berserk"] [style*="background: rgba(255,255,255,0.04)"],
html[data-theme="berserk"] [style*="background: rgba(255,255,255,0.05)"],
html[data-theme="berserk"] [style*="background:rgba(255,255,255,0.05)"] {
  background: var(--surface) !important; border-color: var(--border) !important;
}
html[data-theme="berserk"] [style*="background: rgba(255,255,255,0.06)"],
html[data-theme="berserk"] [style*="background: rgba(255,255,255,0.08)"],
html[data-theme="berserk"] [style*="background: rgba(255,255,255,0.10)"] {
  background: var(--surface-2) !important; border-color: var(--border) !important;
}

/* Инпуты */
html[data-theme="berserk"] [style*="background: rgba(0,0,0,0.2)"],
html[data-theme="berserk"] [style*="background: rgba(0,0,0,0.25)"],
html[data-theme="berserk"] [style*="background: rgba(0,0,0,0.3)"],
html[data-theme="berserk"] [style*="background: rgba(0,0,0,0.4)"],
html[data-theme="berserk"] [style*="background: rgba(0,0,0,0.5)"] {
  background: var(--input) !important; border-color: var(--border) !important;
}

/* Таб-бар */
html[data-theme="berserk"] [style*="background: rgba(10,6,18,0.95)"] {
  background: var(--tabbar) !important; border-top-color: var(--tabbar-border) !important;
}

/* Модал */
html[data-theme="berserk"] [style*="linear-gradient(180deg, #150a25, #0a0612)"],
html[data-theme="berserk"] [style*="linear-gradient(180deg,#150a25,#0a0612)"] {
  background: var(--modal) !important;
}
html[data-theme="berserk"] [style*="background: rgba(0,0,0,0.7)"] {
  background: rgba(0,0,0,0.85) !important;
}

/* Акцентные градиенты */
html[data-theme="berserk"] [style*="linear-gradient(135deg,#A78BFA,#FF4DD8)"],
html[data-theme="berserk"] [style*="linear-gradient(135deg, #A78BFA, #FF4DD8)"],
html[data-theme="berserk"] [style*="linear-gradient(90deg, #A78BFA, #FF4DD8)"],
html[data-theme="berserk"] [style*="linear-gradient(90deg,#A78BFA,#FF4DD8)"] {
  background: var(--accent-grad) !important; color: var(--accent-fg) !important;
}

/* Текст с клип-градиентом */
html[data-theme="berserk"] [style*="-webkit-background-clip: text"][style*="A78BFA"],
html[data-theme="berserk"] [style*="-webkit-background-clip:text"][style*="A78BFA"] {
  background: none !important;
  -webkit-background-clip: border-box !important;
  -webkit-text-fill-color: #c4621d !important;
  color: #c4621d !important;
}

/* Цвета текста */
html[data-theme="berserk"] [style*="color: #fff;"],
html[data-theme="berserk"] [style*="color:#fff;"],
html[data-theme="berserk"] [style*="color: #ffffff"],
html[data-theme="berserk"] [style*="color: #e8e0ff"] { color: var(--text-1) !important; }
html[data-theme="berserk"] [style*="color: #b0a0d0"],
html[data-theme="berserk"] [style*="color:#b0a0d0"] { color: var(--text-2) !important; }
html[data-theme="berserk"] [style*="color: #8870a8"],
html[data-theme="berserk"] [style*="color:#8870a8"] { color: var(--text-3) !important; }
html[data-theme="berserk"] [style*="color: #6a5a8a"],
html[data-theme="berserk"] [style*="color:#6a5a8a"] { color: var(--text-4) !important; }
html[data-theme="berserk"] [style*="color: #A78BFA"],
html[data-theme="berserk"] [style*="color:#A78BFA"] { color: #c4621d !important; }
html[data-theme="berserk"] [style*="color: #FF4DD8"],
html[data-theme="berserk"] [style*="color:#FF4DD8"] { color: var(--accent) !important; }
html[data-theme="berserk"] [style*="color: #10E891"],
html[data-theme="berserk"] [style*="color:#10E891"] { color: #6a8a30 !important; }
html[data-theme="berserk"] [style*="color: #00E5FF"],
html[data-theme="berserk"] [style*="color:#00E5FF"] { color: #c4a070 !important; }
html[data-theme="berserk"] [style*="color: #FFAA00"],
html[data-theme="berserk"] [style*="color:#FFAA00"] { color: #c48020 !important; }

/* Границы */
html[data-theme="berserk"] [style*="border: 1px solid rgba(255,255,255"],
html[data-theme="berserk"] [style*="border:1px solid rgba(255,255,255"] { border-color: var(--border) !important; }
html[data-theme="berserk"] [style*="border-top: 1px solid rgba(255,255,255"] { border-top-color: var(--border) !important; }
html[data-theme="berserk"] [style*="border-bottom: 1px solid rgba(255,255,255"] { border-bottom-color: var(--border) !important; }
html[data-theme="berserk"] [style*="border-left: 1px solid rgba(255,255,255"] { border-left-color: var(--border) !important; }
html[data-theme="berserk"] [style*="height:1px;background:rgba(255,255,255,0.08)"],
html[data-theme="berserk"] [style*="height: 1px; background: rgba(255,255,255,0.08)"] { background: var(--border) !important; }

/* Прогресс-бары */
html[data-theme="berserk"] [style*="linear-gradient(90deg,#A78BFA,#FF4DD8)"],
html[data-theme="berserk"] [style*="linear-gradient(90deg, #A78BFA, #FF4DD8)"] { background: var(--accent-grad) !important; }
html[data-theme="berserk"] [style*="linear-gradient(90deg,#10E891,#A78BFA)"] { background: linear-gradient(90deg, #5a8020, #c4621d) !important; }

/* Скругления — оставляем оригинальные */

/* Инпут-фокус */
html[data-theme="berserk"] textarea:focus,
html[data-theme="berserk"] input:focus,
html[data-theme="berserk"] select:focus {
  border-color: var(--accent) !important;
  box-shadow: 0 0 0 2px rgba(155,32,32,0.3) !important;
  outline: none !important;
}

/* Кнопки */
html[data-theme="berserk"] button:hover { transform: translateY(-1px) !important; filter: brightness(1.1); }
html[data-theme="berserk"] button:active { transform: scale(0.96) !important; }

/* Зачем-блок */
html[data-theme="berserk"] [style*="background:rgba(167,139,250,0.06)"],
html[data-theme="berserk"] [style*="background: rgba(167,139,250,0.06)"] {
  background: rgba(40,20,5,0.7) !important; border-color: #4a2c10 !important;
}

/* Активный таб */
html[data-theme="berserk"] [style*="color: #A78BFA"][style*="border: none"] {
  color: #c4621d !important;
}

/* декорация убрана */

/* Анимация появления */
@keyframes berserk-in {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
html[data-theme="berserk"] [style*="border-radius: 12px"],
html[data-theme="berserk"] [style*="border-radius: 14px"],
html[data-theme="berserk"] [style*="border-radius: 16px"] {
  animation: berserk-in 0.35s ease both;
}


/* ============================================================ */
/* БЕРСЕРК — ДЕТАЛИ ИКОНОК И КАРТОЧЕК                          */
/* ============================================================ */

/* Сферы — иконки перекрашиваем в стиль Берсерка */
/* Тело ⚡ → красный крови */
html[data-theme="berserk"] [style*="color: #FF3D71"],
html[data-theme="berserk"] [style*="color:#FF3D71"] { color: #8b1a1a !important; filter: drop-shadow(0 0 4px rgba(139,26,26,0.8)); }

/* Карьера ◆ → охра */
html[data-theme="berserk"] [style*="color: #FFAA00"],
html[data-theme="berserk"] [style*="color:#FFAA00"] { color: #b8740a !important; }

/* Навыки ✦ → стальной */
html[data-theme="berserk"] [style*="color: #00E5FF"],
html[data-theme="berserk"] [style*="color:#00E5FF"] { color: #8a9a8a !important; }

/* Религия ☾ → ночное золото */
html[data-theme="berserk"] [style*="color: #A78BFA"],
html[data-theme="berserk"] [style*="color:#A78BFA"] { color: #b89040 !important; }

/* Финансы ◈ → болотный */
html[data-theme="berserk"] [style*="color: #10E891"],
html[data-theme="berserk"] [style*="color:#10E891"] { color: #5a7a30 !important; }

/* Связи ♥ → тёмно-бордовый */
html[data-theme="berserk"] [style*="color: #FF4DD8"],
html[data-theme="berserk"] [style*="color:#FF4DD8"] { color: #7a1a3a !important; }

/* Карточки сфер — угловые украшения через outline + тень */
html[data-theme="berserk"] [style*="border-radius: 16px"][style*="padding: 14px"],

  border-width: 1px !important;
  border-color: #3d2810 !important;
  box-shadow: inset 0 0 0 3px rgba(255,255,255,0.02), 3px 3px 0 rgba(0,0,0,0.5) !important;
  position: relative !important;
}

/* Гравировка углов на карточках сфер */
html[data-theme="berserk"] [style*="grid-template-columns: repeat(2, 1fr)"] > div::before {
  content: "⊹";
  position: absolute;
  top: 4px; left: 4px;
  font-size: 8px;
  color: rgba(196,98,29,0.4);
  line-height: 1;
  pointer-events: none;
}
html[data-theme="berserk"] [style*="grid-template-columns: repeat(2, 1fr)"] > div::after {
  content: "⊹";
  position: absolute;
  bottom: 4px; right: 4px;
  font-size: 8px;
  color: rgba(196,98,29,0.4);
  line-height: 1;
  pointer-events: none;
}

/* Разделители — царапина меча */
html[data-theme="berserk"] [style*="height:1px;background:rgba(255,255,255,0.08)"],
html[data-theme="berserk"] [style*="height: 1px; background: rgba(255,255,255,0.08)"] {
  background: linear-gradient(90deg, transparent, #5a3010 30%, #8b4a18 50%, #5a3010 70%, transparent) !important;
  height: 1px !important;
}

/* Прогресс-бар — как шрам */
html[data-theme="berserk"] [style*="height: 4px"][style*="border-radius: 2px"],
html[data-theme="berserk"] [style*="height:4px"][style*="border-radius"] {
  background: rgba(60,20,5,0.8) !important;
}
html[data-theme="berserk"] [style*="height: 4px"] > div,
html[data-theme="berserk"] [style*="height:4px"] > div {
  box-shadow: 0 0 6px rgba(139,26,26,0.6) !important;
}

/* XP число — цвет крови */
html[data-theme="berserk"] [style*="font-size: 22px"][style*="-webkit-background-clip"] {
  -webkit-text-fill-color: #c4621d !important;
}

/* Шапка — стиль Берсерка: ранг как эпитет */
html[data-theme="berserk"] [style*="font-size: 20px"][style*="font-weight: 700"][style*="color: #fff"],
html[data-theme="berserk"] [style*="font-size: 20px"][style*="font-weight: 700"] {
  font-family: Georgia, serif !important;
  letter-spacing: 0.05em !important;
  text-transform: uppercase !important;
  font-size: 16px !important;
}

/* Таб-бар иконки — активный получает красный */
html[data-theme="berserk"] [style*="color: #A78BFA"][style*="border: none"] {
  color: #c4621d !important;
  text-shadow: 0 0 8px rgba(196,98,29,0.6) !important;
}

/* Иконки сфер — подсветка текст-тени */
html[data-theme="berserk"] [style*="text-shadow: 0 0 12px rgba(255,61,113"] { text-shadow: 0 0 12px rgba(139,26,26,0.8) !important; }
html[data-theme="berserk"] [style*="text-shadow: 0 0 12px rgba(255,170,0"] { text-shadow: 0 0 10px rgba(184,116,10,0.7) !important; }
html[data-theme="berserk"] [style*="text-shadow: 0 0 12px rgba(0,229,255"] { text-shadow: 0 0 10px rgba(138,154,138,0.6) !important; }
html[data-theme="berserk"] [style*="text-shadow: 0 0 12px rgba(167,139,250"] { text-shadow: 0 0 10px rgba(184,144,64,0.7) !important; }
html[data-theme="berserk"] [style*="text-shadow: 0 0 12px rgba(16,232,145"] { text-shadow: 0 0 10px rgba(90,122,48,0.6) !important; }
html[data-theme="berserk"] [style*="text-shadow: 0 0 12px rgba(255,77,216"] { text-shadow: 0 0 10px rgba(122,26,58,0.7) !important; }

/* Кнопка НАЧАТЬ → в стиле свитка */
html[data-theme="berserk"] [style*="box-shadow: 0 4px 20px rgba(167,139,250"] {
  box-shadow: 0 2px 12px rgba(139,26,26,0.5) !important;
}

/* Streak огонь — красный */
html[data-theme="berserk"] [style*="0 дней"],
html[data-theme="berserk"] [style*="streak"] { color: var(--text-2) !important; }

/* Зачем-блок — пергаментный свиток */
html[data-theme="berserk"] [style*="border-bottom:1px solid rgba(167,139,250,0.12)"],
html[data-theme="berserk"] [style*="border-bottom: 1px solid rgba(167,139,250,0.12)"] {
  border-bottom-color: #3d2810 !important;
  background: linear-gradient(135deg, rgba(40,20,5,0.8), rgba(25,12,3,0.6)) !important;
}

/* Кнопка-иконки в табах — шрифт */
html[data-theme="berserk"] [style*="font-size: 18px"][style*="margin-bottom: 4px"] {
  filter: grayscale(0.3) sepia(0.5);
}

/* Бэкап-баннер */
html[data-theme="berserk"] [style*="rgba(0,229,255,0.15)"] {
  background: rgba(40,20,5,0.9) !important;
  border-bottom-color: #5a3010 !important;
}
html[data-theme="berserk"] [style*="rgba(0,229,255,0.3)"] {
  border-color: var(--border) !important;
}

// Тип нормы по сфере: hours = суммарные часы, count = суммарное количество выполнений
const SPHERE_TARGET_TYPE = {
  body: 'count',      // тренировки = штуки
  career: 'hours',    // фокусная работа по KPI = часы
  skills: 'hours',    // учёба = часы
  religion: 'count',  // молитвы и посты = количество
  money: 'count',     // записи в PnL = количество
  love: 'count'       // контакты с роднёй = количество
};

const TARGET_TYPE_LABEL = {
  hours: { unit: 'ч', word: ['час', 'часа', 'часов'] },
  count: { unit: '', word: ['раз', 'раза', 'раз'] }
};

function sphereProgressForStage(sphereId, stageId) {
  // Возвращает {current, target, pct, type} — сколько накоплено (часов или выполнений) с момента старта
  const target = (typeof adjustedTarget === 'function') ? adjustedTarget(sphereId, stageId) : (STAGE_TARGETS[stageId]?.[sphereId] || 0);
  const type = SPHERE_TARGET_TYPE[sphereId] || 'count';
  let current = 0;
  if (type === 'hours') {
    current = sphereHours(sphereId);
  } else {
    current = state.history.filter(h => h.sphere === sphereId).length;
    // Финансы: дополнительно засчитываем все записи в PnL калькуляторе
    if (sphereId === 'money') {
      current += (state.finance?.entries?.length || 0);
    }
  }
  const pct = target === 0 ? 100 : Math.min(100, (current / target) * 100);
  return { current, target, pct, type };
}

function isStageReady(stageId) {
  // Этап готов к открытию если все 6 сфер набрали свою норму
  return SPHERES.every(s => sphereProgressForStage(s.id, stageId).pct >= 100);
}

function stageOverallProgress(stageId) {
  // Общая готовность этапа = среднее по 6 сферам, ограниченное 100%
  const sum = SPHERES.reduce((acc, s) => acc + sphereProgressForStage(s.id, stageId).pct, 0);
  return Math.round(sum / SPHERES.length);
}

function getBerserkTier(totalDays) {
  // day 0-29 → Каска (месяц 1), 30-59 → Пиппин (месяц 2), …, 330+ → Гатс (месяц 12)
  const idx = Math.min(BERSERK_TIERS.length - 1, Math.max(0, Math.floor(totalDays / 30)));
  return { ...BERSERK_TIERS[idx], idx, month: idx + 1 };
}

const XP_PER_LEVEL = 1500;
const MAX_LEVEL = 150;
// 15 тиров по 10 уровней — серьёзные мужские названия, без детского пафоса
const LEVEL_TIERS = [
  'Странник',     // 1-10
  'Искатель',     // 11-20
  'Практик',      // 21-30
  'Дисциплина',   // 31-40
  'Стратег',      // 41-50
  'Архитектор',   // 51-60
  'Командир',     // 61-70
  'Контроль',     // 71-80
  'Структура',    // 81-90
  'Система',      // 91-100
  'Мастер',       // 101-110
  'Путь',         // 111-120
  'Принцип',      // 121-130
  'Легенда',      // 131-140
  'Вершина'       // 141-150
];
function toRoman(n) {
  const map = [['X',10],['IX',9],['V',5],['IV',4],['I',1]];
  let r = '';
  for (const [s, v] of map) { while (n >= v) { r += s; n -= v; } }
  return r;
}

function levelInfo(xp) {
  const level = Math.min(MAX_LEVEL, Math.floor(xp / XP_PER_LEVEL) + 1);
  const tierIdx = Math.min(LEVEL_TIERS.length - 1, Math.floor((level - 1) / 10));
  const tierName = LEVEL_TIERS[tierIdx];
  const inTier = ((level - 1) % 10) + 1;
  let name;
  if (level >= MAX_LEVEL) name = 'Вершина';
  else if (inTier === 1) name = tierName; // первый уровень тира — без цифры
  else name = `${tierName} ${toRoman(inTier)}`; // Странник II, Странник III, ...
  const currentLevelXP = (level - 1) * XP_PER_LEVEL;
  const nextLevelXP = level >= MAX_LEVEL ? null : level * XP_PER_LEVEL;
  return { level, name, tierName, inTier, currentLevelXP, nextLevelXP };
}

const rank = xp => {
  const li = levelInfo(xp);
  return { xp: li.currentLevelXP, name: li.name, level: li.level };
};
const nextRank = xp => {
  const li = levelInfo(xp);
  if (li.nextLevelXP === null) return null;
  const nextLi = levelInfo(li.nextLevelXP);
  return { xp: li.nextLevelXP, name: nextLi.name, level: nextLi.level };
};

// === ОТЧЁТНЫЙ ПЕРИОД ===
// Первый период: с момента старта до конца того же месяца.
// Дальше: каждый календарный месяц с 1-го по последнее число.
function reportPeriodOf(dateISO) {
  // Возвращает {start, end} ISO строки для отчётного периода, в который попадает данная дата
  const startedAt = state?.startedAt || today();
  const startD = parseISO(startedAt);
  const targetD = parseISO(dateISO);

  // Месяц старта
  const startMonth = `${startD.getFullYear()}-${String(startD.getMonth() + 1).padStart(2, '0')}`;
  const targetMonth = `${targetD.getFullYear()}-${String(targetD.getMonth() + 1).padStart(2, '0')}`;

  if (targetMonth === startMonth && startD.getDate() > 1) {
    // Первый короткий период: от startedAt до конца месяца
    const lastDay = new Date(startD.getFullYear(), startD.getMonth() + 1, 0);
    return { start: startedAt, end: dateToISO(lastDay), isFirst: true };
  }
  // Обычный календарный месяц: 1-е — последнее число
  const first = new Date(targetD.getFullYear(), targetD.getMonth(), 1);
  const last = new Date(targetD.getFullYear(), targetD.getMonth() + 1, 0);
  return { start: dateToISO(first), end: dateToISO(last), isFirst: false };
}

function currentReportPeriod() {
  return reportPeriodOf(today());
}

// Прошлый отчётный период
function prevReportPeriod() {
  const cur = currentReportPeriod();
  const startD = parseISO(cur.start);
  // День перед началом текущего периода
  const dayBefore = new Date(startD); dayBefore.setDate(dayBefore.getDate() - 1);
  if (dayBefore < parseISO(state?.startedAt || today())) return null; // нет ещё прошлого
  return reportPeriodOf(dateToISO(dayBefore));
}

function formatReportPeriod(rp) {
  if (!rp) return '';
  const s = parseISO(rp.start), e = parseISO(rp.end);
  // Если оба числа в одном месяце и периoд начинается с 1-го — это полный месяц
  const isFullMonth = s.getDate() === 1 && e.getDate() === new Date(s.getFullYear(), s.getMonth() + 1, 0).getDate();
  if (isFullMonth) {
    const mn = MONTHS_RU[s.getMonth()];
    return `${mn.charAt(0).toUpperCase() + mn.slice(1)} ${s.getFullYear()}`;
  }
  // Короткий первый период
  return `${s.getDate()} ${MONTHS_RU_SHORT[s.getMonth()]} — ${e.getDate()} ${MONTHS_RU_SHORT[e.getMonth()]} ${e.getFullYear()}`;
}

function isInReportPeriod(dateISO, rp) {
  if (!rp) return false;
  return dateISO >= rp.start && dateISO <= rp.end;
}

function findSkillSub(skill, subId) {
  return (skill.subs || []).find(s => s.id === subId);
}

function skillStats(skillId, subId, period) {
  let entries = state.history.filter(h => h.skillId === skillId);
  if (subId) entries = entries.filter(h => h.subId === subId);
  if (period && period !== 'all') {
    entries = filterByPeriod(entries, period);
  }
  // Для антиметрики count = сумма rawCount; для обычных — длина массива
  const sk = (state.skills || []).find(x => x.id === skillId);
  const sub = sk && subId ? findSkillSub(sk, subId) : null;
  const isInvert = sub && sub.invertGood;
  let count;
  if (isInvert) {
    count = entries.reduce((s, h) => s + (h.rawCount || 1), 0);
  } else {
    count = entries.length;
  }
  const hours = entries.reduce((s, h) => s + (h.hours || 0), 0);
  const xp = entries.reduce((s, h) => s + h.xp, 0);
  const lastDate = entries.length ? [...entries].sort((a,b) => b.date.localeCompare(a.date))[0].date : null;
  return { count, hours, xp, lastDate };
}

// Кэш курсов валют: {USD: 1, RUB: 91.5, CLP: 940, EUR: 0.92, timestamp}
window.__fxRates = window.__fxRates || null;
window.__fxFetching = false;

// Загружаем курсы ВСЕГДА относительно USD — это позволяет конвертировать между любыми парами
async function fetchFXRates() {
  if (window.__fxFetching) return;
  // Кэш на 1 час
  if (window.__fxRates && Date.now() - window.__fxRates.timestamp < 3600000) {
    updateFXDisplay();
    return;
  }
  window.__fxFetching = true;
  try {
    const res = await fetch('https://api.frankfurter.app/latest?from=USD');
    if (!res.ok) throw new Error('FX API error');
    const data = await res.json();
    // rates = { EUR: 0.92, RUB: 91.5, CLP: 940, GBP: 0.79, ... } — всё относительно 1 USD
    window.__fxRates = { rates: { USD: 1, ...data.rates }, timestamp: Date.now() };
    updateFXDisplay();
  } catch (e) {
    console.warn('FX fetch failed:', e);
    // Резервные курсы на случай отсутствия интернета
    if (!window.__fxRates) {
      window.__fxRates = { rates: { USD: 1, RUB: 92, EUR: 0.92, CLP: 940, GBP: 0.79 }, timestamp: 0 };
    }
    updateFXDisplay();
  } finally {
    window.__fxFetching = false;
  }
}

// Конвертирует amount из fromCur в toCur через USD как промежуточную базу
function convertCurrency(amount, fromCur, toCur) {
  if (fromCur === toCur) return amount;
  if (!window.__fxRates) return amount;
  const rates = window.__fxRates.rates;
  // fromCur → USD: делим на курс fromCur
  const rateFrom = rates[fromCur] || 1;
  // USD → toCur: умножаем на курс toCur
  const rateTo = rates[toCur] || 1;
  return (amount / rateFrom) * rateTo;
}

function updateFXDisplay() {
  const amountEl = document.getElementById('fin-amount');
  if (!amountEl) return;
  const amount = parseFloat(amountEl.value.replace(',', '.')) || 0;
  const inputCur = window.__finInputCur || 'USD';
  const rates = window.__fxRates?.rates || { USD:1, RUB:92, CLP:940, EUR:0.92 };
  const selectedCurs = state.finance?.selectedCurrencies || ['USD'];
  selectedCurs.forEach(cur => {
    const el = document.getElementById('fx-' + cur);
    if (!el) return;
    if (amount === 0) { el.textContent = '0'; return; }
    // fromCur → USD → toCur
    const amountUSD = amount / (rates[inputCur] || 1);
    const converted = amountUSD * (rates[cur] || 1);
    el.textContent = cur === 'CLP' || cur === 'JPY' || cur === 'KRW'
      ? Math.round(converted).toLocaleString('ru')
      : converted.toFixed(2);
  });
}

function dateToISO(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function parseISO(s) { return new Date(s + 'T00:00:00'); }

// Форматирует "26 апр 2026" или "сегодня", "вчера", "5 дней назад"
function formatDateRelative(iso) {
  if (!iso) return '';
  const d = parseISO(iso);
  const now = new Date(); now.setHours(0, 0, 0, 0);
  const diff = Math.floor((now - d) / 86400000);
  if (diff === 0) return 'сегодня';
  if (diff === 1) return 'вчера';
  if (diff > 0 && diff < 7) return `${diff} ${plural(diff, 'день', 'дня', 'дней')} назад`;
  return `${d.getDate()} ${MONTHS_RU_SHORT[d.getMonth()]} ${d.getFullYear()}`;
}

function formatDateLong(iso) {
  if (!iso) return '';
  const d = parseISO(iso);
  return `${d.getDate()} ${MONTHS_RU[d.getMonth()]} ${d.getFullYear()}`;
}

function formatDateShort(iso) {
  if (!iso) return '';
  const d = parseISO(iso);
  return `${d.getDate()} ${MONTHS_RU_SHORT[d.getMonth()]}`;
}

// День недели для даты, понедельник = 0
function weekdayMon(d) { return (d.getDay() + 6) % 7; }

function plural(n, one, few, many) {
  const m10 = n % 10, m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return one;
  if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return few;
  return many;
}

function calcStreak(history) {
  if (!history.length) return 0;
  const days = [...new Set(history.map(h => h.date))].sort().reverse();
  let s = 0;
  let d = new Date();
  if (days[0] !== today()) {
    d.setDate(d.getDate() - 1);
    if (days[0] !== dateToISO(d)) return 0;
  }
  for (const day of days) {
    if (day === dateToISO(d)) { s++; d.setDate(d.getDate() - 1); }
    else break;
  }
  return s;
}

function calcMaxStreak(history) {
  if (!history.length) return 0;
  const days = [...new Set(history.map(h => h.date))].sort();
  let max = 1, cur = 1;
  for (let i = 1; i < days.length; i++) {
    const prev = new Date(days[i - 1]); prev.setDate(prev.getDate() + 1);
    if (dateToISO(prev) === days[i]) { cur++; max = Math.max(max, cur); }
    else cur = 1;
  }
  return max;
}

function buildMandatoryTasks() {
  const result = {};
  SPHERES.forEach(s => { result[s.id] = []; });
  Object.keys(MANDATORY_TASKS).forEach(sphereId => {
    MANDATORY_TASKS[sphereId].forEach((t, idx) => {
      // Уникальный id для задачи; taskKey = mandatoryKey, чтобы счётчики работали стабильно
      result[sphereId].push({
        id: `mand_${t.mandatoryKey}`,
        taskKey: t.mandatoryKey,
        mandatory: true,
        createdAt: today(),
        ...t
      });
    });
  });
  // Заполнить пустые сферы пустым массивом если их нет в MANDATORY_TASKS
  SPHERES.forEach(s => { if (!result[s.id]) result[s.id] = []; });
  return result;
}

// Добавляет недостающие обязательные задачи в state.tasks (для миграции существующих пользователей)
// Также обновляет заголовки/частоту обязательных задач если они изменились в коде
function ensureMandatoryTasks() {
  Object.keys(MANDATORY_TASKS).forEach(sphereId => {
    if (!state.tasks[sphereId]) state.tasks[sphereId] = [];
    const validKeys = MANDATORY_TASKS[sphereId].map(m => m.mandatoryKey);
    const dismissed = state.dismissedMandatory || [];
    // Удаляем устаревшие обязательные задачи (которые когда-то были, а теперь нет в MANDATORY_TASKS)
    state.tasks[sphereId] = state.tasks[sphereId].filter(t => {
      if (!t.mandatory) return true; // не обязательные оставляем
      return validKeys.includes(t.mandatoryKey || t.taskKey);
    });
    MANDATORY_TASKS[sphereId].forEach(mt => {
      // Если пользователь явно удалил эту задачу — не возвращаем
      if (dismissed.includes(mt.mandatoryKey)) return;
      const existing = state.tasks[sphereId].find(t => t.mandatoryKey === mt.mandatoryKey || t.taskKey === mt.mandatoryKey);
      if (!existing) {
        state.tasks[sphereId].push({
          id: `mand_${mt.mandatoryKey}`,
          taskKey: mt.mandatoryKey,
          mandatory: true,
          createdAt: today(),
          ...mt
        });
      } else {
        existing.mandatory = true;
        existing.title = mt.title;
        existing.type = mt.type;
        existing.repeating = mt.repeating;
        if (mt.difficulty) existing.difficulty = mt.difficulty;
        if (mt.hours) existing.hours = mt.hours;
        if (!existing.taskKey) existing.taskKey = mt.mandatoryKey;
      }
    });
  });
}

// Сжимает изображение через canvas до миниатюры (max 320×180px JPEG ~70%)
// Возвращает Promise с base64 строкой
function compressImageToBase64(file, maxW = 320, maxH = 180, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Не могу прочитать файл'));
    reader.onload = e => {
      const img = new Image();
      img.onerror = () => reject(new Error('Это не изображение'));
      img.onload = () => {
        let w = img.width, h = img.height;
        const ratio = Math.min(maxW / w, maxH / h, 1);
        w = Math.round(w * ratio);
        h = Math.round(h * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        try {
          resolve(canvas.toDataURL('image/jpeg', quality));
        } catch (err) {
          reject(err);
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function fetchPrayerTimes(dateISO) {
  // API: aladhan.com — публичное, без ключа. Метод 4 = Умм аль-Кура (хорошо для региона)
  const cache = state.prayerTimes.cache;
  if (cache[dateISO]) return cache[dateISO];
  const lat = state.prayerTimes.lat;
  const lon = state.prayerTimes.lon;
  const [y, m, d] = dateISO.split('-');
  const url = `https://api.aladhan.com/v1/timings/${d}-${m}-${y}?latitude=${lat}&longitude=${lon}&method=2`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    const t = data.data.timings;
    const result = {
      fajr: t.Fajr,
      sunrise: t.Sunrise,
      dhuhr: t.Dhuhr,
      asr: t.Asr,
      maghrib: t.Maghrib,
      isha: t.Isha
    };
    state.prayerTimes.cache[dateISO] = result;
    save();
    return result;
  } catch (e) {
    console.warn('prayer times fetch failed', e);
    return null;
  }
}

function timeStringToMinutes(t) {
  if (!t) return null;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function getNextPrayerInfo(times) {
  if (!times) return null;
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();
  const prayers = [
    { id: 'fajr', name: 'Фаджр', time: times.fajr },
    { id: 'sunrise', name: 'Восход', time: times.sunrise, isInfo: true },
    { id: 'dhuhr', name: 'Зухр', time: times.dhuhr },
    { id: 'asr', name: 'Аср', time: times.asr },
    { id: 'maghrib', name: 'Магриб', time: times.maghrib },
    { id: 'isha', name: 'Иша', time: times.isha }
  ];
  for (const p of prayers) {
    const pm = timeStringToMinutes(p.time);
    if (pm !== null && pm > nowMin) {
      const diff = pm - nowMin;
      const h = Math.floor(diff / 60);
      const min = diff % 60;
      return { prayer: p, hoursLeft: h, minutesLeft: min };
    }
  }
  return null; // все молитвы дня прошли
}

// Возвращает скорректированный таргет с учётом adjustments
function adjustedTarget(sphereId, stageId) {
  const base = STAGE_TARGETS[stageId]?.[sphereId] || 0;
  const adj = state.adaptive?.adjustments?.[sphereId]?.[stageId];
  if (!adj) return base;
  return Math.round(base * (1 + adj));
}

function applyWeaknessAdaptation(sphereId, stageId) {
  if (!state.adaptive) state.adaptive = { adjustments: {} };
  if (!state.adaptive.adjustments[sphereId]) state.adaptive.adjustments[sphereId] = {};
  const current = state.adaptive.adjustments[sphereId][stageId] || 0;
  if (current <= -0.1) return; // уже снижали — больше не двигаем (фиксируем на -10%)
  state.adaptive.adjustments[sphereId][stageId] = -0.1;
  save();
  const sphere = SPHERES.find(s => s.id === sphereId);
  if (sphere) showToast(`⚠ ${sphere.name}: норма снижена на 10% — было слабовато 4 недели`, '#FFAA00');
}

// Анализ: смотрим на последние 4 недели для текущего этапа.
// Если по сфере темп ниже того что нужно для дотяжки до конца этапа — применяем -10%.
function checkAdaptiveNorms() {
  const stageId = currentStageId();
  if (stageId === 's0') return;
  const stage = PATH.find(s => s.id === stageId);
  const prevStage = PATH[PATH.indexOf(stage) - 1];
  if (!stage || !prevStage) return;

  const dp = daysPassed();
  // Считаем темп только если прошло хотя бы 28 дней с начала этапа
  const stageStartDays = prevStage.days;
  const daysIntoStage = dp - stageStartDays;
  if (daysIntoStage < 28) return;

  SPHERES.forEach(sp => {
    const baseTarget = STAGE_TARGETS[stageId][sp.id] || 0;
    if (baseTarget === 0) return;
    const prog = sphereProgressForStage(sp.id, stageId);
    // Сколько должно было быть к этому моменту по линейному графику
    const expectedRatio = daysIntoStage / (stage.days - stageStartDays);
    const expected = baseTarget * expectedRatio;
    const actual = prog.current;
    // Если фактическое меньше 90% от ожидаемого — слабая ветка
    if (actual < expected * 0.9) {
      applyWeaknessAdaptation(sp.id, stageId);
    }
  });
}

    state.tasks[s.id].forEach(t => { if (!t.taskKey) t.taskKey = t.id; });
  });
  // База знаний
  if (!state.knowledgeBase) state.knowledgeBase = { categories: [], items: [] };
  if (!state.knowledgeBase.categories) state.knowledgeBase.categories = [];
  if (!state.knowledgeBase.items) state.knowledgeBase.items = [];
  // Зачем + контракты этапов
  if (state.why === undefined) state.why = '';
  if (!state.stageContracts) state.stageContracts = {};
  // Журнал
  if (!state.journal) state.journal = [];
  // Тело
  if (!state.body) state.body = { height: null, measurements: [] };
  if (!state.body.measurements) state.body.measurements = [];
  // Сон
  if (!state.sleep) state.sleep = { entries: [], lastTap: Date.now(), lastPromptDate: null, goalHours: 8 };
  if (!state.sleep.entries) state.sleep.entries = [];
  if (!state.sleep.goalHours) state.sleep.goalHours = 8;
  // Время молитв
  if (!state.prayerTimes) state.prayerTimes = { lat: -33.4489, lon: -70.6693, city: 'Сантьяго', cache: {} };
  if (!state.prayerTimes.cache) state.prayerTimes.cache = {};
  // Адаптивные нормы
  if (!state.adaptive) state.adaptive = { adjustments: {} };
  if (!state.adaptive.adjustments) state.adaptive.adjustments = {};
  // Удалённые обязательные задачи (чтобы не возвращались)
  if (!state.dismissedMandatory) state.dismissedMandatory = [];
  // Гарантируем что обязательные задачи всегда есть
  ensureMandatoryTasks();
  state.history.forEach(h => { if (!h.taskKey) h.taskKey = null; });
  render();
}
function save() {
  // Детект апгрейда уровня — общего ранга и сферных уровней
  if (state) {
    try {
      const cur = { rank: rank(totalXP()).level, spheres: {} };
      SPHERES.forEach(s => { cur.spheres[s.id] = Math.floor(sphereXP(s.id) / 200) + 1; });
      if (state.__seen) {
        const prev = state.__seen;
        if (cur.rank > (prev.rank || 1)) {
          const r = rank(totalXP());
          setTimeout(() => { showCelebration(r.name, 'Новый уровень'); }, 80);
        }
        SPHERES.forEach(s => {
          const pl = (prev.spheres && prev.spheres[s.id]) || 1;
          if ((cur.spheres[s.id] || 1) > pl) {
            setTimeout(() => {
              if (typeof showToast === 'function') showToast(`${s.emoji} ${s.name} · уровень ${cur.spheres[s.id]}`, s.color);
              fireConfetti([s.color, '#fff', '#A78BFA']);
            }, 220);
          }
        });
      }
      state.__seen = cur;
    } catch {}
  }
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

function totalXP() { return state.history.reduce((s, h) => s + h.xp, 0); }
function totalHours() { return state.history.reduce((s, h) => s + (h.hours || 0), 0); }
function sphereXP(id) { return state.history.filter(h => h.sphere === id).reduce((s, h) => s + h.xp, 0); }
function sphereHours(id) { return state.history.filter(h => h.sphere === id).reduce((s, h) => s + (h.hours || 0), 0); }
function daysPassed() { return Math.max(0, daysBetween(state.startedAt || today(), today())); }

// Фильтр истории по периоду
function filterByPeriod(entries, period) {
  if (period === 'all') return entries;
  if (period === 'today') return entries.filter(h => h.date === today());
  if (period === 'week') {
    const wkAgo = new Date(); wkAgo.setDate(wkAgo.getDate() - 7);
    const wkAgoStr = dateToISO(wkAgo);
    return entries.filter(h => h.date >= wkAgoStr);
  }
  if (period === 'month') {
    const m = currentMonth();
    return entries.filter(h => h.date.startsWith(m));
  }
  if (period === 'report') {
    const rp = currentReportPeriod();
    return entries.filter(h => isInReportPeriod(h.date, rp));
  }
  if (period === 'prev_report') {
    const rp = prevReportPeriod();
    if (!rp) return [];
    return entries.filter(h => isInReportPeriod(h.date, rp));
  }
  if (period === 'custom') {
    const from = view.customFrom; const to = view.customTo;
    if (!from && !to) return entries;
    return entries.filter(h => (!from || h.date >= from) && (!to || h.date <= to));
  }
  return entries;
}

function taskStats(taskKey, period) {
  let entries = state.history.filter(h => h.taskKey === taskKey);
  entries = filterByPeriod(entries, period);
  const count = entries.length;
  const hours = entries.reduce((s, h) => s + (h.hours || 0), 0);
  const xp = entries.reduce((s, h) => s + h.xp, 0);
  const lastDate = entries.length ? entries[entries.length - 1].date : null;
  return { count, hours, xp, lastDate };
}

// Активность по дням (для тепловой карты и точек)
function activityByDay(taskKey) {
  const map = {};
  const filtered = taskKey ? state.history.filter(h => h.taskKey === taskKey) : state.history;
  filtered.forEach(h => {
    if (!map[h.date]) map[h.date] = { count: 0, hours: 0, xp: 0 };
    map[h.date].count++;
    map[h.date].hours += (h.hours || 0);
    map[h.date].xp += h.xp;
  });
  return map;
}

function getSnapshot() {
  const sphereXPMap = {};
  SPHERES.forEach(s => sphereXPMap[s.id] = sphereXP(s.id));
  return { onboardingDone: state.onboardingDone, history: state.history, stagesUnlocked: state.stagesUnlocked, sphereXP: sphereXPMap, maxStreak: calcMaxStreak(state.history), totalHours: totalHours() };
}

function checkAchievements() {
  const snap = getSnapshot();
  const newly = [];
  ACHIEVEMENTS.forEach(a => {
    if (state.achievementsUnlocked[a.id]) return;
    if (a.cond(snap)) { state.achievementsUnlocked[a.id] = today(); newly.push(a); }
  });
  return newly;
}

function checkUnlocks() {
  const dp = daysPassed();
  // Проверяем адаптацию (раз в выполнение задачи — не накладно)
  if (typeof checkAdaptiveNorms === 'function') checkAdaptiveNorms();
  let unlocked = false;
  PATH.forEach(s => {
    if (state.stagesUnlocked[s.id]) return;
    if (dp >= s.days && isStageReady(s.id)) {
      state.stagesUnlocked[s.id] = today();
      unlocked = true;
    }
  });
  return unlocked;
}

function fireConfetti(colors, originX, originY) {
  colors = colors || ['#A78BFA', '#FF4DD8', '#10E891', '#FFD93D', '#00E5FF'];
  const root = document.createElement('div');
  root.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:10000;overflow:hidden;';
  const cx = originX != null ? originX : window.innerWidth / 2;
  const cy = originY != null ? originY : window.innerHeight / 2;
  const N = 70;
  for (let i = 0; i < N; i++) {
    const p = document.createElement('div');
    const angle = (Math.PI * 2 * i / N) + (Math.random() - 0.5) * 0.4;
    const dist = 180 + Math.random() * 380;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist + 240; // bias down (gravity)
    const w = 6 + Math.random() * 6;
    const h = (2 + Math.random() * 4);
    const color = colors[Math.floor(Math.random() * colors.length)];
    const rot = (Math.random() - 0.5) * 900;
    const dur = 1.3 + Math.random() * 0.9;
    p.style.cssText = `position:absolute;left:${cx}px;top:${cy}px;width:${w}px;height:${w}px;background:${color};border-radius:${Math.random()<0.5?'1px':'50%'};--dx:${dx}px;--dy:${dy}px;--rot:${rot}deg;animation:confetti-fall ${dur}s cubic-bezier(.2,.6,.4,1) forwards;box-shadow:0 0 8px ${color}80;`;
    root.appendChild(p);
  }
  document.body.appendChild(root);
  setTimeout(() => root.remove(), 2400);
  // tactile feedback
  if (navigator.vibrate) try { navigator.vibrate([10, 30, 10]); } catch {}
}

function showCelebration(title, subtitle) {

  el.style.cssText = 'position: fixed; inset: 0; background: radial-gradient(circle, rgba(167,139,250,0.3), rgba(0,0,0,0.85)); display: flex; align-items: center; justify-content: center; z-index: 9999; pointer-events: none; animation: cel-in 0.5s;';

function showToast(text, color) {
  const el = document.createElement('div');
  el.style.cssText = `position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-20px); padding: 10px 16px; background: ${color || '#A78BFA'}; color: #000; font-size: 13px; font-weight: 700; border-radius: 10px; box-shadow: 0 4px 20px ${color || 'rgba(167,139,250,0.5)'}; z-index: 9998; opacity: 0; transition: all 0.3s; pointer-events: none; max-width: 90vw; text-align: center;`;
  el.textContent = text;
  document.body.appendChild(el);
  requestAnimationFrame(() => {
    el.style.opacity = '1';
    el.style.transform = 'translateX(-50%) translateY(0)';
  });
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translateX(-50%) translateY(-20px)';
    setTimeout(() => el.remove(), 300);
  }, 2000);
}

function completeTask(sphereId, task, customHours) {
  let xp, hours;
  if (task.type === 'hours') {
    hours = customHours || task.hours || 1;
    xp = xpForHours(hours);
  } else {
    xp = xpFor(task.difficulty);
    hours = 0;
  }
  state.history.push({ id: Date.now().toString(), sphere: sphereId, title: task.title, taskKey: task.taskKey || task.id, xp, hours, date: today(), timestamp: Date.now() });
  if (!task.repeating) state.tasks[sphereId] = state.tasks[sphereId].filter(t => t.id !== task.id);

  // Тост: что именно записалось в сферу
  const sphere = SPHERES.find(s => s.id === sphereId);
  const targetType = SPHERE_TARGET_TYPE[sphereId];
  const prog = sphereProgressForStage(sphereId, currentStageId());
  let toastText;
  if (targetType === 'hours') {
    toastText = `${sphere.emoji} ${sphere.name} +${hours}ч → ${prog.current.toFixed(1)}/${prog.target}ч`;
  } else {
    toastText = `${sphere.emoji} ${sphere.name} +1 → ${prog.current}/${prog.target}`;
  }
  showToast(toastText, sphere.color);

  const stageUnlocked = checkUnlocks();
  const newAch = checkAchievements();
  save();
  if (stageUnlocked) {
    showCelebration('Этап открыт', 'Карта пути');
    setTimeout(() => { newAch.forEach((a, i) => setTimeout(() => showCelebration(a.name, 'Достижение'), i * 1800)); }, 3200);
  } else if (newAch.length) {
    newAch.forEach((a, i) => setTimeout(() => showCelebration(a.name, 'Достижение'), i * 1800));
  }
  render();
}

function currentStageId() {
  const idx = PATH.findIndex(s => !state.stagesUnlocked[s.id]);
  if (idx === -1) return PATH[PATH.length - 1].id;
  return PATH[idx].id;
}

function undoTask(historyId) {
  state.history = state.history.filter(h => h.id !== historyId);
  // Пересчитываем открытые этапы — если уже не дотягиваем по нормам, откатываем
  const dp = daysPassed();
  Object.keys(state.stagesUnlocked).forEach(sid => {
    if (sid === 's0') return;
    const stage = PATH.find(s => s.id === sid);
    if (!stage) return;
    if (dp < stage.days || !isStageReady(sid)) {
      delete state.stagesUnlocked[sid];
    }
  });
  const snap = getSnapshot();
  Object.keys(state.achievementsUnlocked).forEach(aid => {
    const a = ACHIEVEMENTS.find(x => x.id === aid);
    if (a && !a.cond(snap)) delete state.achievementsUnlocked[aid];
  });
  save(); render();
}

function addTask(sphereId, taskData) {
  const id = Date.now().toString();
  state.tasks[sphereId].push({ id, taskKey: id, ...taskData, createdAt: today() });
  save(); render();
}

function removeTask(sphereId, taskId) {
  const task = (state.tasks[sphereId] || []).find(t => t.id === taskId);
  if (!task) return;
  if (task.mandatory) {
    if (!confirm(`Удалить «${task.title}»?\n\nЭта задача была заранее предложена приложением. Если удалишь — она не вернётся при обновлении.`)) return;
    // Чтобы не возвращалась при reconcile — добавляем в список отказов
    if (!state.dismissedMandatory) state.dismissedMandatory = [];
    if (task.mandatoryKey && !state.dismissedMandatory.includes(task.mandatoryKey)) {
      state.dismissedMandatory.push(task.mandatoryKey);
    }
  }
  state.tasks[sphereId] = state.tasks[sphereId].filter(t => t.id !== taskId);
  save(); render();
}

function resetAll() {
  if (!confirm('Стереть весь прогресс? Контекст из разговора восстановится. Отменить нельзя.')) return;
  state = makeInitial();
  view = { tab: 'tree', sphereId: null, stageId: null, achId: null, addingTask: false, onboardStep: 0, confirmUndoId: null, contextVisible: false, addMode: 'simple', countersFilter: 'all', countersPeriod: 'all', customFrom: null, customTo: null, calendarVisible: false, calendarMonth: currentMonth(), historyJumpDate: null };
  save(); render();
}

function importData(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.tasks || !data.history) throw new Error('invalid');
      if (!confirm('Загрузить резервную копию? Текущие данные будут заменены.')) return;
      state = data; save(); render(); alert('Данные загружены!');
    } catch { alert('Файл повреждён или неверного формата.'); }
  };
  reader.readAsText(file);
}

function shouldShowBackupBanner() {
  if (state.history.length === 0) return false;
  const t = today();
  if (state.lastBackup === t) return false;
  if (state.bannerDismissedDate === t) return false;
  if (!state.lastBackup) {
    const daysSinceStart = daysBetween(state.startedAt, t);
    return daysSinceStart >= 1;
  }
  return daysBetween(state.lastBackup, t) >= 1;
}

function dismissBanner() { state.bannerDismissedDate = today(); save(); render(); }

// ═══ ТРЕКЕР СНА ═══════════════════════════════════════════════════════════
function fmtHM(ts) { const d = new Date(ts); return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0'); }
function fmtDur(hours) { const h = Math.floor(hours); const m = Math.round((hours - h) * 60); return h + 'ч ' + String(m).padStart(2,'0') + 'м'; }
function sleepEntryForDate(dateISO) {
  return (state.sleep?.entries || []).find(e => e.date === dateISO);
}
function sleepHoursThisMonth() {
  const monthStr = today().slice(0,7);
  return (state.sleep?.entries || []).filter(e => e.date.startsWith(monthStr)).reduce((s,e) => s + (e.hours||0), 0);
}
function sleepAvgWeek() {
  const now = new Date();
  const week = (state.sleep?.entries || []).filter(e => {
    const d = new Date(e.date);
    return (now - d) <= 7 * 86400000;
  });
  if (week.length === 0) return 0;
  return week.reduce((s,e) => s + (e.hours||0), 0) / week.length;
}
// Проверяем, нужно ли утром предложить запись сна
function checkSleepPrompt() {
  if (!state.sleep) return null;
  const now = new Date();
  const nowMs = now.getTime();
  const hr = now.getHours();
  // только после 5 утра
  if (hr < 5 || hr > 14) return null;
  const todayISO = today();
  // если уже спрашивали сегодня или уже есть запись на сегодня — пропускаем
  if (state.sleep.lastPromptDate === todayISO) return null;
  if (sleepEntryForDate(todayISO)) return null;
  const lastTap = state.sleep.lastTap || 0;
  if (!lastTap) return null;
  const gapMs = nowMs - lastTap;
  const gapHours = gapMs / 3600000;
  // Похоже на сон: 4-14 часов без активности
  if (gapHours < 4 || gapHours > 14) return null;
  return { bedtime: lastTap, wake: nowMs, hours: +gapHours.toFixed(2) };
}

function escapeHtml(s) { if (!s) return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

function render() {
  const root = document.getElementById('app-root');
  if (!state) { root.innerHTML = '<div style="padding: 60px 20px; text-align: center; color: #888;">Загрузка...</div>'; return; }
  if (!state.onboardingDone) { renderOnboarding(); return; }
  renderApp();
  // После рендера — асинхронно обновляем плашку молитв
  setTimeout(() => updatePrayerStrip(), 100);
}

async function updatePrayerStrip() {
  const el = document.getElementById('prayer-strip-text');
  if (!el) return;
  try {
    const todayTimes = await fetchPrayerTimes(today());
    if (!todayTimes) {
      el.innerHTML = `<span style="color:#FFAA00;">не удалось загрузить</span>`;
      return;
    }
    const next = getNextPrayerInfo(todayTimes);
    if (next) {
      const p = next.prayer;
      const left = next.hoursLeft > 0
        ? `${next.hoursLeft}ч ${next.minutesLeft}мин`
        : `${next.minutesLeft}мин`;
      el.innerHTML = `<span style="color:#fff;font-weight:700;">${p.name}</span> в <span style="color:#10E891;">${p.time}</span> · через ${left}`;
    } else {
      // Все прошли — показываем времена на завтра
      const tomorrowDate = new Date(); tomorrowDate.setDate(tomorrowDate.getDate() + 1);
      const tomorrowTimes = await fetchPrayerTimes(dateToISO(tomorrowDate));
      if (tomorrowTimes) {
        el.innerHTML = `Сегодня все прошли · завтра Фаджр в <span style="color:#10E891;">${tomorrowTimes.fajr}</span>`;
      } else {
        el.innerHTML = 'Молитвы дня прошли';
      }
    }
  } catch (e) {
    el.innerHTML = `<span style="color:#8870a8;">офлайн</span>`;
  }
}
