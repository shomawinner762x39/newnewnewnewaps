      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; font-weight: 600;">Новый замер</div>
      <div style="display: flex; gap: 6px; margin-bottom: 8px;"><input id="body-date-input" type="date" value="${today()}" style="flex: 1; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 12px; outline: none;" /></div>
      <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; margin-bottom: 8px;">
        <div><div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px;">Вес (кг)</div><input id="body-weight-input" type="number" step="0.1" placeholder="—" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 14px; outline: none; text-align: center; font-weight: 700;" /></div>
        <div><div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px;">Грудь (см)</div><input id="body-chest-input" type="number" step="0.5" placeholder="—" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 14px; outline: none; text-align: center;" /></div>
        <div><div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px;">Талия (см)</div><input id="body-waist-input" type="number" step="0.5" placeholder="—" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 14px; outline: none; text-align: center;" /></div>
        <div><div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px;">Бёдра (см)</div><input id="body-hips-input" type="number" step="0.5" placeholder="—" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 14px; outline: none; text-align: center;" /></div>
        <div style="grid-column: span 2;"><div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px;">Бицепс (см)</div><input id="body-biceps-input" type="number" step="0.5" placeholder="—" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 14px; outline: none; text-align: center;" /></div>
      </div>
      <input id="body-note-input" placeholder="Заметка" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 12px; outline: none; margin-bottom: 8px;" />
      <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
        <label style="flex:1; padding: 8px 12px; background: rgba(255,255,255,0.04); border: 1px dashed rgba(255,255,255,0.2); border-radius: 6px; color: #8870a8; font-size: 11px; cursor: pointer; text-align: center; display: flex; align-items: center; justify-content: center; gap: 6px;">
          📷 Добавить фото
          <input type="file" accept="image/*" onchange="window.__app.bodyPickPhoto(this)" style="display:none;" />
        </label>
        <div id="body-photo-thumb" style="width: 52px; height: 52px; border-radius: 6px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; overflow: hidden;">📷</div>
      </div>
      <div style="display: flex; gap: 6px;">
        <button onclick="window.__app.bodyConfirm()" style="flex: 1; padding: 10px; background: linear-gradient(135deg,${s.color},${s.color}cc); color: #000; border: none; border-radius: 6px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-weight: 700;">Записать</button>
        <button onclick="window.__app.bodyCancelAdd()" style="padding: 10px 14px; background: transparent; color: #8870a8; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; font-size: 11px; cursor: pointer;">Отмена</button>
      </div>
    </div>`;
  } else if (body.height) {
    html += `<button onclick="window.__app.bodyStartAdd()" style="width: 100%; padding: 10px; background: ${s.color}15; border: 1px dashed ${s.color}; border-radius: 8px; color: ${s.color}; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; margin-bottom: 10px; font-weight: 700;">+ Замер</button>`;
  }

  const withWeight = measurements.filter(m => m.weight).reverse();
  if (withWeight.length >= 2) {
    const weights = withWeight.map(m => m.weight);
    const minW = Math.min(...weights), maxW = Math.max(...weights);
    const range = maxW - minW || 1;
    const w = 320, h = 80, pad = 4;
    const stepX = (w - pad * 2) / (withWeight.length - 1);
    let path = '', dots = '';
    withWeight.forEach((m, i) => {
      const x = pad + i * stepX;
      const y = pad + (h - pad * 2) * (1 - (m.weight - minW) / range);
      path += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1) + ' ';
      dots += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.5" fill="${s.color}" />`;
    });
    html += `<div style="background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; padding: 11px; margin-bottom: 8px;">
      <div style="display: flex; justify-content: space-between; font-size: 10px; color: #8870a8; margin-bottom: 6px;"><span>Вес · график</span><span>${minW}–${maxW} кг</span></div>
      <svg viewBox="0 0 ${w} ${h}" style="width: 100%; height: ${h}px; display: block;">
        <path d="${path}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" />
        ${dots}
      </svg>
    </div>`;
  }

  if (measurements.length > 0) {
    html += `<div style="font-size: 10px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; margin: 10px 0 6px; font-weight: 600;">История</div>`;
    measurements.slice(0, 12).forEach(m => {
      const parts = [];
      if (m.weight) parts.push('<span style="color:#fff;font-weight:700;">' + m.weight + ' кг</span>');
      if (m.chest)  parts.push('гр ' + m.chest);
      if (m.waist)  parts.push('т ' + m.waist);
      if (m.hips)   parts.push('бд ' + m.hips);
      if (m.biceps) parts.push('бц ' + m.biceps);

      const isExpanded = view.expandedGroups && view.expandedGroups['bm_' + m.id];
      const toggleKey = 'bm_' + m.id;

      // Строка — кликабельная для всех замеров, раскрывает детали
      html += '<div style="background:rgba(255,255,255,0.025);border-radius:8px;margin-bottom:6px;overflow:hidden;">'

        // Верхняя строка — всегда видна
        + '<button data-gk="' + toggleKey + '" onclick="window.__app.toggleGroup(this.dataset.gk)" style="width:100%;display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 12px;background:transparent;border:none;cursor:pointer;text-align:left;">'
        + '<div style="font-size:10px;color:#8870a8;flex-shrink:0;min-width:70px;pointer-events:none;">' + formatDateShort(m.date) + '</div>'
        + '<div style="font-size:11px;color:#b0a0d0;flex:1;pointer-events:none;">' + parts.join(' · ') + (m.note ? ' · <span style="color:#6a5a8a;">' + escapeHtml(m.note) + '</span>' : '') + '</div>'
        + (m.photo ? '<span style="font-size:13px;pointer-events:none;">📷</span>' : '')
        + '<span style="font-size:11px;color:#5a4a78;pointer-events:none;">' + (isExpanded ? '▾' : '▸') + '</span>'
        + '</button>';

      // Раскрытый блок
      if (isExpanded) {
        html += '<div style="padding:8px 12px 10px;border-top:1px solid rgba(255,255,255,0.06);">';

        // Фото — маленькое превью, кликабельное
        if (m.photo) {
          html += '<button data-mid="' + m.id + '" onclick="window.__app.bodyOpenPhoto(this.dataset.mid)" style="display:block;padding:0;border:none;cursor:pointer;margin-bottom:8px;background:transparent;width:100%;">'
            + '<img src="' + m.photo + '" style="width:100%;max-height:180px;object-fit:cover;border-radius:8px;display:block;" />'
            + '<div style="font-size:9px;color:#6a5a8a;margin-top:4px;text-align:center;">Нажми для полного размера</div>'
            + '</button>';
        }

        // Детали замера
        html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;">';
        if (m.weight) html += '<div style="padding:4px 8px;background:rgba(255,255,255,0.04);border-radius:6px;font-size:11px;"><span style="color:#6a5a8a;">Вес</span> <span style="color:#fff;font-weight:700;">' + m.weight + ' кг</span></div>';
        if (m.chest)  html += '<div style="padding:4px 8px;background:rgba(255,255,255,0.04);border-radius:6px;font-size:11px;"><span style="color:#6a5a8a;">Грудь</span> ' + m.chest + '</div>';
        if (m.waist)  html += '<div style="padding:4px 8px;background:rgba(255,255,255,0.04);border-radius:6px;font-size:11px;"><span style="color:#6a5a8a;">Талия</span> ' + m.waist + '</div>';
        if (m.hips)   html += '<div style="padding:4px 8px;background:rgba(255,255,255,0.04);border-radius:6px;font-size:11px;"><span style="color:#6a5a8a;">Бёдра</span> ' + m.hips + '</div>';
        if (m.biceps) html += '<div style="padding:4px 8px;background:rgba(255,255,255,0.04);border-radius:6px;font-size:11px;"><span style="color:#6a5a8a;">Бицепс</span> ' + m.biceps + '</div>';
        html += '</div>';

        // Кнопка удалить
        html += '<button data-mid="' + m.id + '" onclick="window.__app.bodyRemoveMeasurement(this.dataset.mid)" style="padding:6px 12px;background:rgba(255,61,113,0.1);border:1px solid rgba(255,61,113,0.3);border-radius:6px;color:#FF3D71;font-size:10px;cursor:pointer;">Удалить замер</button>';

        html += '</div>';
      }

      html += '</div>';
    });
  }

  return html;
}


function renderFinancePanel(sphere) {
  const s = sphere;
  const monthStr = view.finMonth || currentMonth();
  const [yr, mo] = monthStr.split('-').map(Number);
  const monthName = `${MONTHS_RU[mo - 1].charAt(0).toUpperCase() + MONTHS_RU[mo - 1].slice(1)} ${yr}`;
  const isCurrentMonth = monthStr === currentMonth();
  const isFutureMonth = monthStr > currentMonth();

  const incomeSum = finMonthSum(monthStr, 'income');
  const expenseSum = finMonthSum(monthStr, 'expense');
  const net = incomeSum - expenseSum;
  const savings = finTotalSavings();
  const entries = finEntriesForMonth(monthStr).sort((a, b) => b.date.localeCompare(a.date) || b.timestamp - a.timestamp);

  let html = `<div style="background: linear-gradient(135deg, ${s.color}10, ${s.color}03); border: 1px solid ${s.color}30; border-radius: 14px; padding: 16px; margin-bottom: 18px;">`;

  // Заголовок
  html += `<div style="font-size: 11px; letter-spacing: 0.25em; color: ${s.color}; text-transform: uppercase; font-weight: 700; margin-bottom: 14px;">PnL · Учёт денег</div>`;

  // Селектор месяца
  html += `<div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding: 8px 10px; background: rgba(0,0,0,0.25); border-radius: 10px;">
    <button onclick="window.__app.shiftFinMonth(-1)" style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #b0a0d0; cursor: pointer; width: 28px; height: 28px; border-radius: 8px; font-size: 14px;">‹</button>
    <div style="text-align: center;">
      <div style="font-size: 13px; color: #fff; font-weight: 700;">${monthName}</div>
      <div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase;">${isCurrentMonth ? 'текущий месяц' : isFutureMonth ? 'будущий' : 'прошлый месяц'}</div>
    </div>
    <button onclick="window.__app.shiftFinMonth(1)" style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #b0a0d0; cursor: pointer; width: 28px; height: 28px; border-radius: 8px; font-size: 14px;">›</button>
  </div>`;

  // Три карточки: Доходы / Расходы / Чистое
  html += `<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px;">
    <div style="background: rgba(16,232,145,0.1); border: 1px solid rgba(16,232,145,0.3); border-radius: 10px; padding: 10px 8px; text-align: center;">
      <div style="font-size: 9px; color: #10E891; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; margin-bottom: 4px;">Доходы</div>
      <div style="font-size: 14px; color: #10E891; font-weight: 700; word-break: break-word;">${fmtMoney(incomeSum)}</div>
    </div>
    <div style="background: rgba(255,61,113,0.1); border: 1px solid rgba(255,61,113,0.3); border-radius: 10px; padding: 10px 8px; text-align: center;">
      <div style="font-size: 9px; color: #FF3D71; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; margin-bottom: 4px;">Расходы</div>
      <div style="font-size: 14px; color: #FF3D71; font-weight: 700; word-break: break-word;">${fmtMoney(expenseSum)}</div>
    </div>
    <div style="background: ${net >= 0 ? 'rgba(167,139,250,0.15)' : 'rgba(255,170,0,0.15)'}; border: 1px solid ${net >= 0 ? 'rgba(167,139,250,0.4)' : 'rgba(255,170,0,0.4)'}; border-radius: 10px; padding: 10px 8px; text-align: center;">
      <div style="font-size: 9px; color: ${net >= 0 ? '#A78BFA' : '#FFAA00'}; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; margin-bottom: 4px;">Итого</div>
      <div style="font-size: 14px; color: ${net >= 0 ? '#A78BFA' : '#FFAA00'}; font-weight: 700; word-break: break-word;">${fmtMoney(net)}</div>
    </div>
  </div>`;

  // Большая цифра накоплений — в выбранных валютах
  const selectedCurs = (state.finance.selectedCurrencies || ['USD']);
  const rates = window.__fxRates?.rates || { USD:1, RUB:92, CLP:940, EUR:0.92 };
  const savingsUSD = savings; // savings уже в USD (через amountUSD)

  html += `<div style="background: linear-gradient(135deg, rgba(16,232,145,0.15), rgba(167,139,250,0.08)); border: 1px solid rgba(16,232,145,0.3); border-radius: 12px; padding: 14px; margin-bottom: 10px; text-align: center;">
    <div style="font-size: 9px; color: #10E891; letter-spacing: 0.25em; text-transform: uppercase; font-weight: 700; margin-bottom: 8px;">◈ Всего накоплено</div>
    ${selectedCurs.map((cur, i) => {
      const val = savingsUSD * (rates[cur] || 1);
      const fmt = cur === 'CLP' ? Math.round(val).toLocaleString('ru') : val.toFixed(2);
      return `<div style="font-size:${i===0?'28px':'16px'};color:${i===0?'#fff':'#8870a8'};font-weight:${i===0?'800':'600'};line-height:1.3;">${fmt} <span style="font-size:${i===0?'14px':'11px'};color:#6a5a8a;">${cur}</span></div>`;
    }).join('')}
    <div style="font-size: 10px; color: #6a5a8a; margin-top: 6px;">подушка ${fmtMoney(state.finance.cushion || 0)} + история</div>
    <button onclick="window.__app.toggleCushion()" style="margin-top: 6px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: #b0a0d0; cursor: pointer; padding: 5px 12px; border-radius: 8px; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600;">${view.finEditCushion ? 'Скрыть' : 'Изменить подушку'}</button>
  </div>`;

  // Выбор валют (до 3)
  const ALL_CURS = ['USD','RUB','CLP','EUR','GBP','CNY','AED','KZT','BRL'];
  const curPickOpen = !!view.expandedGroups?.['fin_cur_pick'];
  html += `<button onclick="window.__app.toggleGroup('fin_cur_pick')" style="width:100%;display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:8px;cursor:pointer;text-align:left;margin-bottom:${curPickOpen?'0':'10px'}">
    <span style="font-size:11px;color:#8870a8;flex:1;">Валюты для накоплений: ${selectedCurs.join(' · ')}</span>
    <span style="font-size:12px;color:#6a5a8a;">${curPickOpen?'▾':'▸'}</span>
  </button>`;
  if (curPickOpen) {
    html += `<div style="padding:10px;background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.07);border-top:none;border-radius:0 0 8px 8px;margin-bottom:10px;">
      <div style="font-size:10px;color:#6a5a8a;margin-bottom:8px;">Выбери до 3 валют. Первая — основная (самая большая цифра).</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;">
        ${ALL_CURS.map(cur => {
          const isActive = selectedCurs.includes(cur);
          return `<button onclick="window.__app.toggleFinCurrency('${cur}')" style="padding:6px 12px;background:${isActive?'rgba(16,232,145,0.2)':'transparent'};border:1px solid ${isActive?'#10E891':'rgba(255,255,255,0.12)'};border-radius:7px;color:${isActive?'#10E891':'#8870a8'};font-size:12px;font-weight:700;cursor:pointer;">${cur}${isActive?' ✓':''}</button>`;
        }).join('')}
      </div>
    </div>`;
  }

  // Поле редактирования подушки
  if (view.finEditCushion) {
    html += `<div style="background: rgba(0,0,0,0.3); border: 1px solid ${s.color}40; border-radius: 10px; padding: 12px; margin-bottom: 14px;">
      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; font-weight: 600;">Стартовая подушка</div>
      <div style="font-size: 10px; color: #6a5a8a; margin-bottom: 8px; line-height: 1.4;">Твои накопления на момент начала ведения учёта. К ним приплюсуется чистое за каждый месяц.</div>
      <div style="display: flex; gap: 8px;">
        <input id="fin-cushion-input" type="number" step="0.01" value="${state.finance.cushion || 0}" style="flex: 1; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 14px; outline: none;" />
        <button onclick="window.__app.saveCushion()" style="padding: 10px 14px; background: linear-gradient(135deg,${s.color},${s.color}cc); color: #000; border: none; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase;">Ок</button>
      </div>
    </div>`;
    setTimeout(() => document.getElementById('fin-cushion-input')?.focus(), 50);
  }

  // Форма добавления записи
  if (view.finView === 'add') {
    const t = view.finAddType;
    const cats = FIN_CATEGORIES[t];
    html += `<div style="background: rgba(0,0,0,0.3); border: 1px solid ${s.color}40; border-radius: 12px; padding: 14px; margin-bottom: 14px;">

      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px;" id="fin-cats">

  } else {
    html += `<div style="display: flex; gap: 8px; margin-bottom: 14px;">
      <button onclick="window.__app.startFinAdd('income')" style="flex: 1; padding: 11px; background: rgba(16,232,145,0.1); border: 1px dashed #10E891; color: #10E891; border-radius: 10px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 700;">+ Доход</button>
      <button onclick="window.__app.startFinAdd('expense')" style="flex: 1; padding: 11px; background: rgba(255,61,113,0.1); border: 1px dashed #FF3D71; color: #FF3D71; border-radius: 10px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 700;">+ Расход</button>
    </div>`;

      const isOpen = !!view.expandedGroups?.['fin_day_' + date];

      html += `<div style="margin-bottom:5px;">
        <button onclick="window.__app.toggleGroup('fin_day_${date}')" style="width:100%;display:flex;align-items:center;gap:10px;padding:10px 13px;background:${isOpen?'rgba(255,255,255,0.05)':'rgba(255,255,255,0.025)'};border:1px solid rgba(255,255,255,0.07);border-radius:${isOpen?'10px 10px 0 0':'10px'};cursor:pointer;text-align:left;">
          <div style="flex:1;">
            <div style="font-size:13px;color:#fff;font-weight:600;">${formatDateShort(date)}</div>
            <div style="font-size:10px;color:#6a5a8a;margin-top:1px;">${dayEntries.length} ${plural(dayEntries.length,'запись','записи','записей')}</div>
          </div>
          <div style="text-align:right;flex-shrink:0;">
            ${dayIncome  > 0 ? `<div style="font-size:11px;color:#10E891;font-weight:700;">+$${dayIncome.toFixed(0)}</div>`  : ''}
            ${dayExpense > 0 ? `<div style="font-size:11px;color:#FF3D71;font-weight:700;">−$${dayExpense.toFixed(0)}</div>` : ''}
          </div>
          <div style="font-size:12px;color:#6a5a8a;flex-shrink:0;">${isOpen?'▾':'▸'}</div>
        </button>`;

        html += `<div style="background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.07);border-top:none;border-radius:0 0 10px 10px;padding:6px 8px;">`;

          const cat = findFinCategory(e.type, e.category);
          const isIncome = e.type === 'income';
          const col = isIncome ? '#10E891' : '#FF3D71';

              <div style="font-size:12px;color:#fff;font-weight:600;">${escapeHtml(cat.name)}</div>
              ${e.note ? `<div style="font-size:10px;color:#8870a8;">${escapeHtml(e.note)}</div>` : ''}
            </div>
            <div style="text-align:right;flex-shrink:0;">
              <div style="font-size:13px;color:${col};font-weight:700;">${sign}$${amtUSD.toFixed(0)}</div>

            <button onclick="window.__app.removeFinEntry('${e.id}')" style="background:rgba(255,61,113,0.1);border:1px solid rgba(255,61,113,0.3);color:#FF3D71;cursor:pointer;padding:4px 8px;border-radius:6px;font-size:12px;flex-shrink:0;">✕</button>
          </div>`;
        });
        html += `</div>`;
      }

      html += `</div>`;

  // Круговая диаграмма расходов по категориям
  const chartPeriod = view.finChartPeriod || 'month';
  const chartMonth = view.finChartMonth || currentMonth();
  const now2 = new Date();

  let chartEntries = [];
  if (chartPeriod === 'month') {
    chartEntries = finEntriesForMonth(chartMonth).filter(e => e.type === 'expense');
  } else if (chartPeriod === 'half') {
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now2.getFullYear(), now2.getMonth() - i, 1);
      const ms = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
      chartEntries.push(...finEntriesForMonth(ms).filter(e => e.type === 'expense'));
    }
  } else {
    for (let i = 11; i >= 0; i--) {
      const d = new Date(now2.getFullYear(), now2.getMonth() - i, 1);
      const ms = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
      chartEntries.push(...finEntriesForMonth(ms).filter(e => e.type === 'expense'));
    }
  }

  const catTotals = {};
  chartEntries.forEach(e => {
    const amt = e.amountUSD || e.amount || 0;
    catTotals[e.category] = (catTotals[e.category] || 0) + amt;
  });
  const totalExp = Object.values(catTotals).reduce((s,v) => s+v, 0);

  const [cyr, cmo] = chartMonth.split('-').map(Number);
  const chartMonthLabel = MONTHS_RU[cmo-1] + ' ' + cyr;

  // Кнопки периода
  const periodBtns = [['month','Месяц'],['half','6 мес'],['year','Год']].map(([id,label]) =>

      + '<button onclick="window.__app.shiftChartMonth(-1)" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#b0a0d0;cursor:pointer;width:28px;height:28px;border-radius:7px;font-size:14px;">&#8249;</button>'
      + '<div style="font-size:13px;color:#fff;font-weight:700;">' + chartMonthLabel + '</div>'
      + '<button onclick="window.__app.shiftChartMonth(1)" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#b0a0d0;cursor:pointer;width:28px;height:28px;border-radius:7px;font-size:14px;">&#8250;</button>'
      + '</div>'
    : '';

  html += '<div style="margin-top:16px;padding:14px;background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.05);border-radius:12px;">'
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">'
    + '<div style="font-size:10px;color:#A78BFA;letter-spacing:0.2em;text-transform:uppercase;font-weight:700;">Расходы</div>'
    + '<div style="display:flex;gap:4px;">' + periodBtns + '</div>'
    + '</div>'
    + monthPicker;

  if (totalExp === 0) {
    html += '<div style="text-align:center;padding:20px;font-size:12px;color:#6a5a8a;">Расходов за этот период нет</div>';
  } else {
    const sorted = Object.entries(catTotals).sort((a,b) => b[1]-a[1]);
    const PIE_COLORS = ['#FF3D71','#FFAA00','#00E5FF','#A78BFA','#10E891','#FF4DD8','#FF6B35','#4ECDC4','#FFD700','#B8F2E6'];
    const cx = 80, cy = 80, r = 65, rInner = 35;
    const toRad = a => a * Math.PI / 180;
    let startAngle = -90;
    let paths = '';

    sorted.forEach(([catId, amt], i) => {
      const angle = (amt / totalExp) * 360;
      const color = PIE_COLORS[i % PIE_COLORS.length];
      const endAngle = startAngle + angle;
      const x1  = cx + r      * Math.cos(toRad(startAngle));
      const y1  = cy + r      * Math.sin(toRad(startAngle));
      const x2  = cx + r      * Math.cos(toRad(endAngle));
      const y2  = cy + r      * Math.sin(toRad(endAngle));
      const xi1 = cx + rInner * Math.cos(toRad(startAngle));
      const yi1 = cy + rInner * Math.sin(toRad(startAngle));
      const xi2 = cx + rInner * Math.cos(toRad(endAngle));
      const yi2 = cy + rInner * Math.sin(toRad(endAngle));
      const large = angle > 180 ? 1 : 0;
      paths += '<path d="M ' + xi1 + ' ' + yi1 + ' L ' + x1 + ' ' + y1
        + ' A ' + r + ' ' + r + ' 0 ' + large + ' 1 ' + x2 + ' ' + y2
        + ' L ' + xi2 + ' ' + yi2
        + ' A ' + rInner + ' ' + rInner + ' 0 ' + large + ' 0 ' + xi1 + ' ' + yi1
        + ' Z" fill="' + color + '" opacity="0.9" stroke="#0a0612" stroke-width="1.5"/>';
      startAngle = endAngle;
    });

    const totalStr = totalExp < 1000 ? '$' + totalExp.toFixed(0) : '$' + (Math.round(totalExp/100)/10) + 'k';

    let legend = '';
    sorted.forEach(([catId, amt], i) => {
      const cat = findFinCategory('expense', catId);
      const pct = (amt / totalExp * 100).toFixed(0);
      const color = PIE_COLORS[i % PIE_COLORS.length];
      legend += '<div style="display:flex;align-items:center;gap:7px;margin-bottom:7px;">'
        + '<div style="width:10px;height:10px;border-radius:3px;background:' + color + ';flex-shrink:0;"></div>'
        + '<div style="flex:1;min-width:0;font-size:11px;color:#fff;font-weight:600;">' + escapeHtml(cat.name) + '</div>'
        + '<div style="text-align:right;flex-shrink:0;">'
        + '<div style="font-size:11px;color:' + color + ';font-weight:700;">$' + amt.toFixed(0) + '</div>'
        + '<div style="font-size:9px;color:#6a5a8a;">' + pct + '%</div>'
        + '</div></div>';
    });

    html += '<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">'
      + '<svg width="160" height="160" viewBox="0 0 160 160" style="flex-shrink:0;">'
      + paths
      + '<circle cx="' + cx + '" cy="' + cy + '" r="' + (rInner-2) + '" fill="#0a0612"/>'
      + '<text x="' + cx + '" y="' + (cy-6) + '" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold" font-family="-apple-system,sans-serif">' + totalStr + '</text>'
      + '<text x="' + cx + '" y="' + (cy+10) + '" text-anchor="middle" fill="#6a5a8a" font-size="9" font-family="-apple-system,sans-serif">расходов</text>'
      + '</svg>'
      + '<div style="flex:1;min-width:0;">' + legend + '</div>'
      + '</div>';
  }

  html += '</div>';
  return html;
}

function renderSphereModal() {
  const s = SPHERES.find(x => x.id === view.sphereId);
  const tasks = state.tasks[s.id];
  const ctx = state.context[s.id];
  const sxp = sphereXP(s.id);
  const sh = sphereHours(s.id);
  const lvl = Math.floor(sxp / 200) + 1;
  const hasContext = ctx && Object.values(ctx).some(v => v && v.trim());

  let tasksHtml = '';
  if (tasks.length === 0) tasksHtml = '<div style="text-align: center; color: #6a5a8a; font-size: 12px; padding: 20px;">Ветвь пуста. Добавь первую задачу.</div>';
  else {
    // Порядок обязательных задач из MANDATORY_TASKS (важно для молитв — по времени дня)
    const mandatoryOrder = (MANDATORY_TASKS[s.id] || []).map(m => m.mandatoryKey);
    const sorted = [...tasks].sort((a, b) => {
      if (a.mandatory && !b.mandatory) return -1;
      if (!a.mandatory && b.mandatory) return 1;
      if (a.mandatory && b.mandatory) {
        const aIdx = mandatoryOrder.indexOf(a.mandatoryKey || a.taskKey);
        const bIdx = mandatoryOrder.indexOf(b.mandatoryKey || b.taskKey);
        return aIdx - bIdx;
      }
      return 0;
    });

    // Рендерер одной задачи — переиспользуется
    const renderTaskRow = (t, opts = {}) => {
      const isHM = t.type === 'hours';
      const xpD = isHM ? `~${xpForHours(t.hours || 1)} XP за ${t.hours || 1}ч` : `+${xpFor(t.difficulty)} XP`;
      const stats = t.repeating ? taskStats(t.taskKey, 'all') : null;
      const lastDateLine = stats && stats.lastDate ? `<div style="font-size: 9px; color: #6a5a8a; margin-top: 2px;">посл. ${formatDateRelative(stats.lastDate)}</div>` : '';
      const statsLine = stats && stats.count > 0
        ? `<div style="font-size: 10px; color: ${s.color}; margin-top: 4px; letter-spacing: 0.05em;">×${stats.count}${stats.hours > 0 ? ` · ${stats.hours.toFixed(1)} ч` : ''} <span style="color: #6a5a8a;">всего</span></div>${lastDateLine}`
        : '';
      const mandatoryBadge = (t.mandatory && !opts.compact) ? `<span style="font-size: 8px; padding: 2px 6px; background: ${s.color}25; color: ${s.color}; border: 1px solid ${s.color}50; border-radius: 6px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; margin-left: 6px; vertical-align: middle;">★ обязат.</span>` : '';
      const bg = opts.compact ? 'rgba(255,255,255,0.02)' : (t.mandatory ? `linear-gradient(135deg, ${s.color}10, transparent)` : 'rgba(255,255,255,0.03)');
      const borderLeft = (t.mandatory && !opts.compact) ? `border-left: 3px solid ${s.color};` : '';
      const deleteBtn = `<button onclick="window.__app.removeTask('${s.id}', '${t.id}')" style="background: transparent; border: none; color: #5a4a78; cursor: pointer; padding: 4px; font-size: 14px;">🗑</button>`;
      return `<div style="display: flex; align-items: center; gap: 10px; padding: ${opts.compact ? '9px' : '11px'}; background: ${bg}; border: 1px solid rgba(255,255,255,0.05); ${borderLeft} border-radius: 10px; margin-bottom: 5px;">
        <button onclick="window.__app.completeQuick('${s.id}', '${t.id}')" style="width: ${opts.compact ? '26px' : '28px'}; height: ${opts.compact ? '26px' : '28px'}; border-radius: 50%; background: transparent; border: 2px solid ${s.color}; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; padding: 0; box-shadow: 0 0 8px ${s.glow};"><span style="color: ${s.color}; font-size: 13px; font-weight: 700;">✓</span></button>
        <div style="flex: 1; min-width: 0;">
          <div style="font-size: ${opts.compact ? '12px' : '13px'}; color: #fff; word-break: break-word;">${escapeHtml(t.title)}${mandatoryBadge}</div>
          ${!opts.compact ? `<div style="font-size: 9px; color: #8870a8; margin-top: 2px;">${xpD} ${t.repeating ? '· ↻' : ''} ${isHM ? '· ◷' : ''}</div>` : ''}
          ${statsLine}
        </div>
        ${deleteBtn}
      </div>`;
    };

    // Если у сферы 4+ обязательных задач — группируем их в свёртку
    const mandatoryTasks = sorted.filter(t => t.mandatory);
    const otherTasks = sorted.filter(t => !t.mandatory);
    const shouldGroup = mandatoryTasks.length >= 4;

    if (shouldGroup) {
      const groupKey = `mandatoryGroup_${s.id}`;
      const isOpen = view.expandedGroups && view.expandedGroups[groupKey];
      // Считаем сколько выполнено за сегодня в этой группе
      const todayStr = today();
      const doneToday = mandatoryTasks.filter(t => state.history.some(h => h.taskKey === t.taskKey && h.date === todayStr)).length;
      const headerLabel = s.id === 'religion' ? 'Молитвы дня' : s.id === 'love' ? 'Связь с близкими' : 'Обязательные задачи';

      tasksHtml += `<button onclick="window.__app.toggleGroup('${groupKey}')" style="width: 100%; display: flex; align-items: center; gap: 12px; padding: 13px 14px; background: linear-gradient(135deg, ${s.color}20, ${s.color}05); border: 1px solid ${s.color}50; border-left: 3px solid ${s.color}; border-radius: 10px; cursor: pointer; margin-bottom: 5px; text-align: left;">
        <div style="font-size: 18px; flex-shrink: 0;">${isOpen ? '▾' : '▸'}</div>
        <div style="flex: 1; min-width: 0;">
          <div style="font-size: 14px; color: #fff; font-weight: 700;">${headerLabel}</div>
          <div style="font-size: 10px; color: ${s.color}; letter-spacing: 0.1em; margin-top: 2px;">★ ${mandatoryTasks.length} обязат. · сегодня ${doneToday}/${mandatoryTasks.length}</div>
        </div>
        <div style="display: flex; gap: 3px; flex-shrink: 0;">
          ${mandatoryTasks.map(t => {
            const tDone = state.history.some(h => h.taskKey === t.taskKey && h.date === todayStr);
            return `<div style="width: 8px; height: 8px; border-radius: 50%; background: ${tDone ? s.color : 'rgba(255,255,255,0.08)'}; box-shadow: ${tDone ? '0 0 4px ' + s.color : 'none'};"></div>`;
          }).join('')}
        </div>
      </button>`;

      if (isOpen) {
        tasksHtml += `<div style="margin-left: 8px; padding-left: 8px; border-left: 1px dashed ${s.color}40; margin-bottom: 8px;">`;
        tasksHtml += mandatoryTasks.map(t => renderTaskRow(t, { compact: true })).join('');
        tasksHtml += `</div>`;
      }

      // Не-обязательные задачи отдельно
      tasksHtml += otherTasks.map(t => renderTaskRow(t)).join('');
    } else {
      // Старая логика без группировки
      tasksHtml = sorted.map(t => renderTaskRow(t)).join('');
    }
  }

  let addBlock = '';
  if (view.addingTask) {
    const isHM = view.addMode === 'hours';
    addBlock = `<div style="background: rgba(255,255,255,0.04); border: 1px solid ${s.color}40; border-radius: 12px; padding: 14px; margin-bottom: 14px;"><div style="display: flex; gap: 6px; margin-bottom: 12px;"><button onclick="window.__app.setAddMode('simple')" style="flex: 1; padding: 8px; background: ${!isHM ? s.color : 'transparent'}; color: ${!isHM ? '#000' : '#b0a0d0'}; border: 1px solid ${!isHM ? s.color : 'rgba(255,255,255,0.1)'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;">Сложность</button><button onclick="window.__app.setAddMode('hours')" style="flex: 1; padding: 8px; background: ${isHM ? s.color : 'transparent'}; color: ${isHM ? '#000' : '#b0a0d0'}; border: 1px solid ${isHM ? s.color : 'rgba(255,255,255,0.1)'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;">По часам</button></div><input id="task-title-input" placeholder="Что делаем?" style="width: 100%; padding: 10px 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 13px; margin-bottom: 12px; outline: none;" />${!isHM ? `<div style="font-size: 10px; color: #8870a8; letter-spacing: 0.2em; margin-bottom: 8px; text-transform: uppercase; font-weight: 600;">Сложность</div><div style="display: flex; gap: 6px; margin-bottom: 12px;" id="diff-row">${[['easy', 'Лёгкая', '10'], ['medium', 'Средняя', '25'], ['hard', 'Сложная', '50']].map(([v, l, x]) => `<button data-diff="${v}" onclick="window.__app.setDiff('${v}')" style="flex: 1; padding: 8px; background: ${v === currentDifficulty ? s.color : 'transparent'}; border: 1px solid ${v === currentDifficulty ? s.color : 'rgba(255,255,255,0.1)'}; color: ${v === currentDifficulty ? '#000' : '#b0a0d0'}; font-size: 10px; border-radius: 8px; cursor: pointer; font-weight: 600;">${l}<br><span style="font-size: 9px; opacity: 0.7;">+${x}</span></button>`).join('')}</div>` : `<div style="background: rgba(0,0,0,0.3); border: 1px solid ${s.color}40; border-radius: 10px; padding: 12px; margin-bottom: 12px;"><div style="font-size: 10px; color: #8870a8; letter-spacing: 0.2em; margin-bottom: 8px; text-transform: uppercase; font-weight: 600;">Часов на одно выполнение (по умолчанию)</div><div style="display: flex; align-items: center; gap: 12px;"><input id="hours-input" type="number" min="0.5" max="12" step="0.5" value="1" oninput="window.__app.updateHourPreview()" style="flex: 1; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 16px; outline: none; text-align: center;" /><div style="font-size: 11px; color: #8870a8;">→</div><div id="hour-preview" style="font-size: 16px; color: ${s.color}; font-weight: 700; min-width: 70px; text-align: right;">+25 XP</div></div><div style="font-size: 10px; color: #6a5a8a; margin-top: 8px; line-height: 1.5;">При выполнении сможешь ввести любое число часов. 1ч = 25 XP.</div></div>`}<label style="display: flex; align-items: center; gap: 8px; font-size: 11px; color: #b0a0d0; margin-bottom: 12px; cursor: pointer;"><input id="repeat-check" type="checkbox" checked style="accent-color: ${s.color};" />Повторяющаяся (попадёт в «Учёт»)</label><div style="display: flex; gap: 8px;"><button onclick="window.__app.confirmAddTask('${s.id}')" style="flex: 1; padding: 11px; background: linear-gradient(135deg,${s.color},${s.color}cc); color: #000; border: none; border-radius: 8px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 700; box-shadow: 0 0 16px ${s.glow};">Добавить</button><button onclick="window.__app.cancelAddTask()" style="padding: 11px 16px; background: transparent; color: #8870a8; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-size: 11px; cursor: pointer;">Отмена</button></div></div>`;
    setTimeout(() => document.getElementById('task-title-input')?.focus(), 50);
  } else {
    addBlock = `<button onclick="window.__app.startAddTask()" style="width: 100%; padding: 12px; background: ${s.color}15; border: 1px dashed ${s.color}; border-radius: 10px; color: ${s.color}; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; margin-bottom: 14px; font-weight: 700;">+ Добавить задачу</button>`;
  }

  let contextHtml = '';

  const financeHtml = s.id === 'money' ? renderFinancePanel(s) : '';
  const hasSkillsForSphere = (state.skills || []).some(sk => (sk.sphereId || 'skills') === s.id);
  const skillsHtml = hasSkillsForSphere ? renderSkillsPanel(s) : '';
  const bodyHtml = s.id === 'body' ? renderBodyPanel(s) : '';

  // ── Счётчик «Чистый путь» для религии ────────────────────────────────
  let purityHtml = '';
  if (s.id === 'religion') {
    const purity = state.purityDate || null;
    const isEditing = view.purityEditing;

    purityHtml += '<div style="background:linear-gradient(135deg,' + s.color + '12,transparent);border:1px solid ' + s.color + '35;border-radius:14px;padding:16px;margin-bottom:16px;">';

    if (purity && !isEditing) {
      const startDate = new Date(purity);
      const now = new Date();
      const diffMs = now - startDate;
      const totalDays = Math.floor(diffMs / 86400000);
      const months = Math.floor(totalDays / 30);
      const days = totalDays % 30;

      // Уровень стойкости
      let rank, rankColor;
      if (totalDays < 7)       { rank = 'Начало пути'; rankColor = '#6a5a8a'; }
      else if (totalDays < 30) { rank = 'Стойкость'; rankColor = '#00E5FF'; }
      else if (totalDays < 90) { rank = 'Дисциплина'; rankColor = '#10E891'; }
      else if (totalDays < 180){ rank = 'Сила воли'; rankColor = '#FFAA00'; }
      else if (totalDays < 365){ rank = 'Мастерство'; rankColor = '#FF4DD8'; }
      else                     { rank = 'Несокрушимый'; rankColor = '#A78BFA'; }

      // Прогресс до следующего рубежа
      const milestones = [7, 30, 90, 180, 365, 730];
      const nextM = milestones.find(m => m > totalDays) || 730;
      const prevM = milestones.filter(m => m <= totalDays).pop() || 0;
      const pct = Math.min(100, Math.round((totalDays - prevM) / (nextM - prevM) * 100));

      purityHtml += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">'
        + '<div style="font-size:10px;letter-spacing:0.25em;color:' + s.color + ';text-transform:uppercase;font-weight:700;">☽ Чистый путь</div>'
        + '<button data-act="editPurity" onclick="window.__app.editPurity()" style="background:transparent;border:none;color:#5a4a78;cursor:pointer;font-size:11px;">✎</button>'
        + '</div>';

      purityHtml += '<div style="text-align:center;margin-bottom:14px;">'
        + '<div style="font-size:48px;font-weight:800;color:#fff;line-height:1;text-shadow:0 0 30px ' + s.color + '60;">' + totalDays + '</div>'
        + '<div style="font-size:12px;color:#8870a8;margin-top:2px;">' + (totalDays === 1 ? 'день' : (totalDays < 5 ? 'дня' : 'дней')) + '</div>'
        + (months > 0 ? '<div style="font-size:11px;color:' + s.color + ';margin-top:4px;">' + months + ' мес ' + days + ' дн</div>' : '')
        + '</div>';

      // Ранг
      purityHtml += '<div style="text-align:center;margin-bottom:12px;">'
        + '<span style="display:inline-block;padding:5px 14px;background:' + rankColor + '20;border:1px solid ' + rankColor + ';border-radius:20px;font-size:11px;color:' + rankColor + ';font-weight:700;letter-spacing:0.1em;">' + rank + '</span>'
        + '</div>';

      // === Персонаж Берсерка (по месяцу чистоты) ===
      const bk = getBerserkTier(totalDays);
      const daysInMonth = totalDays % 30;
      const isFreshTier = daysInMonth < 2;
      // приоритет: пользовательский upload > встроенный портрет из MAL > символ
      const customPortrait = (state.berserkPortraits || {})[bk.idx];
      const portrait = customPortrait || bk.img || null;
      const medallionInner = portrait
        ? '<img src="' + portrait + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />'
        : '<span style="font-size:34px;color:' + bk.color + ';text-shadow:0 0 12px ' + bk.color + ';">' + bk.symbol + '</span>';
      purityHtml += '<div style="text-align:center;margin:18px 0 12px;" key="bk-' + bk.idx + '">'
        + '<div onclick="window.__app.uploadBerserkPortrait(' + bk.idx + ')" class="berserk-medallion" style="--bk-c:' + bk.color + ';position:relative;display:inline-flex;align-items:center;justify-content:center;width:72px;height:72px;border-radius:50%;background:radial-gradient(circle,' + bk.color + '30 0%,' + bk.color + '08 70%,transparent 100%);border:2px solid ' + bk.color + ';overflow:hidden;cursor:pointer;">' + medallionInner
        + '<div style="position:absolute;bottom:-2px;right:-2px;width:22px;height:22px;border-radius:50%;background:#0a0612;border:1.5px solid ' + bk.color + ';display:flex;align-items:center;justify-content:center;font-size:10px;color:' + bk.color + ';">' + (portrait ? '✎' : '+') + '</div>'
        + '</div>'
        + '<div class="berserk-name" style="margin-top:8px;font-family:Georgia,serif;font-size:15px;font-weight:700;color:#e8d5a8;letter-spacing:0.12em;text-transform:uppercase;">' + bk.name + '</div>'
        + '<div style="font-size:10px;color:' + bk.color + ';letter-spacing:0.15em;text-transform:uppercase;margin-top:2px;font-weight:600;">Месяц ' + bk.month + ' · ' + bk.tag + '</div>'
        + (isFreshTier && totalDays >= 30 ? '<div style="font-size:9px;color:#10E891;letter-spacing:0.2em;text-transform:uppercase;margin-top:6px;font-weight:700;animation:cel-in 1s;">✦ Новый персонаж раскрыт</div>' : '')
        + (!portrait ? '<div style="font-size:9px;color:#6a5a8a;margin-top:4px;">тапни чтобы загрузить лицо</div>' : (!customPortrait ? '<div style="font-size:9px;color:#6a5a8a;margin-top:4px;">тапни чтобы заменить</div>' : ''))
        + '</div>';

      // Прогресс до рубежа
      purityHtml += '<div style="margin-bottom:6px;">'
        + '<div style="display:flex;justify-content:space-between;font-size:9px;color:#6a5a8a;margin-bottom:4px;">'
        + '<span>До ' + nextM + ' дней</span>'
        + '<span>' + pct + '%</span>'
        + '</div>'
        + '<div style="height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;">'
        + '<div style="height:100%;width:' + pct + '%;background:' + s.color + ';border-radius:2px;box-shadow:0 0 8px ' + s.color + '60;"></div>'
        + '</div>'
        + '</div>';

      purityHtml += '<div style="font-size:9px;color:#5a4a78;text-align:center;">с ' + formatDateLong(purity) + '</div>';

    } else {
      // Форма ввода / редактирования даты
      purityHtml += '<div style="font-size:10px;letter-spacing:0.25em;color:' + s.color + ';text-transform:uppercase;font-weight:700;margin-bottom:10px;">☽ Чистый путь</div>'
        + '<div style="font-size:12px;color:#8870a8;margin-bottom:10px;">Укажи дату начала — с какого дня ты держишь путь</div>'
        + '<input id="purity-date-input" type="date" value="' + (purity || today()) + '" max="' + today() + '" style="width:100%;padding:10px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;font-size:14px;outline:none;text-align:center;margin-bottom:10px;color-scheme:dark;" />'
        + '<div style="display:flex;gap:8px;">'
        + '<button onclick="window.__app.savePurity()" style="flex:1;padding:10px;background:' + s.color + ';border:none;border-radius:8px;color:#000;font-size:12px;font-weight:700;cursor:pointer;">Начать отсчёт</button>'
        + (purity ? '<button onclick="window.__app.cancelEditPurity()" style="padding:10px 14px;background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#8870a8;font-size:12px;cursor:pointer;">Отмена</button>' : '')
        + (purity ? '<button onclick="window.__app.resetPurity()" style="padding:10px 14px;background:rgba(255,61,113,0.1);border:1px solid rgba(255,61,113,0.3);border-radius:8px;color:#FF3D71;font-size:11px;cursor:pointer;">Сброс</button>' : '')
        + '</div>';
    }

    purityHtml += '</div>';
  }
  // ────────────────────────────────────────────────────────────────────────

  // Мини-блок прогресса к следующему этапу
  let stageProgressHtml = '';
  const currentStageIdx = PATH.findIndex(st => !state.stagesUnlocked[st.id]);
  if (currentStageIdx > 0 && currentStageIdx < PATH.length) {
    const stage = PATH[currentStageIdx];
    const prog = sphereProgressForStage(s.id, stage.id);
    const targetType = SPHERE_TARGET_TYPE[s.id];
    const unit = targetType === 'hours' ? ' ч' : '';
    const formatNum = n => targetType === 'hours' ? n.toFixed(1) : Math.round(n);
    const isDone = prog.pct >= 100;
    const remaining = Math.max(0, prog.target - prog.current);
    stageProgressHtml = `<div style="background: rgba(0,0,0,0.25); border: 1px solid ${isDone ? s.color + '50' : 'rgba(255,255,255,0.06)'}; border-radius: 10px; padding: 11px 13px; margin-bottom: 14px;">
      <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px;">
        <div style="font-size: 10px; color: ${s.color}; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700;">До этапа «${escapeHtml(stage.title)}»</div>
        <div style="font-size: 12px; color: ${isDone ? '#10E891' : '#fff'}; font-weight: 700;">${isDone ? '✓ готово' : `${Math.round(prog.pct)}%`}</div>
      </div>
      <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px;">
        <span style="color: #b0a0d0;">${formatNum(prog.current)}${unit} <span style="color:#6a5a8a;">из ${prog.target}${unit}</span></span>
        ${!isDone ? `<span style="color: ${s.color};">осталось ${formatNum(remaining)}${unit}</span>` : ''}
      </div>
      <div style="height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden;">
        <div style="height: 100%; width: ${prog.pct}%; background: ${s.color}; box-shadow: 0 0 6px ${s.glow};"></div>
      </div>
    </div>`;
  }

  return `<div style="position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 200; display: flex; align-items: flex-end; justify-content: center;"><div style="background: linear-gradient(180deg, #150a25, #0a0612); border-radius: 20px 20px 0 0; width: 100%; max-width: 520px; max-height: 88vh; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px; position: relative; border-top: 3px solid ${s.color}; box-shadow: 0 -10px 40px ${s.glow};"><button onclick="window.__app.closeModal()" style="position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #b0a0d0; cursor: pointer; padding: 0; width: 36px; height: 36px; border-radius: 50%; font-size: 16px;">✕</button><div style="display: flex; align-items: center; gap: 14px; margin: 8px 0 18px;"><div style="font-size: 32px; color: ${s.color}; text-shadow: 0 0 12px ${s.glow};">${s.emoji}</div><div><div style="font-size: 20px; color: #fff; font-weight: 700;">${s.name}</div><div style="font-size: 11px; color: ${s.color}; letter-spacing: 0.1em;">Уровень ${lvl} · ${sxp} XP${sh > 0 ? ` · ${sh.toFixed(1)} ч` : ''}</div></div></div>${stageProgressHtml}${contextHtml}${purityHtml}${bodyHtml}${skillsHtml}${financeHtml}${addBlock}${tasksHtml}</div></div>`;
}

function renderStageModal() {
  const s = PATH.find(x => x.id === view.stageId);
  const unlocked = !!state.stagesUnlocked[s.id];
  const dp = daysPassed();
  const daysRem = Math.max(0, s.days - dp);
  const reflection = state.stageReflections?.[s.id] || '';
  let targetDate = '';
  if (state.startedAt) {
    const start = parseISO(state.startedAt);
    const target = new Date(start);
    target.setDate(target.getDate() + s.days);
    targetDate = formatDateLong(dateToISO(target));
  }

  let body = '';
  if (!unlocked) {
    const ready = isStageReady(s.id);
    const overall = stageOverallProgress(s.id);

    body = `<div style="background: rgba(255,255,255,0.04); border: 1px solid rgba(167,139,250,0.2); border-radius: 12px; padding: 16px; margin-bottom: 14px;">
      <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px;">
        <div style="font-size: 10px; letter-spacing: 0.25em; color: #A78BFA; text-transform: uppercase; font-weight: 700;">Что нужно сделать</div>
        <div style="font-size: 14px; color: ${ready ? '#10E891' : '#fff'}; font-weight: 800;">${overall}%</div>
      </div>
      <div style="height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; margin-bottom: 12px;">
        <div style="height: 100%; width: ${overall}%; background: ${ready ? 'linear-gradient(90deg,#10E891,#A78BFA)' : 'linear-gradient(90deg,#A78BFA,#FF4DD8)'};"></div>
      </div>
      ${daysRem > 0 ? `<div style="font-size: 12px; color: #FFAA00; margin-bottom: 10px; padding: 8px 10px; background: rgba(255,170,0,0.08); border: 1px solid rgba(255,170,0,0.2); border-radius: 8px;">⏱ Время: ещё <strong>${daysRem} ${plural(daysRem, 'день', 'дня', 'дней')}</strong> до самого раннего открытия (${targetDate})</div>` : `<div style="font-size: 12px; color: #10E891; margin-bottom: 10px; padding: 8px 10px; background: rgba(16,232,145,0.08); border: 1px solid rgba(16,232,145,0.2); border-radius: 8px;">⏱ Время: срок прошёл, можно открывать когда дотянутся все сферы</div>`}
      <div style="display: grid; grid-template-columns: 1fr; gap: 6px;">`;

    SPHERES.forEach(sp => {
      const prog = sphereProgressForStage(sp.id, s.id);
      const targetType = SPHERE_TARGET_TYPE[sp.id];
      const unit = targetType === 'hours' ? ' ч' : '';
      const formatNum = n => targetType === 'hours' ? n.toFixed(1) : Math.round(n);
      const isDone = prog.pct >= 100;
      const remaining = Math.max(0, prog.target - prog.current);
      body += `<div style="background: rgba(0,0,0,0.25); border: 1px solid ${isDone ? sp.color + '60' : 'rgba(255,255,255,0.05)'}; border-left: 3px solid ${sp.color}; border-radius: 8px; padding: 10px 11px;">
        <div style="display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px;">
          <div style="display: flex; align-items: center; gap: 8px; min-width: 0; flex: 1;">
            <span style="font-size: 16px; flex-shrink: 0;">${sp.emoji}</span>
            <span style="font-size: 12px; color: #fff; font-weight: 600;">${sp.name}</span>
            ${isDone ? '<span style="font-size: 10px; color: #10E891; font-weight: 700;">✓</span>' : ''}
          </div>
          <div style="text-align: right; flex-shrink: 0;">
            <div style="font-size: 12px; color: ${isDone ? '#10E891' : '#fff'}; font-weight: 700; line-height: 1;">${formatNum(prog.current)}${unit} <span style="color:#6a5a8a; font-weight: 400;">/ ${prog.target}${unit}</span></div>
            ${!isDone ? `<div style="font-size: 9px; color: ${sp.color}; margin-top: 2px;">осталось ${formatNum(remaining)}${unit}</div>` : ''}
          </div>
        </div>
        <div style="height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden;">
          <div style="height: 100%; width: ${prog.pct}%; background: ${sp.color}; box-shadow: 0 0 6px ${sp.glow};"></div>
        </div>
      </div>`;
    });

    body += `</div>
      <div style="font-size: 10px; color: #6a5a8a; margin-top: 12px; line-height: 1.5;">
        Этап откроется когда <strong style="color:#b0a0d0;">все 6 сфер дойдут до 100%</strong> и пройдёт срок (${targetDate}). Раньше срока нельзя.
      </div>
    </div>
    <div style="margin-top:14px;padding:14px 16px;background:rgba(255,170,0,0.06);border:1px solid rgba(255,170,0,0.2);border-radius:12px;">

function addSkillSession(skillId, subId, hours, date, note) {
  const sk = (state.skills || []).find(x => x.id === skillId);
  if (!sk) return;
  const sub = findSkillSub(sk, subId);
  const isInvert = sub && sub.invertGood;
  // Антиметрика: записываем как «случай», 0 XP, 0 часов в общий счётчик сферы
  const xp = isInvert ? 0 : xpForHours(hours);
  const hoursForHistory = isInvert ? 0 : hours;
  const title = `${sk.name}${sub ? ` — ${sub.name}` : ''}${isInvert ? ' [случай]' : ''}${note ? ` · ${note}` : ''}`;
  const sphereId = sk.sphereId || 'skills';
  state.history.push({
    id: Date.now().toString(),
    sphere: sphereId,
    title,
    taskKey: `skill_${skillId}_${subId || 'none'}`,
    skillId, subId,
    xp,
    hours: hoursForHistory,
    rawCount: isInvert ? hours : null,
    date: date || today(),
    timestamp: Date.now(),
    note: note || ''
  });

  // Тост о записи
  const sphere = SPHERES.find(s => s.id === sphereId);
  const prog = sphereProgressForStage(sphereId, currentStageId());
  let toastText;
  if (isInvert) {
    toastText = `⚠ ${sub.name} +${hours}`;
    showToast(toastText, '#FF3D71');
  } else {
    const targetType = SPHERE_TARGET_TYPE[sphereId];
    if (targetType === 'hours') {
      toastText = `${sphere.emoji} ${sphere.name} +${hours}ч → ${prog.current.toFixed(1)}/${prog.target}ч`;
    } else {
      toastText = `${sphere.emoji} ${sphere.name} +${hours}ч`;
    }
    showToast(toastText, sphere.color);
  }
  const stageUnlocked = checkUnlocks();
  const newAch = checkAchievements();
  save();
  if (stageUnlocked) {
    showCelebration('Этап открыт', 'Карта пути');
    setTimeout(() => { newAch.forEach((a, i) => setTimeout(() => showCelebration(a.name, 'Достижение'), i * 1800)); }, 3200);
  } else if (newAch.length) {
    newAch.forEach((a, i) => setTimeout(() => showCelebration(a.name, 'Достижение'), i * 1800));
  }
  render();
}

  tab: t => { view.tab = t; render(); },
  openGoalsModal: () => { view.goalsModal = true; view.editingGoalSphere = null; render(); },
  closeGoalsModal: () => { view.goalsModal = false; view.editingGoalSphere = null; render(); },
  openSphere: id => { view.sphereId = id; view.contextVisible = false; render(); },
  uploadFace: function(input) {
    var file = input.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        // Выходной размер — достаточно большой для красивого отображения
        var OUT = 120, OUTH = 150;
        var canvas = document.createElement('canvas');
        canvas.width = OUT; canvas.height = OUTH;
        var ctx2 = canvas.getContext('2d');

        // Crop: берём верхние 60% высоты (лицо обычно там), квадрат по ширине
        var cropW = img.width;
        var cropH = Math.min(img.height, img.width * 1.25); // чуть выше чем квадрат
        var cropX = 0;
        var cropY = 0; // берём с верхушки — там лицо
        // Если фото портретное — смещаем вниз на 5% (лоб)
        if (img.height > img.width * 1.3) cropY = img.height * 0.04;

        // 1) Рисуем с усиленным контрастом и насыщенностью (CSS filter)
        ctx2.filter = 'contrast(150%) saturate(180%) brightness(108%)';
        ctx2.drawImage(img, cropX, cropY, cropW, cropH, 0, 0, OUT, OUTH);
        ctx2.filter = 'none';

        // 2) Постеризация (cel-shading): квантуем каждый канал до N уровней
        var imageData = ctx2.getImageData(0, 0, OUT, OUTH);
        var d = imageData.data;
        var levels = 6; // 6 уровней → чёткие цветовые блоки как в аниме
        var step = 255 / levels;
        for (var i = 0; i < d.length; i += 4) {
          d[i]   = Math.round(d[i]   / step) * step;
          d[i+1] = Math.round(d[i+1] / step) * step;
          d[i+2] = Math.round(d[i+2] / step) * step;
        }
        ctx2.putImageData(imageData, 0, 0);

        // 3) Радиальное затемнение краёв (виньетка — как портрет)
        var vgrd = ctx2.createRadialGradient(OUT/2, OUTH/2, OUT*0.3, OUT/2, OUTH/2, OUT*0.72);
        vgrd.addColorStop(0,   'rgba(0,0,0,0)');
        vgrd.addColorStop(0.7, 'rgba(0,0,0,0)');
        vgrd.addColorStop(1,   'rgba(0,0,0,0.55)');
        ctx2.fillStyle = vgrd;
        ctx2.fillRect(0, 0, OUT, OUTH);

        // 4) Сохраняем
        state.characterFace = canvas.toDataURL('image/jpeg', 0.9);
        save(); render();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  },

    state.sleep.entries = state.sleep.entries.filter(e => e.date !== f.date);

  uploadBerserkPortrait: (idx) => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = (e) => {
      const f = e.target.files && e.target.files[0];
      if (!f) return;
      const reader = new FileReader();
      reader.onload = () => {
        // Сжимаем картинку до 200x200 чтобы не раздувать localStorage
        const img = new Image();
        img.onload = () => {
          const sz = 200;
          const cv = document.createElement('canvas');
          cv.width = sz; cv.height = sz;
          const ctx = cv.getContext('2d');
          // crop to square + cover
          const ratio = Math.max(sz / img.width, sz / img.height);
          const w = img.width * ratio, h = img.height * ratio;
          ctx.drawImage(img, (sz - w) / 2, (sz - h) / 2, w, h);
          const dataUrl = cv.toDataURL('image/jpeg', 0.82);
          if (!state.berserkPortraits) state.berserkPortraits = {};
          state.berserkPortraits[idx] = dataUrl;
          save(); render();
          const charName = BERSERK_TIERS[idx]?.name || 'персонаж';
          showToast('✦ Лицо: ' + charName, BERSERK_TIERS[idx]?.color || '#A78BFA');
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(f);
    };
    input.click();
  },

    if (el) view.todoInputText = el.value;
    view.todoNewCat = cat;
    render();
  },
  todoConfirmAdd: () => {
    const el = document.getElementById('todo-input');
    const text = (el?.value || view.todoInputText || '').trim();
    if (!text) { el?.focus(); return; }
    if (!state.dailyTodos) state.dailyTodos = [];
    state.dailyTodos.push({
      id: Date.now().toString(36),
      text, cat: view.todoNewCat || 'other',
      done: false, createdAt: today(),
    });
    view.todoAdding = false;
    view.todoInputText = '';
    view.todoNewCat = 'other';
    save(); render();
  },
  todoToggle: (id) => {
    const t = (state.dailyTodos || []).find(x => x.id === id);
    if (!t) return;
    // Выполнено — уходит в хронику и удаляется из списка
    const sphere = SPHERES.find(s => s.id === t.cat);
    state.history.push({
      id: Date.now().toString(36),
      type: 'daily_todo', title: t.text,
      sphere: t.cat, sphereName: sphere ? sphere.name : 'Прочее',
      xp: 0, hours: 0, date: today(), ts: Date.now(), taskKey: null,
    });
    state.dailyTodos = state.dailyTodos.filter(x => x.id !== id);
    save(); render();
    showToast('✓ Готово!', 'var(--accent,#ff7a3c)');
  },
  todoDelete: (id) => {
    state.dailyTodos = (state.dailyTodos || []).filter(x => x.id !== id);
    save(); render();
  },
  todoFilterCat: (cat) => { view.todoFilterCat = cat; render(); },

  toggleGroup: (key) => {
    if (!view.expandedGroups) view.expandedGroups = {};
    view.expandedGroups[key] = !view.expandedGroups[key];
    render();
  },

  timerStart: () => {
    view.timerStartTs = Date.now() - (view.timerElapsed || 0) * 1000;
    view.timerPickSkill = false;
    if (window.__timerInterval) clearInterval(window.__timerInterval);
    window.__timerInterval = setInterval(() => {
      if (!view.timerStartTs) { clearInterval(window.__timerInterval); return; }
      view.timerElapsed = Math.floor((Date.now() - view.timerStartTs) / 1000);
      const el = document.getElementById('timer-display');
      if (el) {
        const e = view.timerElapsed;
        el.textContent = String(Math.floor(e/3600)).padStart(2,'0') + ':' + String(Math.floor((e%3600)/60)).padStart(2,'0') + ':' + String(e%60).padStart(2,'0');
      }
    }, 1000);
    render();
  },
  timerStop: () => {
    clearInterval(window.__timerInterval);
    view.timerElapsed = Math.floor((Date.now() - view.timerStartTs) / 1000);
    view.timerStartTs = null;
    view.timerPickSkill = true;
    view.timerSelectedSkill = null;
    view.timerSelectedSub = null;
    render();
  },
  timerReset: () => {
    clearInterval(window.__timerInterval);
    view.timerStartTs = null;
    view.timerElapsed = 0;
    view.timerPickSkill = false;
    view.timerSelectedSkill = null;
    view.timerSelectedSub = null;
    render();
  },
  timerSelectSkill: (id) => {
    view.timerSelectedSkill = view.timerSelectedSkill === id ? null : id;
    view.timerSelectedSub = null;
    render();
  },
  timerSetSub: (subId) => { view.timerSelectedSub = subId; render(); },
  timerSaveTo: (skillId) => {
    const hours = (view.timerElapsed || 0) / 3600;
    if (hours < 5/60) { showToast('Минимум 5 минут', '#FF3D71'); return; }
    const sk = (state.skills || []).find(s => s.id === skillId);
    if (!sk) return;
    const sub = view.timerSelectedSub ? (sk.subs || []).find(s => s.id === view.timerSelectedSub) : null;
    state.history.push({
      id: Date.now().toString(36),
      skillId, sphereId: sk.sphereId || 'skills', subId: view.timerSelectedSub || null,
      hours: parseFloat(hours.toFixed(2)),
      note: 'Секундомер' + (sub ? ' · ' + sub.name : ''),
      date: today(), ts: Date.now(),
      title: sk.name + (sub ? ' · ' + sub.name : ''),
      sphere: sk.sphereId || 'skills',
      xp: Math.round(hours * 25), type: 'skill', taskKey: null,
    });
    clearInterval(window.__timerInterval);
    view.timerStartTs = null; view.timerElapsed = 0; view.timerPickSkill = false;
    view.timerSelectedSkill = null; view.timerSelectedSub = null;
    save(); render();
    showToast('+' + Math.round(hours * 25) + ' XP · ' + Math.round(hours * 60) + 'мин', sk.color || '#00E5FF');
  }
};

load();
</script>

<!-- ============== ПЕРЕКЛЮЧАТЕЛЬ ТЕМ ============== -->
<div id="kp-theme-toggle">

    </button>

      <button class="kp-pal" data-pal="aurora" title="Aurora · бирюза" aria-label="Aurora" onclick="window.kpSetPalette('aurora')"></button>
      <button class="kp-pal" data-pal="lava" title="Lava · лава" aria-label="Lava" onclick="window.kpSetPalette('lava')"></button>
      <button class="kp-pal" data-pal="forest" title="Forest · мох" aria-label="Forest" onclick="window.kpSetPalette('forest')"></button>
      <button class="kp-pal" data-pal="plum" title="Plum · слива" aria-label="Plum" onclick="window.kpSetPalette('plum')"></button>

  </div>
</div>

<script>
(function(){
  const NAMES = {
    dark: 'Оригинал',
    pro: 'Профессиональный',
    creative: 'Творческий',
    notion: 'Notion',
    editorial: 'Editorial'
  };
  const DOTS = {
    dark:      'linear-gradient(135deg, #A78BFA, #FF4DD8)',
    pro:       'linear-gradient(135deg, #2553d6, #1742a8)',
    creative:  'linear-gradient(135deg, #ff5a3c, #ffb13c)',
    notion:    'linear-gradient(135deg, #2383e2, #0b6bcb)',
    editorial: 'linear-gradient(135deg, #8b1a1a, #5d0d0d)'
  };
  const THEME_COLOR = {
    dark: '#0a0612', pro: '#f4f5f7', creative: '#f6efe2', notion: '#ffffff', editorial: '#f1ead8'
  };
  function refresh() {
    const t = document.documentElement.getAttribute('data-theme') || 'dark';
    const p = document.documentElement.getAttribute('data-palette') || 'vermillion';
    const name = document.getElementById('kp-theme-name');
    const dot  = document.getElementById('kp-theme-dot');
    if (name) name.textContent = NAMES[t] || 'Тема';
    if (dot)  dot.style.background = DOTS[t] || DOTS.dark;
    document.querySelectorAll('#kp-theme-menu button[data-th]').forEach(b => {
      b.classList.toggle('active', b.dataset.th === t);
    });
    document.querySelectorAll('#kp-palette-row .kp-pal').forEach(b => {
      b.classList.toggle('active', b.dataset.pal === p);
    });
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta && THEME_COLOR[t]) meta.setAttribute('content', THEME_COLOR[t]);
  }
  window.kpToggleThemeMenu = function() {
    document.getElementById('kp-theme-menu').classList.toggle('open');
  };
  window.kpSetTheme = function(t) {
    document.documentElement.setAttribute('data-theme', t);
    try { localStorage.setItem('kp_theme', t); } catch(e) {}
    refresh();
  };
  window.kpSetPalette = function(p) {
    document.documentElement.setAttribute('data-palette', p);
    try { localStorage.setItem('kp_palette', p); } catch(e) {}
    refresh();
  };
  // восстановить сохранённую палитру
  try {
    const savedPal = localStorage.getItem('kp_palette');
    if (savedPal) document.documentElement.setAttribute('data-palette', savedPal);
    else document.documentElement.setAttribute('data-palette', 'vermillion');
  } catch(e) { document.documentElement.setAttribute('data-palette', 'vermillion'); }
  document.addEventListener('click', (e) => {
    const wrap = document.getElementById('kp-theme-toggle');
    if (wrap && !wrap.contains(e.target)) {
      const m = document.getElementById('kp-theme-menu');
      if (m) m.classList.remove('open');
    }
  });
  refresh();
})();
</script>
</body>
