        + '<button onclick="window.__app.todoDelete(\'' + t.id + '\')" style="width:26px;height:26px;border-radius:8px;flex-shrink:0;padding:0;background:transparent;border:1px solid rgba(255,255,255,0.1);color:#6a5a8a;cursor:pointer;font-size:13px;">✕</button>'
        + '</div>';
    });
  }

  html += '</div>';
  // ─────────────────────────────────────────────────────────────────────────

  return html;
}

// === ВКЛАДКА «ЦЕЛИ» ===
function renderGoals() {
  let html = '';

  // Заголовок
  html += '<div style="text-align:center;margin-bottom:20px;">'
    + '<div style="font-size:10px;letter-spacing:0.3em;color:#A78BFA;text-transform:uppercase;font-weight:700;">Мои цели</div>'
    + '<p style="font-size:12px;color:#6a5a8a;margin:5px 0 0;">Тапни на цель чтобы изменить</p>'
    + '</div>';

  SPHERES.forEach(s => {
    const ctx = state.context?.[s.id] || {};
    const goalText = ctx.goal || ctx.wanted || ctx.criteria || '';
    // Срок в месяцах — если задан, считаем от него, иначе от 36
    const deadlineMonths = ctx.deadline || 36;
    // Пересчитываем прогресс от дедлайна (не от s6 который всегда 36 мес)
    const totalMonths = 36; // s6 = 36 месяцев
    const scaleFactor = totalMonths / deadlineMonths;
    const prog = sphereProgressForStage(s.id, 's6');
    const pct = Math.min(100, Math.round(prog.pct * scaleFactor));
    const type = SPHERE_TARGET_TYPE[s.id];
    const unit = type === 'hours' ? 'ч' : '';
    const current = type === 'hours' ? prog.current.toFixed(1) : Math.round(prog.current);
    // Цель по дедлайну = target * (deadline/36)
    const fullTarget = prog.target;
    const deadlineTarget = type === 'hours'
      ? (fullTarget * deadlineMonths / totalMonths).toFixed(0)
      : Math.round(fullTarget * deadlineMonths / totalMonths);

    const isEditing = view.editingGoalSphere === s.id;

    html += `<div style="padding:14px;background:linear-gradient(135deg,${s.color}12,${s.color}04);border:1px solid ${s.color}35;border-radius:14px;margin-bottom:10px;">`;

    // Шапка карточки
    html += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
      <div style="font-size:22px;color:${s.color};text-shadow:0 0 10px ${s.glow};">${s.emoji}</div>
      <div style="flex:1;font-size:14px;color:#fff;font-weight:700;">${s.name}</div>
      <button onclick="window.__app.editGoal('${s.id}')" style="padding:5px 12px;background:${isEditing?s.color+'30':'rgba(255,255,255,0.05)'};border:1px solid ${isEditing?s.color+'80':'rgba(255,255,255,0.1)'};border-radius:7px;color:${isEditing?s.color:'#8870a8'};font-size:11px;cursor:pointer;font-weight:600;">${isEditing?'↑ Сохранить':'✎ Изменить'}</button>
    </div>`;

    // Редактирование или отображение
    if (isEditing) {
      const currentDeadline = ctx.deadline || 12;
      html += `<textarea id="goal-edit-${s.id}" style="width:100%;padding:10px 12px;background:rgba(0,0,0,0.4);border:1px solid ${s.color}60;border-radius:9px;color:#fff;font-size:13px;line-height:1.5;resize:none;outline:none;min-height:70px;font-family:inherit;margin-bottom:8px;" placeholder="Напиши цель конкретно — чего хочешь достичь в этой сфере">${escapeHtml(goalText)}</textarea>`;
      html += `<div style="display:flex;align-items:center;gap:10px;">
        <div style="font-size:11px;color:#8870a8;flex-shrink:0;">Срок:</div>
        <select id="goal-deadline-${s.id}" style="flex:1;padding:8px 10px;background:rgba(0,0,0,0.4);border:1px solid ${s.color}40;border-radius:8px;color:#fff;font-size:12px;outline:none;">
          ${[1,2,3,6,9,12,18,24,36].map(m => `<option value="${m}" ${currentDeadline==m?'selected':''}>${m} ${m===1?'месяц':m<5?'месяца':'месяцев'}</option>`).join('')}
        </select>
      </div>`;
    } else {
      const deadline = ctx.deadline;
      const deadlineLabel = deadline ? `· ${deadline} ${deadline===1?'месяц':deadline<5?'месяца':'месяцев'}` : '';
      html += `<div onclick="window.__app.editGoal('${s.id}')" style="font-size:13px;color:${goalText?'#d0c0e8':'#3a2a58'};line-height:1.5;margin-bottom:6px;min-height:36px;cursor:pointer;font-style:${goalText?'normal':'italic'};">${goalText ? escapeHtml(goalText) : 'Цель не задана — нажми «Изменить»'}</div>`;
      if (deadline) html += `<div style="font-size:10px;color:#6a5a8a;margin-bottom:8px;">⏱ Срок: ${deadline} ${deadline===1?'месяц':deadline<5?'месяца':'месяцев'}</div>`;
      else html += `<div style="margin-bottom:8px;"></div>`;
    }

    // Прогресс-бар
    html += `<div style="height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin-bottom:6px;">
      <div style="height:100%;width:${pct}%;background:${pct>=100?'#10E891':s.color};border-radius:3px;transition:width .4s;"></div>
    </div>`;

    // Цифры
    html += `<div style="display:flex;justify-content:space-between;font-size:10px;color:#6a5a8a;">
      <span>${current} ${unit} из ${deadlineTarget} ${unit}</span>
      <span style="color:${pct>=100?'#10E891':s.color};font-weight:700;">${pct}%</span>
    </div>`;

    html += '</div>';
  });

  return html;
}

// === ВКЛАДКА «ПУТЬ» — этапы ===
function renderPathStages() {
  const dp = daysPassed();
  const currentIdx = PATH.findIndex(s => !state.stagesUnlocked[s.id]);

  let html = '<div style="text-align:center;margin-bottom:20px;">'
    + '<div style="font-size:10px;letter-spacing:0.3em;color:#A78BFA;text-transform:uppercase;font-weight:700;">Карта пути · 3 года</div>'
    + '<p style="font-size:12px;color:#6a5a8a;margin:5px 0 0;">Этап откроется когда все сферы дотянутся</p>'
    + '</div>';

  // Карточка текущего этапа
  if (currentIdx > 0 && currentIdx < PATH.length) {
    const cur = PATH[currentIdx];
    const overallPct = stageOverallProgress(cur.id);
    const ready = isStageReady(cur.id);
    const enoughTime = dp >= cur.days;
    let targetDate = '';
    if (state.startedAt) {
      const start = parseISO(state.startedAt);
      const target = new Date(start);
      target.setDate(target.getDate() + cur.days);
      targetDate = formatDateLong(dateToISO(target));
    }
    html += `<div style="background:linear-gradient(135deg,rgba(167,139,250,0.18),rgba(255,77,216,0.08));border:1px solid rgba(167,139,250,0.4);border-radius:14px;padding:16px;margin-bottom:18px;box-shadow:0 0 20px rgba(167,139,250,0.15);">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
        <div>
          <div style="font-size:10px;letter-spacing:0.25em;color:#A78BFA;text-transform:uppercase;font-weight:700;">Текущий этап</div>
          <div style="font-size:19px;color:#fff;font-weight:700;margin-top:3px;">${escapeHtml(cur.title)}</div>
          <div style="font-size:11px;color:#8870a8;margin-top:2px;">${cur.days} дн. · самое раннее ${targetDate}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:10px;letter-spacing:0.25em;color:#FF4DD8;text-transform:uppercase;font-weight:700;">Готово</div>
          <div style="font-size:28px;color:${ready?'#10E891':'#fff'};font-weight:800;line-height:1;">${overallPct}%</div>
        </div>
      </div>
      <div style="height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin-bottom:12px;">
        <div style="height:100%;width:${overallPct}%;background:${ready?'linear-gradient(90deg,#10E891,#A78BFA)':'linear-gradient(90deg,#A78BFA,#FF4DD8)'};box-shadow:0 0 10px ${ready?'rgba(16,232,145,0.6)':'rgba(167,139,250,0.6)'};"></div>
      </div>
      <div style="font-size:10px;color:#b0a0d0;line-height:1.5;margin-bottom:12px;">
        ${ready&&enoughTime?'<span style="color:#10E891;font-weight:700;">✓ Все сферы готовы — этап откроется при следующем действии</span>':ready&&!enoughTime?`<span style="color:#FFAA00;">Сферы дотянулись, ждём ${cur.days-dp} ${plural(cur.days-dp,'день','дня','дней')}</span>`:enoughTime?'<span style="color:#FF4DD8;">Срок прошёл, но не все сферы дотянулись</span>':`<span>${cur.days-dp} ${plural(cur.days-dp,'день','дня','дней')} до срока</span>`}
      </div>
      <div style="display:grid;grid-template-columns:1fr;gap:6px;">`;

    SPHERES.forEach(sp => {
      const prog = sphereProgressForStage(sp.id, cur.id);
      const targetType = SPHERE_TARGET_TYPE[sp.id];
      const unit = targetType === 'hours' ? 'ч' : '';
      const formatNum = n => targetType === 'hours' ? n.toFixed(1) : Math.round(n);
      const isDone = prog.pct >= 100;
      html += `<div style="background:rgba(0,0,0,0.25);border:1px solid ${isDone?sp.color+'60':'rgba(255,255,255,0.05)'};border-left:3px solid ${sp.color};border-radius:8px;padding:9px 11px;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px;">
          <div style="display:flex;align-items:center;gap:8px;min-width:0;flex:1;">
            <span style="font-size:16px;color:${sp.color};text-shadow:0 0 8px ${sp.glow};flex-shrink:0;">${sp.emoji}</span>
            <span style="font-size:12px;color:#fff;font-weight:600;">${sp.name}</span>
          </div>
          <div style="font-size:11px;color:${isDone?'#10E891':sp.color};font-weight:700;flex-shrink:0;">${isDone?'✓':Math.round(prog.pct)+'%'}</div>
        </div>
        <div style="height:3px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;">
          <div style="height:100%;width:${Math.min(100,prog.pct)}%;background:${isDone?'#10E891':sp.color};"></div>
        </div>
        <div style="font-size:9px;color:#6a5a8a;margin-top:3px;">${formatNum(prog.current)} ${unit} / ${formatNum(prog.target)} ${unit}</div>
      </div>`;
    });

    html += '</div></div>';
  }

  // Все этапы
  html += `<div style="font-size:10px;letter-spacing:0.2em;color:#6a5a8a;text-transform:uppercase;font-weight:700;margin-bottom:10px;">Все этапы</div>`;
  PATH.forEach((stage, i) => {
    if (i === 0) return;
    const isUnlocked = !!state.stagesUnlocked[stage.id];
    const isCurrent = !isUnlocked && (i === currentIdx);
    const isFuture = !isUnlocked && !isCurrent;
    const col = isUnlocked ? '#10E891' : isCurrent ? '#A78BFA' : '#3a2a58';
    html += `<button onclick="window.__app.openStage('${stage.id}')" style="width:100%;display:flex;align-items:center;gap:12px;padding:12px 14px;background:${isUnlocked?'rgba(16,232,145,0.07)':isCurrent?'rgba(167,139,250,0.1)':'rgba(255,255,255,0.02)'};border:1px solid ${isUnlocked?'rgba(16,232,145,0.3)':isCurrent?'rgba(167,139,250,0.3)':'rgba(255,255,255,0.05)'};border-radius:12px;cursor:pointer;text-align:left;margin-bottom:6px;">
      <div style="width:32px;height:32px;border-radius:50%;background:${col}20;border:2px solid ${col};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;color:${col};font-weight:700;">${isUnlocked?'✓':i}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;color:${isUnlocked?'#fff':isCurrent?'#fff':'#5a4a78'};font-weight:700;">${escapeHtml(stage.title)}</div>
        <div style="font-size:10px;color:${col};margin-top:1px;">${stage.months} ${plural(stage.months,'месяц','месяца','месяцев')} · ${stage.xp} XP</div>
      </div>
      <div style="font-size:14px;color:${col};">›</div>
    </button>`;
  });

  return html;
}

function renderHeatmapMonth(monthStr, taskKey, sphereColor) {
  const [year, month] = monthStr.split('-').map(Number);
  const firstDay = new Date(year, month - 1, 1);
  const lastDay = new Date(year, month, 0);
  const daysInMonth = lastDay.getDate();
  const startWeekday = weekdayMon(firstDay);

  const activity = activityByDay(taskKey);
  const color = sphereColor || '#A78BFA';

  // Определяем максимум для нормализации
  let maxCount = 0;
  Object.keys(activity).forEach(d => {
    if (d.startsWith(monthStr) && activity[d].count > maxCount) maxCount = activity[d].count;
  });
  if (maxCount === 0) maxCount = 1;

  let html = `<div style="background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 14px; margin-bottom: 14px;">`;
  html += `<div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;">
    <button onclick="window.__app.shiftMonth(-1)" style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #b0a0d0; cursor: pointer; width: 28px; height: 28px; border-radius: 8px; font-size: 14px;">‹</button>
    <div style="font-size: 13px; color: #fff; font-weight: 600;">${MONTHS_RU[month-1]} ${year}</div>
    <button onclick="window.__app.shiftMonth(1)" style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #b0a0d0; cursor: pointer; width: 28px; height: 28px; border-radius: 8px; font-size: 14px;">›</button>
  </div>`;

  // Заголовок дней недели
  html += `<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 6px;">`;
  WEEKDAYS_SHORT.forEach(w => {
    html += `<div style="text-align: center; font-size: 9px; color: #6a5a8a; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600;">${w}</div>`;
  });
  html += `</div>`;

  // Сетка дней
  html += `<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;">`;
  // Пустые клетки до начала месяца
  for (let i = 0; i < startWeekday; i++) {
    html += `<div></div>`;
  }
  const todayISO = today();
  for (let day = 1; day <= daysInMonth; day++) {
    const dateISO = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    const data = activity[dateISO];
    const isToday = dateISO === todayISO;
    const isFuture = dateISO > todayISO;
    let bg, brd, txtColor;
    if (isFuture) {
      bg = 'rgba(255,255,255,0.015)'; brd = 'rgba(255,255,255,0.04)'; txtColor = '#3a2a5a';
    } else if (data) {
      const intensity = Math.min(1, data.count / maxCount);
      const alpha = 0.25 + intensity * 0.6;
      bg = color + Math.floor(alpha * 255).toString(16).padStart(2, '0');
      brd = color + '80';
      txtColor = '#fff';
    } else {
      bg = 'rgba(255,255,255,0.025)'; brd = 'rgba(255,255,255,0.06)'; txtColor = '#5a4a78';
    }
    const tooltip = data ? `${day} ${MONTHS_RU_SHORT[month-1]}: ${data.count} ${plural(data.count, 'задача', 'задачи', 'задач')}${data.hours ? `, ${data.hours.toFixed(1)} ч` : ''}` : `${day} ${MONTHS_RU_SHORT[month-1]}`;
    html += `<div title="${tooltip}" style="aspect-ratio: 1; background: ${bg}; border: 1px solid ${isToday ? color : brd}; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: ${txtColor}; font-weight: ${isToday ? '700' : '500'}; ${isToday ? `box-shadow: 0 0 8px ${color};` : ''} position: relative;">${day}${data ? `<div style="position: absolute; bottom: 2px; right: 2px; width: 4px; height: 4px; background: ${color}; border-radius: 50%; box-shadow: 0 0 4px ${color};"></div>` : ''}</div>`;
  }
  html += `</div>`;

  // Легенда
  html += `<div style="display: flex; align-items: center; justify-content: space-between; margin-top: 12px; font-size: 10px; color: #6a5a8a;">
    <span>меньше</span>
    <div style="display: flex; gap: 3px;">
      ${[0.15, 0.35, 0.55, 0.75, 0.95].map(a => `<div style="width: 12px; height: 12px; background: ${color}${Math.floor(a * 255).toString(16).padStart(2, '0')}; border-radius: 3px; border: 1px solid ${color}40;"></div>`).join('')}
    </div>
    <span>больше</span>
  </div>`;

  html += `</div>`;
  return html;
}

// Точечный 30-дневный график для отдельной задачи
function renderTaskMiniHeatmap(taskKey, color) {
  const activity = activityByDay(taskKey);
  const days = 30;
  const todayD = new Date(); todayD.setHours(0, 0, 0, 0);
  let html = `<div style="display: flex; gap: 2px; margin-top: 6px; align-items: flex-end;">`;
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(todayD); d.setDate(d.getDate() - i);
    const iso = dateToISO(d);
    const data = activity[iso];
    const isToday = i === 0;
    if (data) {
      const intensity = Math.min(1, (data.hours > 0 ? data.hours / 4 : data.count / 3));
      const alpha = 0.3 + intensity * 0.7;
      html += `<div title="${formatDateShort(iso)}: ${data.count} раз${data.hours ? `, ${data.hours.toFixed(1)} ч` : ''}" style="flex: 1; height: 14px; background: ${color}${Math.floor(alpha * 255).toString(16).padStart(2, '0')}; border-radius: 2px; border: 1px solid ${color}60; ${isToday ? `box-shadow: 0 0 4px ${color};` : ''}"></div>`;
    } else {
      html += `<div title="${formatDateShort(iso)}: ничего" style="flex: 1; height: 14px; background: rgba(255,255,255,0.03); border-radius: 2px; border: 1px solid rgba(255,255,255,0.05); ${isToday ? `box-shadow: 0 0 0 1px ${color}40;` : ''}"></div>`;
    }
  }
  html += `</div><div style="display: flex; justify-content: space-between; font-size: 9px; color: #6a5a8a; margin-top: 3px;"><span>30 дней назад</span><span>сегодня</span></div>`;
  return html;
}

// === ВКЛАДКА «УЧЁТ» ===
function renderCounters() {
  const period = view.countersPeriod || 'all';
  const filter = view.countersFilter || 'all';

  const allRepeating = [];
  const seen = new Set();
  SPHERES.forEach(s => {
    state.tasks[s.id].forEach(t => {
      if (t.repeating) {
        allRepeating.push({ task: t, sphereId: s.id, deleted: false });
        seen.add(t.taskKey);
      }
    });
  });
  const historicalKeys = new Set();
  state.history.forEach(h => {
    if (h.taskKey && !seen.has(h.taskKey) && !historicalKeys.has(h.taskKey)) {
      historicalKeys.add(h.taskKey);
      allRepeating.push({ task: { taskKey: h.taskKey, title: h.title, type: h.hours > 0 ? 'hours' : 'simple' }, sphereId: h.sphere, deleted: true });
    }
  });

  let html = `<div style="text-align: center; margin-bottom: 20px;"><div style="font-size: 10px; letter-spacing: 0.3em; color: #A78BFA; text-transform: uppercase; font-weight: 700;">Учёт повторяющихся задач</div><p style="font-size: 13px; color: #8870a8; margin: 8px 0 0;">Сколько раз сделал каждую и сколько часов</p></div>`;

  // Период с реальными датами
  const periodLabel = (() => {
    if (period === 'all') return 'За всё время';
    if (period === 'today') return formatDateLong(today());
    if (period === 'week') {
      const w = new Date(); w.setDate(w.getDate() - 6);
      return `${formatDateShort(dateToISO(w))} — ${formatDateShort(today())}`;
    }
    if (period === 'month') {
      const d = new Date();
      return `${MONTHS_RU[d.getMonth()].charAt(0).toUpperCase() + MONTHS_RU[d.getMonth()].slice(1)} ${d.getFullYear()}`;
    }
    if (period === 'report') {
      const rp = currentReportPeriod();
      return `Отчёт · ${formatReportPeriod(rp)}${rp.isFirst ? ' (первый, короткий)' : ''}`;
    }
    if (period === 'prev_report') {
      const rp = prevReportPeriod();
      return rp ? `Прошлый отчёт · ${formatReportPeriod(rp)}` : 'Прошлого отчёта ещё нет';
    }
    if (period === 'custom') {
      if (view.customFrom && view.customTo) return `${formatDateShort(view.customFrom)} — ${formatDateShort(view.customTo)}`;
      if (view.customFrom) return `с ${formatDateShort(view.customFrom)}`;
      if (view.customTo) return `до ${formatDateShort(view.customTo)}`;
      return 'выбери даты ниже';
    }
    return '';
  })();

  html += `<div style="display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap;">${[['today', 'Сегодня'], ['week', 'Неделя'], ['report', '★ Отчёт'], ['month', 'Месяц'], ['all', 'Всё'], ['custom', 'Свой ↓']].map(([v, l]) => `<button onclick="window.__app.setPeriod('${v}')" style="flex: 1; min-width: 60px; padding: 8px 6px; background: ${period === v ? '#A78BFA' : 'transparent'}; color: ${period === v ? '#000' : '#b0a0d0'}; border: 1px solid ${period === v ? '#A78BFA' : 'rgba(255,255,255,0.1)'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 600;">${l}</button>`).join('')}</div>`;

  html += `<div style="text-align: center; font-size: 11px; color: #A78BFA; margin-bottom: 12px; letter-spacing: 0.05em;">${periodLabel}</div>`;

  // Произвольный диапазон
  if (period === 'custom') {
    html += `<div style="display: flex; gap: 8px; margin-bottom: 14px; padding: 10px; background: rgba(167,139,250,0.08); border: 1px solid rgba(167,139,250,0.2); border-radius: 10px;"><div style="flex: 1;"><div style="font-size: 9px; color: #8870a8; margin-bottom: 4px; letter-spacing: 0.1em; text-transform: uppercase;">С</div><input type="date" value="${view.customFrom || ''}" onchange="window.__app.setCustomFrom(this.value)" style="width: 100%; padding: 8px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 12px; outline: none;" /></div><div style="flex: 1;"><div style="font-size: 9px; color: #8870a8; margin-bottom: 4px; letter-spacing: 0.1em; text-transform: uppercase;">По</div><input type="date" value="${view.customTo || ''}" onchange="window.__app.setCustomTo(this.value)" style="width: 100%; padding: 8px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 12px; outline: none;" /></div></div>`;
  }

  // Календарь общий
  html += `<button onclick="window.__app.toggleCalendar()" style="width: 100%; padding: 10px; margin-bottom: 14px; background: rgba(167,139,250,0.1); border: 1px solid rgba(167,139,250,0.3); border-radius: 10px; color: #A78BFA; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 600;">${view.calendarVisible ? '▴ Скрыть календарь' : '▾ Показать календарь активности'}</button>`;
  if (view.calendarVisible) {
    html += renderHeatmapMonth(view.calendarMonth, null, '#A78BFA');
  }

  // Фильтр сфер
  html += `<div style="display: flex; gap: 6px; margin-bottom: 18px; overflow-x: auto; padding-bottom: 4px;"><button onclick="window.__app.setCFilter('all')" style="padding: 7px 12px; background: ${filter === 'all' ? '#fff' : 'transparent'}; color: ${filter === 'all' ? '#000' : '#b0a0d0'}; border: 1px solid ${filter === 'all' ? '#fff' : 'rgba(255,255,255,0.1)'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 600; flex-shrink: 0;">Все</button>${SPHERES.map(sp => `<button onclick="window.__app.setCFilter('${sp.id}')" style="padding: 7px 12px; background: ${filter === sp.id ? sp.color : 'transparent'}; color: ${filter === sp.id ? '#000' : '#b0a0d0'}; border: 1px solid ${filter === sp.id ? sp.color : 'rgba(255,255,255,0.1)'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 600; flex-shrink: 0; white-space: nowrap;">${sp.emoji} ${sp.name}</button>`).join('')}</div>`;

  const filtered = filter === 'all' ? allRepeating : allRepeating.filter(r => r.sphereId === filter);

  if (filtered.length === 0) {
    html += `<div style="text-align: center; padding: 40px 20px; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.08); border-radius: 12px;"><div style="font-size: 32px; margin-bottom: 12px; opacity: 0.4;">◷</div><div style="font-size: 14px; color: #b0a0d0; margin-bottom: 6px; font-weight: 600;">Пока нет повторяющихся задач</div><div style="font-size: 12px; color: #6a5a8a; line-height: 1.5;">Добавь задачу с галочкой «Повторяющаяся» в любой сфере.</div></div>`;
    return html;
  }

  const bySphere = {};
  filtered.forEach(r => {
    if (!bySphere[r.sphereId]) bySphere[r.sphereId] = [];
    bySphere[r.sphereId].push(r);
  });

  SPHERES.forEach(sp => {
    if (!bySphere[sp.id]) return;
    const items = bySphere[sp.id];
    let sphereTotalCount = 0, sphereTotalHours = 0;
    items.forEach(r => {
      const stats = taskStats(r.task.taskKey, period);
      sphereTotalCount += stats.count;
      sphereTotalHours += stats.hours;
    });

    const groupKey = `counters_${sp.id}`;
    // По умолчанию: если фильтр стоит на одной сфере — она открыта; иначе все свёрнуты
    const isFilteredToThis = filter === sp.id;
    const isOpen = view.expandedGroups && view.expandedGroups[groupKey] !== undefined
      ? view.expandedGroups[groupKey]
      : isFilteredToThis;

    html += `<div style="margin-bottom: 12px;">
      <button onclick="window.__app.toggleGroup('${groupKey}')" style="width: 100%; display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: linear-gradient(135deg, ${sp.color}15, ${sp.color}05); border: 1px solid ${sp.color}40; border-left: 3px solid ${sp.color}; border-radius: 10px; cursor: pointer; text-align: left;">
        <div style="font-size: 14px; color: ${sp.color}; flex-shrink: 0; width: 16px;">${isOpen ? '▾' : '▸'}</div>
        <div style="font-size: 22px; color: ${sp.color}; text-shadow: 0 0 10px ${sp.glow}; flex-shrink: 0;">${sp.emoji}</div>
        <div style="flex: 1; min-width: 0;">
          <div style="font-size: 13px; color: #fff; font-weight: 700;">${sp.name}</div>
          <div style="font-size: 10px; color: ${sp.color}; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 1px;">${items.length} ${plural(items.length, 'задача', 'задачи', 'задач')}</div>
        </div>
        <div style="text-align: right; flex-shrink: 0;">
          <div style="font-size: 14px; color: #fff; font-weight: 700;">${sphereTotalCount} ${plural(sphereTotalCount, 'раз', 'раза', 'раз')}</div>
          ${sphereTotalHours > 0 ? `<div style="font-size: 11px; color: #00E5FF; font-weight: 600;">◷ ${sphereTotalHours.toFixed(1)} ч</div>` : ''}
        </div>
      </button>`;

    if (isOpen) {
      html += `<div style="margin-top: 6px; padding-left: 8px;">`;
      items.forEach(r => {
        const stats = taskStats(r.task.taskKey, period);
        const allTimeStats = taskStats(r.task.taskKey, 'all');
        const isHM = r.task.type === 'hours';
        html += `<div style="padding: 12px; background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.05); border-left: 3px solid ${sp.color}; border-radius: 8px; margin-bottom: 6px; ${r.deleted ? 'opacity: 0.6;' : ''}">
          <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 6px;">
            <div style="font-size: 13px; color: #fff; word-break: break-word; flex: 1; font-weight: 500;">${escapeHtml(r.task.title)}${r.deleted ? ' <span style="font-size: 9px; color: #FF3D71; letter-spacing: 0.1em;">(УДАЛЕНА)</span>' : ''}</div>
          </div>
          <div style="display: flex; gap: 14px; flex-wrap: wrap; font-size: 12px; color: #b0a0d0; margin-bottom: 4px;">
            <span style="color: ${stats.count > 0 ? '#fff' : '#5a4a78'}; font-weight: 600;">✓ ${stats.count} ${plural(stats.count, 'раз', 'раза', 'раз')}</span>
            ${isHM && stats.hours > 0 ? `<span style="color: #00E5FF; font-weight: 600;">◷ ${stats.hours.toFixed(1)} ч</span>` : ''}
            ${stats.xp > 0 ? `<span style="color: #A78BFA;">+${stats.xp} XP</span>` : ''}
          </div>
          ${allTimeStats.lastDate ? `<div style="font-size: 10px; color: #6a5a8a;">Последний раз: <span style="color: #b0a0d0;">${formatDateRelative(allTimeStats.lastDate)}</span></div>` : ''}
          ${allTimeStats.count > 0 ? renderTaskMiniHeatmap(r.task.taskKey, sp.color) : ''}
        </div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });

  return html;
}

function renderAchievements() {
  const total = ACHIEVEMENTS.length;
  const unlocked = Object.keys(state.achievementsUnlocked).length;

  let html = `<div style="text-align: center; margin-bottom: 20px;">
    <div style="font-size: 10px; letter-spacing: 0.3em; color: #A78BFA; text-transform: uppercase; font-weight: 700;">Путь достижений</div>
    <p style="font-size: 13px; color: #8870a8; margin: 6px 0 0;">${unlocked} из ${total} получено</p>
  </div>`;

  // Линейная цепочка по сложности — каждая следующая ачивка идёт строго после предыдущей
  ACHIEVEMENTS.forEach((a, i) => {
    const isU = !!state.achievementsUnlocked[a.id];
    const isNext = !isU && (i === 0 || !!state.achievementsUnlocked[ACHIEVEMENTS[i-1]?.id]);

    // Коннектор между шагами
    if (i > 0) {
      const prevDone = !!state.achievementsUnlocked[ACHIEVEMENTS[i-1]?.id];
      html += `<div style="width:2px;height:14px;background:${prevDone?'linear-gradient(180deg,#A78BFA,#FF4DD8)':'rgba(255,255,255,0.08)'};margin:0 0 0 31px;"></div>`;

    // Состояния иконок: открыто (мощное свечение), следующее (мягкое), закрыто (серое)

    html += `<button onclick="window.__app.openAch('${a.id}')" style="
      display: flex; align-items: center; gap: 14px;
      width: 100%; padding: 12px 14px;
      background: ${isU ? 'linear-gradient(135deg,rgba(167,139,250,0.12),rgba(255,77,216,0.05))' : 'rgba(255,255,255,0.025)'};
      border: 1px solid ${isU ? 'rgba(167,139,250,0.4)' : isNext ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.05)'};

        width: 44px; flex-shrink: 0;

        text-shadow: ${isU ? '0 0 12px rgba(167,139,250,0.7)' : isNext ? '0 0 6px rgba(167,139,250,0.3)' : 'none'};
      ">${isU || isNext ? a.icon : '🔒'}</div>
      <div style="flex: 1; min-width: 0;">
        <div style="font-size: 14px; color: ${isU ? '#fff' : isNext ? '#b0a0d0' : '#5a4a78'}; font-weight: 700; margin-bottom: 2px;">${a.name}</div>
        <div style="font-size: 11px; color: ${isU ? '#A78BFA' : isNext ? '#6a5a8a' : '#3a2a58'}; line-height: 1.3;">${a.desc}</div>
        ${isU && state.achievementsUnlocked[a.id] ? `<div style="font-size: 10px; color: #10E891; margin-top: 3px;">✓ ${formatDateRelative(state.achievementsUnlocked[a.id])}</div>` : ''}
      </div>
      ${isU ? `<div style="font-size: 18px; color: #A78BFA; flex-shrink: 0;">✓</div>` : isNext ? `<div style="font-size: 10px; color: #A78BFA; flex-shrink: 0; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 700;">→</div>` : ''}
    </button>`;
  });

  return html;
}

// === ВКЛАДКА «БАЗА ЗНАНИЙ» ===
// === ЖУРНАЛ МЫСЛЕЙ ===
function renderJournal() {
  const journal = state.journal || [];
  const search = (view.journalSearch || '').trim().toLowerCase();
  const filterSphere = view.journalSphereFilter; // null или id сферы

  let html = '';

  // Поиск
  if (journal.length > 0) {
    html += `<div style="margin-bottom: 12px;">
      <input id="journal-search-input" type="text" placeholder="Поиск по тексту..." value="${escapeHtml(view.journalSearch || '')}" oninput="window.__app.journalSearch(this.value)" style="width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 12px; outline: none;" />
    </div>`;
  }

  // Фильтр по сфере (только если есть записи)
  if (journal.length > 0) {
    const total = journal.length;
    const noSphere = journal.filter(j => !j.sphereId).length;
    html += `<div style="display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px;">`;
    html += `<button onclick="window.__app.journalFilterSphere(null)" style="padding: 7px 12px; background: ${filterSphere === undefined || filterSphere === null ? '#fff' : 'transparent'}; color: ${filterSphere === undefined || filterSphere === null ? '#000' : '#b0a0d0'}; border: 1px solid ${filterSphere === undefined || filterSphere === null ? '#fff' : 'rgba(255,255,255,0.1)'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 600; flex-shrink: 0; white-space: nowrap;">Все · ${total}</button>`;
    SPHERES.forEach(sp => {
      const c = journal.filter(j => j.sphereId === sp.id).length;
      if (c === 0) return;
      const active = filterSphere === sp.id;
      html += `<button onclick="window.__app.journalFilterSphere('${sp.id}')" style="padding: 7px 12px; background: ${active ? sp.color : 'transparent'}; color: ${active ? '#000' : '#b0a0d0'}; border: 1px solid ${active ? sp.color : sp.color + '60'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 600; flex-shrink: 0; white-space: nowrap;">${sp.emoji} ${sp.name} · ${c}</button>`;
    });
    if (noSphere > 0) {
      const active = filterSphere === 'none';
      html += `<button onclick="window.__app.journalFilterSphere('none')" style="padding: 7px 12px; background: ${active ? '#8870a8' : 'transparent'}; color: ${active ? '#000' : '#b0a0d0'}; border: 1px solid ${active ? '#8870a8' : 'rgba(255,255,255,0.1)'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 600; flex-shrink: 0; white-space: nowrap;">Без сферы · ${noSphere}</button>`;
    }
    html += `</div>`;
  }

  // Кнопка добавить
  html += `<button onclick="window.__app.journalStartAdd()" style="width: 100%; padding: 12px; background: linear-gradient(135deg, #A78BFA, #FF4DD8); color: #fff; border: none; border-radius: 10px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 700; margin-bottom: 14px;">+ Новая мысль</button>`;

  // Форма добавления / редактирования
  if (view.journalAdding || view.journalEditingId) {
    const editing = view.journalEditingId ? journal.find(j => j.id === view.journalEditingId) : null;
    const initTitle = editing ? editing.title : '';
    const initContent = editing ? editing.content : '';
    const initTags = editing ? (editing.tags || []).join(', ') : '';
    const initSphere = editing ? editing.sphereId : null;
    if (editing) window.__journalSphereId = initSphere;

    html += `<div style="background: rgba(0,0,0,0.3); border: 1px solid rgba(167,139,250,0.4); border-radius: 12px; padding: 14px; margin-bottom: 14px;">
      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; font-weight: 600;">${editing ? 'Редактирование' : 'Новая мысль'}</div>
      <input id="journal-title-input" placeholder="Заголовок" value="${escapeHtml(initTitle)}" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 14px; outline: none; margin-bottom: 8px; font-weight: 600;" />
      <textarea id="journal-content-input" placeholder="Текст — мысль, наблюдение, статья..." rows="8" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 13px; line-height: 1.6; outline: none; resize: vertical; margin-bottom: 8px; min-height: 120px;">${escapeHtml(initContent)}</textarea>
      <input id="journal-tags-input" placeholder="Теги через запятую (необязательно)" value="${escapeHtml(initTags)}" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 12px; outline: none; margin-bottom: 10px;" />

      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; font-weight: 600;">Привязка к ветке (необязательно)</div>
      <div style="display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px;" id="journal-sphere-pick">
        <button data-spid="" onclick="window.__app.journalPickSphere('')" style="padding: 7px 11px; background: ${!window.__journalSphereId ? '#8870a8' : 'transparent'}; color: ${!window.__journalSphereId ? '#000' : '#b0a0d0'}; border: 1px solid ${!window.__journalSphereId ? '#8870a8' : 'rgba(255,255,255,0.1)'}; border-radius: 7px; font-size: 11px; cursor: pointer; font-weight: 600;">Без ветки</button>
        ${SPHERES.map(sp => {
          const active = window.__journalSphereId === sp.id;
          return `<button data-spid="${sp.id}" onclick="window.__app.journalPickSphere('${sp.id}')" style="padding: 7px 11px; background: ${active ? sp.color : 'transparent'}; color: ${active ? '#000' : '#b0a0d0'}; border: 1px solid ${active ? sp.color : sp.color + '60'}; border-radius: 7px; font-size: 11px; cursor: pointer; font-weight: 600;">${sp.emoji} ${sp.name}</button>`;
        }).join('')}
      </div>

      <div style="display: flex; gap: 8px;">
        <button onclick="window.__app.journalConfirm()" style="flex: 1; padding: 11px; background: linear-gradient(135deg, #A78BFA, #FF4DD8); color: #fff; border: none; border-radius: 8px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 700;">${editing ? 'Сохранить' : 'Записать'}</button>
        <button onclick="window.__app.journalCancel()" style="padding: 11px 16px; background: transparent; color: #8870a8; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-size: 11px; cursor: pointer;">Отмена</button>
      </div>
    </div>`;
    setTimeout(() => document.getElementById('journal-title-input')?.focus(), 50);
  }

  // Список записей
  let items = [...journal];
  if (filterSphere === 'none') items = items.filter(j => !j.sphereId);
  else if (filterSphere) items = items.filter(j => j.sphereId === filterSphere);
  if (search) {
    items = items.filter(j =>
      (j.title || '').toLowerCase().includes(search) ||
      (j.content || '').toLowerCase().includes(search) ||
      (j.tags || []).some(t => t.toLowerCase().includes(search))
    );
  }
  items.sort((a, b) => b.timestamp - a.timestamp);

  if (items.length === 0) {
    if (journal.length === 0) {
      html += `<div style="text-align: center; padding: 40px 20px; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.08); border-radius: 12px;">
        <div style="font-size: 32px; margin-bottom: 12px; opacity: 0.4;">✎</div>
        <div style="font-size: 14px; color: #b0a0d0; margin-bottom: 6px; font-weight: 600;">Журнал пустой</div>
        <div style="font-size: 12px; color: #6a5a8a; line-height: 1.5;">Записывай мысли, статьи, наблюдения. Через год оглянешься — увидишь как менялся.</div>
      </div>`;
    } else {
      html += `<div style="text-align: center; padding: 30px 20px; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.08); border-radius: 12px; font-size: 12px; color: #6a5a8a;">${search ? 'Ничего не найдено' : 'В этой ветке пока нет записей'}</div>`;
    }
  } else {
    items.forEach(j => {
      const sp = j.sphereId ? SPHERES.find(s => s.id === j.sphereId) : null;
      const accent = sp ? sp.color : '#A78BFA';
      const tagsHtml = (j.tags || []).slice(0, 4).map(t => `<span style="font-size: 9px; padding: 2px 7px; background: ${accent}25; color: ${accent}; border-radius: 5px; font-weight: 600;">#${escapeHtml(t)}</span>`).join(' ');
      const preview = (j.content || '').slice(0, 200);

      html += `<div style="background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.05); border-left: 3px solid ${accent}; border-radius: 10px; padding: 12px; margin-bottom: 8px;">
        <div style="display: flex; align-items: baseline; justify-content: space-between; gap: 8px; margin-bottom: 6px;">
          <div style="flex: 1; min-width: 0;">
            ${sp ? `<div style="font-size: 9px; color: ${accent}; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; margin-bottom: 3px;">${sp.emoji} ${escapeHtml(sp.name)}</div>` : ''}
            <div style="font-size: 14px; color: #fff; font-weight: 700; line-height: 1.3; word-break: break-word;">${escapeHtml(j.title || '(без заголовка)')}</div>
          </div>
          <div style="font-size: 9px; color: #6a5a8a; flex-shrink: 0;">${formatDateRelative(j.date)}</div>
        </div>
        ${preview ? `<div style="font-size: 12px; color: #b0a0d0; line-height: 1.5; margin-bottom: 6px; white-space: pre-wrap; word-break: break-word;">${escapeHtml(preview)}${j.content.length > 200 ? '…' : ''}</div>` : ''}
        ${tagsHtml ? `<div style="display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px;">${tagsHtml}</div>` : ''}
        <div style="display: flex; gap: 6px; margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.04);">
          ${j.content && j.content.length > 200 ? `<button onclick="window.__app.journalView('${j.id}')" style="flex: 1; padding: 6px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; color: #b0a0d0; font-size: 10px; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase;">📖 Читать</button>` : ''}
          <button onclick="window.__app.journalStartEdit('${j.id}')" style="flex: 1; padding: 6px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; color: #b0a0d0; font-size: 10px; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase;">✎ Изменить</button>
          <button onclick="window.__app.journalDelete('${j.id}')" style="padding: 6px 12px; background: transparent; border: 1px solid rgba(255,61,113,0.3); border-radius: 6px; color: #FF3D71; font-size: 10px; cursor: pointer;">🗑</button>
        </div>
      </div>`;
    });
  }

  return html;
}

function renderKB() {
  // Переключатель: Видео или Мысли
  const mode = view.kbMode || 'videos';

  let html = `<div style="text-align: center; margin-bottom: 16px;">
    <div style="font-size: 10px; letter-spacing: 0.3em; color: #A78BFA; text-transform: uppercase; font-weight: 700;">База знаний</div>
  </div>`;

  // Табы Видео / Мысли
  html += `<div style="display: flex; gap: 6px; margin-bottom: 16px; padding: 4px; background: rgba(255,255,255,0.03); border-radius: 10px;">
    <button onclick="window.__app.kbSetMode('videos')" style="flex: 1; padding: 9px; background: ${mode === 'videos' ? 'linear-gradient(135deg, #A78BFA, #FF4DD8)' : 'transparent'}; color: ${mode === 'videos' ? '#fff' : '#8870a8'}; border: none; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;">▶ Видео</button>
    <button onclick="window.__app.kbSetMode('thoughts')" style="flex: 1; padding: 9px; background: ${mode === 'thoughts' ? 'linear-gradient(135deg, #A78BFA, #FF4DD8)' : 'transparent'}; color: ${mode === 'thoughts' ? '#fff' : '#8870a8'}; border: none; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;">✎ Мысли</button>
  </div>`;

  if (mode === 'thoughts') {
    return html + renderJournal();
  }

  // Видео — старая логика
  const kb = state.knowledgeBase || { categories: [], items: [] };
  const search = (view.kbSearch || '').trim().toLowerCase();
  const palette = ['#A78BFA','#FF4DD8','#00E5FF','#FFAA00','#10E891','#FF3D71','#FFD700','#7DFF00'];
  const activeFilter = view.kbCategoryId;

  // Поиск
  if (kb.items.length > 0 || kb.categories.length > 0) {
    html += `<div style="margin-bottom: 12px;">
      <input id="kb-search-input" type="text" placeholder="Поиск по названию, тегам, заметкам..." value="${escapeHtml(view.kbSearch || '')}" oninput="window.__app.kbSearch(this.value)" style="width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 12px; outline: none;" />
    </div>`;
  }

  // Фильтры-чипы по категориям (показываем только если есть категории)
  if (kb.categories.length > 0) {
    const totalCount = kb.items.length;
    const uncatCount = kb.items.filter(i => !i.categoryId).length;
    html += `<div style="display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px;">`;
    // «Все»
    html += `<button onclick="window.__app.kbFilter(null)" style="padding: 7px 12px; background: ${activeFilter === null ? '#fff' : 'transparent'}; color: ${activeFilter === null ? '#000' : '#b0a0d0'}; border: 1px solid ${activeFilter === null ? '#fff' : 'rgba(255,255,255,0.1)'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 600; flex-shrink: 0; white-space: nowrap;">Все · ${totalCount}</button>`;
    // Чипы категорий
    kb.categories.forEach(cat => {
      const count = kb.items.filter(i => i.categoryId === cat.id).length;
      const active = activeFilter === cat.id;
      html += `<button onclick="window.__app.kbFilter('${cat.id}')" style="padding: 7px 12px; background: ${active ? cat.color : 'transparent'}; color: ${active ? '#000' : '#b0a0d0'}; border: 1px solid ${active ? cat.color : cat.color + '60'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 600; flex-shrink: 0; white-space: nowrap;">${escapeHtml(cat.name)} · ${count}</button>`;
    });
    // «Без категории» (только если такие есть)
    if (uncatCount > 0) {
      const active = activeFilter === 'uncategorized';
      html += `<button onclick="window.__app.kbFilter('uncategorized')" style="padding: 7px 12px; background: ${active ? '#8870a8' : 'transparent'}; color: ${active ? '#000' : '#b0a0d0'}; border: 1px solid ${active ? '#8870a8' : 'rgba(255,255,255,0.1)'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 600; flex-shrink: 0; white-space: nowrap;">Без категории · ${uncatCount}</button>`;
    }
    html += `</div>`;
  }

  // Кнопки действий
  html += `<div style="display: flex; gap: 8px; margin-bottom: 14px;">
    <button onclick="window.__app.kbStartAddItem()" style="flex: 1; padding: 11px; background: linear-gradient(135deg, #A78BFA, #FF4DD8); color: #fff; border: none; border-radius: 10px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 700; box-shadow: 0 0 14px rgba(167,139,250,0.3);">+ Видео</button>
    <button onclick="window.__app.kbToggleCatManager()" style="padding: 11px 14px; background: rgba(255,255,255,0.04); color: #b0a0d0; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-weight: 600;">${view.kbManagingCats ? '▴ Категории' : '▾ Категории'}</button>
  </div>`;

  // Менеджер категорий (раскрывается)
  if (view.kbManagingCats) {
    html += `<div style="background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 12px; margin-bottom: 14px;">
      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 10px; font-weight: 600;">Управление категориями</div>`;
    if (kb.categories.length === 0) {
      html += `<div style="font-size: 11px; color: #6a5a8a; line-height: 1.5; margin-bottom: 10px;">Категории помогают группировать видео — например «Тренировки», «Испанский», «Бизнес». Можно использовать или нет — твой выбор.</div>`;
    } else {
      kb.categories.forEach(cat => {
        const count = kb.items.filter(i => i.categoryId === cat.id).length;
        html += `<div style="display: flex; align-items: center; gap: 8px; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 5px;">
          <div style="width: 12px; height: 12px; background: ${cat.color}; border-radius: 50%; flex-shrink: 0;"></div>
          <div style="flex: 1; font-size: 12px; color: #fff;">${escapeHtml(cat.name)}</div>
          <div style="font-size: 10px; color: #8870a8;">${count}</div>
          <button onclick="window.__app.kbDeleteCat('${cat.id}')" title="Удалить" style="background: transparent; border: none; color: #5a4a78; cursor: pointer; padding: 2px; font-size: 12px;">🗑</button>
        </div>`;
      });
    }
    if (view.kbAddingCat) {
      html += `<div style="background: rgba(0,0,0,0.3); border: 1px solid #A78BFA40; border-radius: 8px; padding: 10px; margin-top: 8px;">
        <input id="kb-cat-name-input" placeholder="Название категории" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 12px; outline: none; margin-bottom: 8px;" />
        <div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 5px; font-weight: 600;">Цвет</div>
        <div style="display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px;" id="kb-color-row">
          ${palette.map((c, idx) => `<button data-color="${c}" onclick="window.__app.kbPickColor('${c}')" style="width: 28px; height: 28px; border-radius: 50%; background: ${c}; border: ${idx === 0 ? '3px' : '1px'} solid ${idx === 0 ? '#fff' : 'rgba(255,255,255,0.1)'}; cursor: pointer; padding: 0;"></button>`).join('')}
        </div>
        <div style="display: flex; gap: 6px;">
          <button onclick="window.__app.kbConfirmAddCat()" style="flex: 1; padding: 9px; background: #A78BFA; color: #000; border: none; border-radius: 6px; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-weight: 700;">Создать</button>
          <button onclick="window.__app.kbCancelAddCat()" style="padding: 9px 12px; background: transparent; color: #8870a8; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; font-size: 10px; cursor: pointer;">Отмена</button>
        </div>
      </div>`;
      setTimeout(() => document.getElementById('kb-cat-name-input')?.focus(), 50);
    } else {
      html += `<button onclick="window.__app.kbStartAddCat()" style="width: 100%; padding: 9px; background: rgba(167,139,250,0.1); border: 1px dashed #A78BFA; border-radius: 8px; color: #A78BFA; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 700; margin-top: 8px;">+ Категория</button>`;
    }
    html += `</div>`;
  }

  // Форма добавления видео
  if (view.kbAddingItem) {
    html += `<div style="background: rgba(0,0,0,0.3); border: 1px solid rgba(167,139,250,0.4); border-radius: 12px; padding: 14px; margin-bottom: 14px;">
      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; font-weight: 600;">Новое видео</div>
      <input id="kb-title-input" placeholder="Название (например: Растяжка коленей — 15 мин)" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 13px; outline: none; margin-bottom: 8px;" />
      <input id="kb-url-input" type="url" placeholder="Ссылка на видео в Telegram (https://t.me/...)" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 12px; outline: none; margin-bottom: 8px;" />
      <input id="kb-tags-input" placeholder="Теги через запятую (необязательно)" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 12px; outline: none; margin-bottom: 8px;" />
      <textarea id="kb-note-input" placeholder="Заметка (необязательно)" rows="2" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 12px; outline: none; resize: vertical; margin-bottom: 10px;"></textarea>

      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; font-weight: 600;">Категория (необязательно)</div>
      <div style="display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px;" id="kb-cat-pick-row">
        <button data-catid="" onclick="window.__app.kbPickCatForItem('')" style="padding: 7px 11px; background: ${!window.__kbItemCatId ? '#8870a8' : 'transparent'}; color: ${!window.__kbItemCatId ? '#000' : '#b0a0d0'}; border: 1px solid ${!window.__kbItemCatId ? '#8870a8' : 'rgba(255,255,255,0.1)'}; border-radius: 7px; font-size: 11px; cursor: pointer; font-weight: 600;">Без категории</button>
        ${kb.categories.map(c => {
          const active = window.__kbItemCatId === c.id;
          return `<button data-catid="${c.id}" onclick="window.__app.kbPickCatForItem('${c.id}')" style="padding: 7px 11px; background: ${active ? c.color : 'transparent'}; color: ${active ? '#000' : '#b0a0d0'}; border: 1px solid ${active ? c.color : c.color + '60'}; border-radius: 7px; font-size: 11px; cursor: pointer; font-weight: 600;">${escapeHtml(c.name)}</button>`;
        }).join('')}
      </div>

      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; font-weight: 600;">Превью (необязательно)</div>
      <div id="kb-preview-area" style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
        <div id="kb-preview-thumb" style="width: 80px; height: 50px; border-radius: 8px; background: rgba(255,255,255,0.04); border: 1px dashed rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #5a4a78; font-size: 18px;">🖼</div>
        <label style="flex: 1; padding: 10px; background: rgba(167,139,250,0.1); border: 1px dashed #A78BFA; border-radius: 8px; color: #A78BFA; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-weight: 700; text-align: center;">
          Выбрать картинку
          <input type="file" accept="image/*" onchange="window.__app.kbPickPreview(this)" style="display:none;" />
        </label>
      </div>

      <div style="display: flex; gap: 8px;">
        <button onclick="window.__app.kbConfirmAdd()" style="flex: 1; padding: 11px; background: linear-gradient(135deg, #A78BFA, #FF4DD8); color: #fff; border: none; border-radius: 8px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 700;">Добавить</button>
        <button onclick="window.__app.kbCancelAdd()" style="padding: 11px 16px; background: transparent; color: #8870a8; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-size: 11px; cursor: pointer;">Отмена</button>
      </div>
    </div>`;
    setTimeout(() => document.getElementById('kb-title-input')?.focus(), 50);
  }

  // Список видео — общий, с применением фильтра и поиска
  let items = [...kb.items];
  if (activeFilter === 'uncategorized') {
    items = items.filter(i => !i.categoryId);
  } else if (activeFilter !== null) {
    items = items.filter(i => i.categoryId === activeFilter);
  }
  if (search) {
    items = items.filter(i =>
      i.title.toLowerCase().includes(search) ||
      (i.note || '').toLowerCase().includes(search) ||
      (i.tags || []).some(t => t.toLowerCase().includes(search))
    );
  }
  items.sort((a, b) => b.addedAt.localeCompare(a.addedAt));

  if (items.length === 0) {
    if (kb.items.length === 0) {
      html += `<div style="text-align: center; padding: 40px 20px; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.08); border-radius: 12px;">
        <div style="font-size: 32px; margin-bottom: 12px; opacity: 0.4;">📚</div>
        <div style="font-size: 14px; color: #b0a0d0; margin-bottom: 6px; font-weight: 600;">Пусто</div>
        <div style="font-size: 12px; color: #6a5a8a; line-height: 1.5;">Добавь первое видео — это может быть тренировка, урок, подкаст</div>
      </div>`;
    } else {
      html += `<div style="text-align: center; padding: 30px 20px; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.08); border-radius: 12px; font-size: 12px; color: #6a5a8a;">${search ? 'По поиску ничего не найдено' : 'В этой категории пока нет видео'}</div>`;
    }
  } else {
    items.forEach(item => {
      const cat = item.categoryId ? kb.categories.find(c => c.id === item.categoryId) : null;
      const accent = cat ? cat.color : '#A78BFA';
      const isEditing = view.kbEditingItem === item.id;
      if (isEditing) {
        html += `<div style="background: rgba(0,0,0,0.4); border: 1px solid ${accent}; border-radius: 12px; padding: 14px; margin-bottom: 8px;">
          <div style="font-size: 10px; color: ${accent}; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; font-weight: 600;">Редактирование</div>
          <input id="kb-edit-title-${item.id}" value="${escapeHtml(item.title)}" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 13px; outline: none; margin-bottom: 8px;" />
          <input id="kb-edit-url-${item.id}" value="${escapeHtml(item.url)}" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 12px; outline: none; margin-bottom: 8px;" />
          <input id="kb-edit-tags-${item.id}" value="${escapeHtml((item.tags || []).join(', '))}" placeholder="Теги через запятую" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 12px; outline: none; margin-bottom: 8px;" />
          <textarea id="kb-edit-note-${item.id}" rows="2" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 12px; outline: none; resize: vertical; margin-bottom: 10px;">${escapeHtml(item.note || '')}</textarea>
          <div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 5px; font-weight: 600;">Категория</div>
          <select id="kb-edit-cat-${item.id}" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 12px; outline: none; margin-bottom: 10px;">
            <option value="" ${!item.categoryId ? 'selected' : ''}>Без категории</option>
            ${kb.categories.map(c => `<option value="${c.id}" ${item.categoryId === c.id ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('')}
          </select>
          <div style="display: flex; gap: 8px;">
            <button onclick="window.__app.kbConfirmEdit('${item.id}')" style="flex: 1; padding: 10px; background: ${accent}; color: #000; border: none; border-radius: 8px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-weight: 700;">Сохранить</button>
            <button onclick="window.__app.kbCancelEdit()" style="padding: 10px 14px; background: transparent; color: #8870a8; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-size: 11px; cursor: pointer;">Отмена</button>
          </div>
        </div>`;
      } else {
        const tagsHtml = (item.tags || []).slice(0, 4).map(t => `<span style="font-size: 9px; padding: 2px 7px; background: ${accent}25; color: ${accent}; border-radius: 5px; font-weight: 600;">#${escapeHtml(t)}</span>`).join(' ');
        const previewBlock = item.preview
          ? `<img src="${item.preview}" alt="" style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px;" />`
          : `<div style="width: 100%; height: 100%; background: linear-gradient(135deg, ${accent}30, ${accent}10); display: flex; align-items: center; justify-content: center; font-size: 28px; color: ${accent}; border-radius: 8px;">▶</div>`;
        const catBadge = cat ? `<span style="font-size: 9px; padding: 2px 7px; background: ${cat.color}25; color: ${cat.color}; border: 1px solid ${cat.color}50; border-radius: 5px; font-weight: 700; letter-spacing: 0.05em;">${escapeHtml(cat.name)}</span>` : '';

        html += `<div style="background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.05); border-left: 3px solid ${accent}; border-radius: 10px; padding: 10px; margin-bottom: 8px;">
          <a href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer" style="display: flex; gap: 12px; text-decoration: none; color: inherit;">
            <div style="width: 110px; height: 70px; flex-shrink: 0; position: relative; overflow: hidden; border-radius: 8px;">
              ${previewBlock}
              <div style="position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.7); color: #fff; font-size: 9px; padding: 2px 5px; border-radius: 4px; font-weight: 700;">▶ TG</div>
            </div>
            <div style="flex: 1; min-width: 0;">
              ${catBadge ? `<div style="margin-bottom: 4px;">${catBadge}</div>` : ''}
              <div style="font-size: 13px; color: #fff; font-weight: 600; line-height: 1.3; margin-bottom: 4px; word-break: break-word;">${escapeHtml(item.title)}</div>
              ${item.note ? `<div style="font-size: 11px; color: #b0a0d0; line-height: 1.4; margin-bottom: 4px;">${escapeHtml(item.note.slice(0, 100))}${item.note.length > 100 ? '…' : ''}</div>` : ''}
              ${tagsHtml ? `<div style="display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px;">${tagsHtml}</div>` : ''}
              <div style="font-size: 9px; color: #6a5a8a; margin-top: 4px;">добавлено ${formatDateRelative(item.addedAt)}</div>
            </div>
          </a>
          <div style="display: flex; gap: 6px; margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.04);">
            <button onclick="window.__app.kbStartEdit('${item.id}')" style="flex: 1; padding: 6px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; color: #b0a0d0; font-size: 10px; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase;">✎ Изменить</button>
            <button onclick="window.__app.kbDeleteItem('${item.id}')" style="padding: 6px 12px; background: transparent; border: 1px solid rgba(255,61,113,0.3); border-radius: 6px; color: #FF3D71; font-size: 10px; cursor: pointer;">🗑</button>
          </div>
        </div>`;
      }
    });
  }

  return html;
}

function renderHistory() {
  let html = '<div style="text-align: center; margin-bottom: 16px;"><div style="font-size: 10px; letter-spacing: 0.3em; color: #A78BFA; text-transform: uppercase; font-weight: 700;">Хроника</div><p style="font-size: 13px; color: #8870a8; margin: 8px 0 0;">' + (state.history.length === 0 ? 'Пока пусто' : 'Случайно нажал — ✕ отменит') + '</p></div>';

  // Прыжок к дате
  if (state.history.length > 0) {
    html += `<div style="display: flex; gap: 8px; align-items: center; margin-bottom: 16px; padding: 10px; background: rgba(167,139,250,0.08); border: 1px solid rgba(167,139,250,0.2); border-radius: 10px;"><div style="font-size: 11px; color: #A78BFA; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; flex-shrink: 0;">К дате:</div><input type="date" value="${view.historyJumpDate || ''}" onchange="window.__app.jumpToDate(this.value)" style="flex: 1; padding: 6px 8px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 12px; outline: none;" />${view.historyJumpDate ? `<button onclick="window.__app.jumpToDate('')" style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #b0a0d0; cursor: pointer; padding: 6px 10px; border-radius: 6px; font-size: 11px;">сброс</button>` : ''}</div>`;
  }

  let filteredHistory = [...state.history].reverse();
  if (view.historyJumpDate) {
    filteredHistory = filteredHistory.filter(h => h.date === view.historyJumpDate);
    if (filteredHistory.length === 0) {
      html += `<div style="text-align: center; padding: 30px; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.08); border-radius: 10px;"><div style="font-size: 13px; color: #b0a0d0;">${formatDateLong(view.historyJumpDate)}</div><div style="font-size: 11px; color: #6a5a8a; margin-top: 6px;">В этот день ничего не выполнено</div></div>`;
    }
  }

  const grouped = {};
  filteredHistory.forEach(h => { if (!grouped[h.date]) grouped[h.date] = []; grouped[h.date].push(h); });

  Object.keys(grouped).forEach(date => {
    const items = grouped[date];
    const totalDayXP = items.reduce((s, h) => s + h.xp, 0);
    const totalDayHours = items.reduce((s, h) => s + (h.hours || 0), 0);
    const dayGroupKey = 'history_day_' + date;
    const isDayOpen = view.expandedGroups && view.expandedGroups[dayGroupKey];

    // Заголовок дня — кнопка
    html += `<div style="margin-bottom: 8px;">
      <button onclick="window.__app.toggleGroup('${dayGroupKey}')" style="width: 100%; display: flex; align-items: center; gap: 10px; padding: 11px 14px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; cursor: pointer; text-align: left;">
        <div style="font-size: 14px; color: #A78BFA; flex-shrink: 0;">${isDayOpen ? '▾' : '▸'}</div>
        <div style="flex: 1; min-width: 0;">
          <div style="font-size: 13px; color: #fff; font-weight: 600;">${formatDateLong(date)}</div>
          <div style="font-size: 10px; color: #8870a8; margin-top: 2px;">${formatDateRelative(date)} · ${WEEKDAYS_SHORT[weekdayMon(parseISO(date))]} · ${items.length} ${plural(items.length, 'действие', 'действия', 'действий')}</div>
        </div>
        <div style="text-align: right; flex-shrink: 0;">
          <div style="font-size: 13px; color: #A78BFA; font-weight: 700;">+${totalDayXP} XP</div>
          ${totalDayHours > 0 ? `<div style="font-size: 10px; color: #00E5FF;">${totalDayHours.toFixed(1)} ч</div>` : ''}
        </div>
      </button>`;

    if (isDayOpen) {
      html += `<div style="margin-top: 4px; padding-left: 6px;">`;
      items.forEach(h => {
        const sphere = SPHERES.find(s => s.id === h.sphere);
        const isC = view.confirmUndoId === h.id;
        const hL = h.hours ? ` · ${h.hours}ч` : '';
        html += `<div style="padding: 11px 13px; background: ${isC ? 'rgba(255,61,113,0.1)' : 'rgba(255,255,255,0.03)'}; border-left: 3px solid ${isC ? '#FF3D71' : sphere.color}; border-radius: 8px; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; gap: 10px;"><div style="flex: 1; min-width: 0;"><div style="font-size: 13px; color: #fff; word-break: break-word;">${escapeHtml(h.title)}</div><div style="font-size: 9px; color: ${sphere.color}; letter-spacing: 0.15em; text-transform: uppercase; margin-top: 3px; font-weight: 600;">${sphere.name}${hL}</div></div><div style="display: flex; align-items: center; gap: 8px; flex-shrink: 0;"><div style="font-size: 13px; color: ${isC ? '#FF3D71' : '#A78BFA'}; font-weight: 700; ${isC ? 'text-decoration: line-through;' : ''}">${isC ? '−' : '+'}${h.xp}</div><button onclick="window.__app.undo('${h.id}')" style="width: 24px; height: 24px; background: ${isC ? '#FF3D71' : 'transparent'}; border: 1px solid ${isC ? '#FF3D71' : 'rgba(255,255,255,0.15)'}; border-radius: 50%; color: ${isC ? '#fff' : '#8870a8'}; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; font-size: 11px;">${isC ? '✓' : '✕'}</button></div></div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });

  const lastBackupText = state.lastBackup ? `Последний бэкап: ${formatDateRelative(state.lastBackup)}` : 'Бэкапов ещё не было';
  html += `<div style="margin-top: 28px; padding: 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px;"><div style="font-size: 10px; letter-spacing: 0.25em; color: #A78BFA; text-transform: uppercase; font-weight: 700; margin-bottom: 12px;">Резервная копия</div><p style="font-size: 11px; color: #8870a8; line-height: 1.5; margin-bottom: 12px;">${lastBackupText}.</p><div style="display: flex; gap: 8px; margin-bottom: 8px;"><button onclick="window.__app.backupAndMark()" style="flex: 1; padding: 10px; background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.4); border-radius: 8px; color: #A78BFA; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 600;">↓ Скачать</button><label style="flex: 1; padding: 10px; background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.4); border-radius: 8px; color: #A78BFA; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 600; text-align: center;">↑ Загрузить<input type="file" accept=".json" onchange="window.__app.imp(this.files[0])" style="display:none;" /></label></div><button onclick="window.__app.exportICal()" style="width: 100%; padding: 10px; background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.3); border-radius: 8px; color: #00E5FF; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 600; margin-bottom: 12px;">📅 В календарь iPhone</button>${state.history.length > 0 ? `<button onclick="window.__app.reset()" style="width: 100%; padding: 10px; background: transparent; border: 1px solid rgba(255,61,113,0.3); border-radius: 8px; color: #FF3D71; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; font-weight: 600;">Стереть прогресс</button>` : ''}</div>`;
  return html;
}

// === ПАНЕЛЬ НАВЫКОВ (только для сферы skills) ===
function renderSkillsPanel(sphere) {
  const s = sphere;
  const skills = (state.skills || []).filter(sk => (sk.sphereId || 'skills') === s.id);

  let html = `<div style="background: linear-gradient(135deg, ${s.color}10, ${s.color}03); border: 1px solid ${s.color}30; border-radius: 14px; padding: 16px; margin-bottom: 18px;">`;

  // ── СЕКУНДОМЕР ──────────────────────────────────────────────────────────
  const timerRunning = !!view.timerStartTs;
  const elapsed = timerRunning ? Math.floor((Date.now() - view.timerStartTs) / 1000) : (view.timerElapsed || 0);
  const hh = String(Math.floor(elapsed / 3600)).padStart(2,'0');
  const mm = String(Math.floor((elapsed % 3600) / 60)).padStart(2,'0');
  const ss = String(elapsed % 60).padStart(2,'0');

  html += `<div style="background: rgba(0,0,0,0.3); border: 1px solid ${s.color}40; border-radius: 12px; padding: 14px; margin-bottom: 16px;">
    <div style="font-size: 10px; color: ${s.color}; letter-spacing: 0.25em; text-transform: uppercase; font-weight: 700; margin-bottom: 10px; text-align: center;">Секундомер</div>
    <div id="timer-display" style="font-size: 42px; font-weight: 800; color: ${timerRunning ? s.color : '#fff'}; text-align: center; font-family: monospace; margin-bottom: 12px; text-shadow: ${timerRunning ? '0 0 20px ' + s.color + '80' : 'none'};">${hh}:${mm}:${ss}</div>
    <div style="display: flex; gap: 8px;">
      ${!timerRunning
        ? `<button onclick="window.__app.timerStart()" style="flex: 1; padding: 11px; background: ${s.color}; color: #000; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer;">▶ Старт</button>
           ${elapsed > 0 ? `<button onclick="window.__app.timerReset()" style="padding: 11px 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #8870a8; font-size: 12px; cursor: pointer; font-weight: 700;">Сброс</button>` : ''}`
        : `<button onclick="window.__app.timerStop()" style="flex: 1; padding: 11px; background: rgba(255,61,113,0.2); border: 1px solid #FF3D71; color: #FF3D71; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer;">⏹ Стоп</button>`
      }
    </div>
    ${(view.timerElapsed > 0 && !timerRunning && view.timerPickSkill) ? `
    <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.07);">
      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; font-weight: 600;">Куда записать ${Math.round(view.timerElapsed / 60)} мин?</div>
      ${skills.map(sk => {
        const hasSubs = (sk.subs || []).length > 0;
        const isSelected = view.timerSelectedSkill === sk.id;
        return '<div style="margin-bottom:5px;">'
          + `<button onclick="window.__app.timerSelectSkill('${sk.id}')" style="display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;background:${isSelected ? sk.color+'25' : 'rgba(255,255,255,0.04)'};border:1px solid ${isSelected ? sk.color : 'rgba(255,255,255,0.08)'};border-radius:${isSelected && hasSubs ? '8px 8px 0 0' : '8px'};cursor:pointer;text-align:left;color:#fff;">`
          + `<span style="font-size:18px;">${sk.icon || (SKILL_TYPES[sk.type] || SKILL_TYPES.custom).icon}</span>`
          + `<div style="flex:1;"><div style="font-size:13px;font-weight:700;">${escapeHtml(sk.name)}</div></div>`
          + `<span style="font-size:12px;color:${sk.color};">${isSelected ? '▾' : '▸'}</span></button>`
          + (isSelected ? '<div style="background:rgba(0,0,0,0.2);border:1px solid ' + sk.color + '40;border-top:none;border-radius:0 0 8px 8px;padding:8px;">'
            + (hasSubs ? '<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;">'
              + '<button onclick="window.__app.timerSetSub(null)" style="padding:5px 11px;background:' + (!view.timerSelectedSub ? sk.color+'30' : 'transparent') + ';border:1px solid ' + (!view.timerSelectedSub ? sk.color : 'rgba(255,255,255,0.1)') + ';border-radius:7px;color:' + (!view.timerSelectedSub ? '#fff' : '#8870a8') + ';font-size:11px;font-weight:600;cursor:pointer;">Общее</button>'
              + (sk.subs || []).map(sub => '<button onclick="window.__app.timerSetSub(\'' + sub.id + '\')" style="padding:5px 11px;background:' + (view.timerSelectedSub === sub.id ? sub.color+'30' : 'transparent') + ';border:1px solid ' + (view.timerSelectedSub === sub.id ? sub.color : 'rgba(255,255,255,0.1)') + ';border-radius:7px;color:' + (view.timerSelectedSub === sub.id ? sub.color : '#8870a8') + ';font-size:11px;font-weight:600;cursor:pointer;">' + escapeHtml(sub.name) + '</button>').join('')
              + '</div>' : '')
            + `<button onclick="window.__app.timerSaveTo('${sk.id}')" style="width:100%;padding:10px;background:${sk.color};border:none;border-radius:8px;color:#000;font-size:12px;font-weight:700;cursor:pointer;">Записать → ${escapeHtml(sk.name)}</button>`
            + '</div>' : '')
          + '</div>';
      }).join('')}
      <button onclick="window.__app.timerReset()" style="width:100%;padding:8px;background:transparent;border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#6a5a8a;font-size:11px;cursor:pointer;margin-top:4px;">Сбросить</button>
    </div>` : ''}
  </div>`;
  // ────────────────────────────────────────────────────────────────────────

  html += `<div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;">
    <div style="font-size: 11px; letter-spacing: 0.25em; color: ${s.color}; text-transform: uppercase; font-weight: 700;">Мои навыки</div>
    <div style="font-size: 10px; color: #8870a8;">${skills.length} ${plural(skills.length, 'навык', 'навыка', 'навыков')}</div>
  </div>`;

  if (skills.length === 0) {
    html += `<div style="text-align: center; padding: 20px; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.08); border-radius: 10px; font-size: 12px; color: #6a5a8a; margin-bottom: 12px;">Пока нет навыков. Добавь первый.</div>`;
  } else {
    html += `<div style="display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 12px;">`;
    skills.forEach(sk => {
      const stats = skillStats(sk.id, null, 'all');
      const monthStats = skillStats(sk.id, null, 'month');
      const skType = SKILL_TYPES[sk.type] || SKILL_TYPES.custom;
      // Топ-3 субкатегории по часам
      const subStats = (sk.subs || []).map(sub => ({
        sub,
        h: skillStats(sk.id, sub.id, 'all').hours
      })).filter(x => x.h > 0).sort((a, b) => b.h - a.h);
      const topSubs = subStats.slice(0, 3);
      // Цветная полоска распределения
      let barHtml = '';
      if (subStats.length > 0 && stats.hours > 0) {
        barHtml = `<div style="display: flex; height: 4px; border-radius: 2px; overflow: hidden; margin-top: 8px; background: rgba(255,255,255,0.04);">${subStats.map(x => `<div title="${x.sub.name}: ${x.h.toFixed(1)} ч" style="width: ${(x.h / stats.hours * 100)}%; background: ${x.sub.color};"></div>`).join('')}</div>`;
      }
      html += `<button onclick="window.__app.openSkill('${sk.id}')" style="background: linear-gradient(135deg, ${sk.color}20, ${sk.color}05); border: 1px solid ${sk.color}40; border-radius: 12px; padding: 12px 14px; cursor: pointer; text-align: left; position: relative;">
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 6px;">
          <div style="font-size: 24px; flex-shrink: 0;">${sk.icon || skType.icon}</div>
          <div style="flex: 1; min-width: 0;">
            <div style="font-size: 14px; color: #fff; font-weight: 700;">${escapeHtml(sk.name)}</div>
            <div style="font-size: 10px; color: ${sk.color}; letter-spacing: 0.1em;">${skType.name}${sk.target ? ` · цель ${escapeHtml(sk.target)}` : ''}</div>
          </div>
          <div style="text-align: right; flex-shrink: 0;">
            <div style="font-size: 16px; color: ${sk.color}; font-weight: 800;">${stats.hours.toFixed(1)}<span style="font-size: 11px;">ч</span></div>
            <div style="font-size: 9px; color: #6a5a8a;">${stats.count} ${plural(stats.count, 'занятие', 'занятия', 'занятий')}</div>
          </div>
        </div>
        ${barHtml}
        ${topSubs.length > 0 ? `<div style="display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap;">${topSubs.map(x => `<span style="font-size: 9px; padding: 2px 7px; background: ${x.sub.color}25; color: ${x.sub.color}; border: 1px solid ${x.sub.color}50; border-radius: 6px; font-weight: 600;">${x.sub.name} ${x.h.toFixed(1)}ч</span>`).join('')}</div>` : ''}
        ${monthStats.hours > 0 ? `<div style="font-size: 9px; color: #8870a8; margin-top: 6px;">в этом месяце: ${monthStats.hours.toFixed(1)} ч · ${monthStats.count} занятий</div>` : ''}
      </button>`;
    });
    html += `</div>`;
  }

  if (view.skillAdding) {
    html += `<div style="background: rgba(0,0,0,0.3); border: 1px solid ${s.color}40; border-radius: 12px; padding: 14px; margin-bottom: 12px;">
      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; font-weight: 600;">Новый навык</div>
      <input id="skill-name-input" placeholder="Название (например: Английский)" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 13px; outline: none; margin-bottom: 8px;" />
      <input id="skill-target-input" placeholder="Цель (B2, C1, junior, и т.д.) — необязательно" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 13px; outline: none; margin-bottom: 10px;" />
      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; font-weight: 600;">Тип</div>
      <div style="display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap;" id="skill-type-row">
        ${Object.entries(SKILL_TYPES).map(([k, v]) => { const isActive = (window.__newSkillType || 'language') === k; return `<button data-stype="${k}" onclick="window.__app.setNewSkillType('${k}')" style="flex: 1; min-width: 80px; padding: 10px 6px; background: ${isActive ? s.color : 'transparent'}; color: ${isActive ? '#000' : '#b0a0d0'}; border: 1px solid ${isActive ? s.color : 'rgba(255,255,255,0.1)'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 700; line-height: 1.3;"><div style="font-size: 16px; margin-bottom: 2px;">${v.icon}</div>${v.name}</button>`; }).join('')}
      </div>
      <div style="font-size: 10px; color: #6a5a8a; margin-bottom: 10px; line-height: 1.4;">«Язык» — 6 субкатегорий (listening, speaking и т.д.). «Тех. навык» — 3 (теория, практика, проекты). «Флит-менеджмент» — 4 KPI (утилизация, аренда, штрафы, увольнения с долгом). «Свой» — пустой.</div>
      <div style="display: flex; gap: 8px;">
        <button onclick="window.__app.confirmAddSkill()" style="flex: 1; padding: 11px; background: linear-gradient(135deg,${s.color},${s.color}cc); color: #000; border: none; border-radius: 8px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 700;">Создать</button>
        <button onclick="window.__app.cancelAddSkill()" style="padding: 11px 16px; background: transparent; color: #8870a8; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-size: 11px; cursor: pointer;">Отмена</button>
      </div>
    </div>`;
    setTimeout(() => document.getElementById('skill-name-input')?.focus(), 50);
  } else {
